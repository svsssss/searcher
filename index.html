    // ── Hudson Rock Result ────────────────────────────────────────────────────
    function HudsonResult({ data }) {
      const [expanded, setExpanded] = React.useState(false);
      if (!data) return null;

      const maskVal = v => {
        if (!v || v.length <= 3) return '***';
        return v.slice(0, 2) + '*'.repeat(Math.min(v.length - 2, 8)) + v.slice(-1);
      };

      if (data.loading) return (
        <div style={{ margin:'0 0 16px', padding:'16px 20px', borderRadius:14, background:'rgba(139,92,246,0.06)', border:'1px solid rgba(139,92,246,0.18)', fontFamily:"'Geist',sans-serif", display:'flex', alignItems:'center', gap:10, color:'var(--ink-mute)', fontSize:13 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ animation:'spin 1s linear infinite', flexShrink:0 }}><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="2" strokeDasharray="60" strokeDashoffset="20"/></svg>
          Recherche dans les logs infostealers…
        </div>
      );

      if (data.error) return (
        <div style={{ margin:'0 0 16px', padding:'14px 18px', borderRadius:14, background:'rgba(139,92,246,0.06)', border:'1px solid rgba(139,92,246,0.15)', fontFamily:"'Geist',sans-serif", fontSize:13, color:'var(--ink-mute)' }}>
          🦠 Aucun log infostealer pour <strong style={{ color:'var(--ink)' }}>{data.query}</strong>
        </div>
      );

      const stealers = data.stealers || [];
      const shown = expanded ? stealers : stealers.slice(0, 2);

      return (
        <div style={{ margin:'0 0 16px', borderRadius:14, border:'1px solid rgba(139,92,246,0.3)', overflow:'hidden', fontFamily:"'Geist',sans-serif" }}>
          <div style={{ padding:'14px 18px', background:'rgba(139,92,246,0.08)', borderBottom:'1px solid rgba(139,92,246,0.2)', display:'flex', alignItems:'center', gap:12 }}>
            <span style={{ fontSize:18 }}>🦠</span>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:700, fontSize:14, color:'var(--ink)' }}>
                {stealers.length} infection{stealers.length > 1 ? 's' : ''} infostealer détectée{stealers.length > 1 ? 's' : ''}
              </div>
              <div style={{ fontSize:11, color:'var(--ink-mute)', marginTop:2 }}>Hudson Rock · Cavalier OSINT · {data.query}</div>
            </div>
            <span style={{ padding:'3px 10px', borderRadius:99, fontSize:11, fontWeight:700, background:'rgba(139,92,246,0.2)', color:'#a78bfa', fontFamily:"'JetBrains Mono',monospace", letterSpacing:'0.04em' }}>STEALER</span>
          </div>

          <div style={{ padding:'12px 18px', display:'flex', flexDirection:'column', gap:10 }}>
            {shown.map((s, i) => (
              <div key={i} style={{ padding:'12px 14px', borderRadius:10, background:'var(--sb-bg)', border:'1px solid var(--rule)' }}>
                <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:10 }}>
                  <span style={{ padding:'2px 9px', borderRadius:99, fontSize:11, background:'rgba(239,68,68,0.12)', color:'#f87171', border:'1px solid rgba(239,68,68,0.25)', fontWeight:600 }}>{s.stealer_family || 'Inconnu'}</span>
                  {s.date_compromised && <span style={{ padding:'2px 9px', borderRadius:99, fontSize:11, background:'var(--bg)', color:'var(--ink-mute)', border:'1px solid var(--rule)' }}>📅 {s.date_compromised}</span>}
                  {s.operating_system && <span style={{ padding:'2px 9px', borderRadius:99, fontSize:11, background:'var(--bg)', color:'var(--ink-mute)', border:'1px solid var(--rule)' }}>💻 {s.operating_system}</span>}
                  {s.country && <span style={{ padding:'2px 9px', borderRadius:99, fontSize:11, background:'var(--bg)', color:'var(--ink-mute)', border:'1px solid var(--rule)' }}>🌍 {s.country}</span>}
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:6, fontSize:12 }}>
                  {s.ip && <div style={{ padding:'6px 10px', borderRadius:8, background:'var(--bg)', border:'1px solid var(--rule)' }}><span style={{ color:'var(--ink-mute)' }}>IP : </span><span style={{ fontFamily:"'JetBrains Mono',monospace", color:'var(--ink)' }}>{s.ip}</span></div>}
                  {s.computer_name && <div style={{ padding:'6px 10px', borderRadius:8, background:'var(--bg)', border:'1px solid var(--rule)' }}><span style={{ color:'var(--ink-mute)' }}>PC : </span><span style={{ fontFamily:"'JetBrains Mono',monospace", color:'var(--ink)' }}>{s.computer_name}</span></div>}
                  {s.username && <div style={{ padding:'6px 10px', borderRadius:8, background:'var(--bg)', border:'1px solid var(--rule)' }}><span style={{ color:'var(--ink-mute)' }}>User : </span><span style={{ fontFamily:"'JetBrains Mono',monospace", color:'var(--ink)' }}>{s.username}</span></div>}
                  {s.total_credentials && <div style={{ padding:'6px 10px', borderRadius:8, background:'rgba(239,68,68,0.07)', border:'1px solid rgba(239,68,68,0.2)' }}><span style={{ color:'var(--ink-mute)' }}>Creds volés : </span><span style={{ fontFamily:"'JetBrains Mono',monospace", color:'#f87171', fontWeight:700 }}>{s.total_credentials}</span></div>}
                </div>
                {(s.top_logins?.length > 0 || s.top_passwords?.length > 0) && (
                  <div style={{ marginTop:8, display:'flex', flexDirection:'column', gap:4 }}>
                    {s.top_logins?.slice(0,3).map((l,j) => (
                      <div key={j} style={{ display:'flex', alignItems:'center', gap:8, padding:'5px 10px', borderRadius:7, background:'var(--bg)', border:'1px solid var(--rule)', fontSize:11 }}>
                        <span style={{ color:'var(--ink-mute)', flexShrink:0 }}>login</span>
                        <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'var(--ink)', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{l}</span>
                        {s.top_passwords?.[j] && <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'#ef4444', flexShrink:0, opacity:0.8 }}>{maskVal(s.top_passwords[j])}</span>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
            {stealers.length > 2 && (
              <button onClick={() => setExpanded(e => !e)} style={{ background:'none', border:'none', color:'var(--blue)', fontSize:12, cursor:'none', fontFamily:"'Geist',sans-serif", padding:0, textAlign:'left' }}>
                {expanded ? '▲ Voir moins' : `▼ Voir les ${stealers.length - 2} autres infections`}
              </button>
            )}
          </div>
        </div>
      );
    }

    // ── Breach Result ─────────────────────────────────────────────────────────
    function BreachResult({ data }) {
      const [expanded, setExpanded] = React.useState(false);
      if (!data) return null;

      const maskPass = p => {
        if (!p || p.length <= 3) return '***';
        return p.slice(0, 2) + '*'.repeat(Math.min(p.length - 2, 7)) + p.slice(-1);
      };
      const parseRecord = line => {
        const idx = line.indexOf(':');
        return idx === -1 ? { user: line, pass: null } : { user: line.slice(0, idx), pass: line.slice(idx + 1) };
      };

      if (data.loading) return (
        <div style={{ margin:'0 0 16px', padding:'16px 20px', borderRadius:14, background:'rgba(239,68,68,0.06)', border:'1px solid rgba(239,68,68,0.18)', fontFamily:"'Geist',sans-serif", display:'flex', alignItems:'center', gap:10, color:'var(--ink-mute)', fontSize:13 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ animation:'spin 1s linear infinite', flexShrink:0 }}><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="2" strokeDasharray="60" strokeDashoffset="20"/></svg>
          Recherche dans les bases de fuites…
        </div>
      );

      if (data.error && !data.comb && !data.rep && !data.bvip) return (
        <div style={{ margin:'0 0 16px', padding:'14px 18px', borderRadius:14, background:'rgba(239,68,68,0.06)', border:'1px solid rgba(239,68,68,0.15)', fontFamily:"'Geist',sans-serif", fontSize:13, color:'var(--ink-mute)' }}>
          🔍 Aucune fuite trouvée pour <strong style={{ color:'var(--ink)' }}>{data.query}</strong>
        </div>
      );

      const count = data.comb?.count || 0;
      const lines = data.comb?.lines || [];
      const rep   = data.rep;
      const bvipCount = data.bvip?.total || 0;
      const totalHits = count + bvipCount;
      const severity = totalHits === 0 ? 'clean' : totalHits < 5 ? 'low' : totalHits < 20 ? 'mid' : 'high';
      const sevColor = { clean:'#22c55e', low:'#f59e0b', mid:'#f97316', high:'#ef4444' }[severity];
      const profiles = rep?.details?.profiles || [];

      const hasBvipResults = data.bvip && !data.bvip.error && data.bvip.total > 0;
      const hasOther = data.leakcheck || data.scylla || rep;

      return (
        <div style={{ margin:'0 0 16px', borderRadius:14, border:`1px solid ${sevColor}33`, overflow:'hidden', fontFamily:"'Geist',sans-serif" }}>
          {/* Header */}
          <div style={{ padding:'12px 18px', background:`${sevColor}0f`, display:'flex', alignItems:'center', gap:12, borderBottom:`1px solid ${sevColor}22` }}>
            <span style={{ fontSize:16 }}>{totalHits === 0 ? '✅' : '⚠️'}</span>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontWeight:700, fontSize:13, color:'var(--ink)' }}>
                {totalHits === 0 ? 'Aucune fuite détectée' : `${totalHits.toLocaleString()} entrée${totalHits>1?'s':''} dans les bases de fuites`}
              </div>
              <div style={{ fontSize:10, color:'var(--ink-mute)', marginTop:1 }}>
                BreachVIP · COMB · LeakCheck · Scylla · EmailRep · {data.query}
              </div>
            </div>
            <span style={{ padding:'3px 10px', borderRadius:99, fontSize:11, fontWeight:700, background:`${sevColor}22`, color:sevColor, fontFamily:"'JetBrains Mono',monospace", letterSpacing:'0.04em', textTransform:'uppercase', flexShrink:0 }}>
              {severity === 'clean' ? 'CLEAN' : severity === 'low' ? 'FAIBLE' : severity === 'mid' ? 'MOYEN' : 'ÉLEVÉ'}
            </span>
          </div>

          {/* BreachVIP — EN PREMIER */}
          {data.bvip && (
            <div style={{ padding:'12px 18px', borderBottom: hasOther ? '1px solid var(--rule)' : 'none' }}>
              <div style={{ fontSize:11, color:'var(--ink-mute)', fontFamily:"'JetBrains Mono',monospace", marginBottom: hasBvipResults ? 10 : 0, textTransform:'uppercase', letterSpacing:'0.05em', display:'flex', alignItems:'center', gap:8 }}>
                BreachVIP
                {data.bvip.error ? (
                  <span style={{ color:'#f87171', fontWeight:700, background:'rgba(248,113,113,0.1)', padding:'1px 8px', borderRadius:99, border:'1px solid rgba(248,113,113,0.25)', textTransform:'none', fontSize:11 }}>Erreur réseau / CORS</span>
                ) : (
                  <span style={{ color: hasBvipResults ? '#c084fc' : 'var(--ink-mute)', fontWeight:700, background: hasBvipResults ? 'rgba(192,132,252,0.1)' : 'var(--sb-bg)', padding:'1px 8px', borderRadius:99, border:`1px solid ${hasBvipResults ? 'rgba(192,132,252,0.25)' : 'var(--rule)'}`, textTransform:'none', fontSize:11 }}>
                    {hasBvipResults ? `${data.bvip.total.toLocaleString()} résultat${data.bvip.total > 1 ? 's' : ''}` : '0 résultat'}
                  </span>
                )}
                <span style={{ color:'var(--ink-faint)', fontSize:10, fontFamily:"'Geist',sans-serif", textTransform:'none', letterSpacing:0 }}>{data.bvip.fields?.join(', ')}</span>
              </div>
              {hasBvipResults && (
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  {Object.entries(data.bvip.bySource).map(([srcName, { categories, records }], i) => (
                    <div key={i} style={{ borderRadius:10, border:'1px solid rgba(192,132,252,0.22)', overflow:'hidden' }}>
                      <div style={{ padding:'8px 12px', background:'rgba(192,132,252,0.08)', display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                        <span style={{ fontWeight:700, fontSize:13, color:'#c084fc', fontFamily:"'Geist',sans-serif" }}>{srcName}</span>
                        {(Array.isArray(categories) ? categories : categories ? [categories] : []).map((cat, j) => (
                          <span key={j} style={{ padding:'1px 8px', borderRadius:99, fontSize:10, background:'rgba(192,132,252,0.15)', color:'#e9d5ff', border:'1px solid rgba(192,132,252,0.3)', fontFamily:"'JetBrains Mono',monospace" }}>{cat}</span>
                        ))}
                        {records.length > 1 && <span style={{ marginLeft:'auto', fontSize:10, color:'var(--ink-mute)', fontFamily:"'JetBrains Mono',monospace" }}>×{records.length}</span>}
                      </div>
                      {records.slice(0, 5).map((rec, j) => {
                        const fields = Object.entries(rec).filter(([k]) => k !== 'source' && k !== 'categories');
                        return (
                          <div key={j} style={{ padding:'8px 12px', borderTop:'1px solid rgba(192,132,252,0.12)', display:'grid', gridTemplateColumns:'90px 1fr', gap:'3px 10px' }}>
                            {fields.map(([k, v]) => (
                              <React.Fragment key={k}>
                                <span style={{ fontSize:11, color:'var(--ink-mute)', fontFamily:"'JetBrains Mono',monospace", alignSelf:'start', paddingTop:1 }}>{k}</span>
                                <span style={{ fontSize:11, fontFamily:"'JetBrains Mono',monospace", color: k === 'password' ? '#f87171' : k === 'email' ? '#818cf8' : 'var(--ink)', wordBreak:'break-all' }}>{String(v)}</span>
                              </React.Fragment>
                            ))}
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* EmailRep */}
          {rep && (
            <div style={{ padding:'12px 18px', borderBottom:'1px solid var(--rule)', display:'flex', flexWrap:'wrap', gap:8 }}>
              {rep.details?.credentials_leaked && <span style={{ padding:'2px 9px', borderRadius:99, fontSize:11, background:'rgba(239,68,68,0.1)', color:'#ef4444', border:'1px solid rgba(239,68,68,0.25)' }}>Identifiants leakés</span>}
              {rep.details?.data_breach && <span style={{ padding:'2px 9px', borderRadius:99, fontSize:11, background:'rgba(249,115,22,0.1)', color:'#f97316', border:'1px solid rgba(249,115,22,0.25)' }}>Data breach</span>}
              {rep.details?.spam && <span style={{ padding:'2px 9px', borderRadius:99, fontSize:11, background:'rgba(239,68,68,0.1)', color:'#ef4444', border:'1px solid rgba(239,68,68,0.25)' }}>Spam</span>}
              {rep.details?.disposable && <span style={{ padding:'2px 9px', borderRadius:99, fontSize:11, background:'rgba(245,158,11,0.1)', color:'#f59e0b', border:'1px solid rgba(245,158,11,0.25)' }}>Email jetable</span>}
              {rep.details?.malicious_activity && <span style={{ padding:'2px 9px', borderRadius:99, fontSize:11, background:'rgba(239,68,68,0.1)', color:'#ef4444', border:'1px solid rgba(239,68,68,0.25)' }}>Activité malveillante</span>}
              {!rep.details?.credentials_leaked && !rep.details?.data_breach && !rep.details?.spam && <span style={{ padding:'2px 9px', borderRadius:99, fontSize:11, background:'rgba(34,197,94,0.1)', color:'#22c55e', border:'1px solid rgba(34,197,94,0.25)' }}>Réputation {rep.reputation}</span>}
              {rep.details?.first_seen && <span style={{ padding:'2px 9px', borderRadius:99, fontSize:11, background:'var(--sb-bg)', color:'var(--ink-mute)', border:'1px solid var(--rule)' }}>Vu en {rep.details.first_seen}</span>}
              {profiles.map(p => <span key={p} style={{ padding:'2px 9px', borderRadius:99, fontSize:11, background:'rgba(139,92,246,0.1)', color:'#a78bfa', border:'1px solid rgba(139,92,246,0.25)', textTransform:'capitalize' }}>{p}</span>)}
            </div>
          )}

          {/* LeakCheck */}
          {data.leakcheck && (
            <div style={{ padding:'12px 18px', borderBottom: data.scylla ? '1px solid var(--rule)' : 'none' }}>
              <div style={{ fontSize:11, color:'var(--ink-mute)', fontFamily:"'JetBrains Mono',monospace", marginBottom:8, textTransform:'uppercase', letterSpacing:'0.05em', display:'flex', alignItems:'center', gap:8 }}>
                LeakCheck
                <span style={{ color:'#f59e0b', fontWeight:700, background:'rgba(245,158,11,0.1)', padding:'1px 8px', borderRadius:99, border:'1px solid rgba(245,158,11,0.25)', textTransform:'none', fontSize:11 }}>{data.leakcheck.found} source{data.leakcheck.found > 1 ? 's' : ''}</span>
              </div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                {data.leakcheck.sources.map((src, i) => (
                  <span key={i} style={{ padding:'2px 10px', borderRadius:99, fontSize:11, background:'rgba(249,115,22,0.08)', color:'#fb923c', border:'1px solid rgba(249,115,22,0.2)', fontFamily:"'JetBrains Mono',monospace" }}>{src}</span>
                ))}
              </div>
            </div>
          )}

          {/* Scylla */}
          {data.scylla && (
            <div style={{ padding:'12px 18px' }}>
              <div style={{ fontSize:11, color:'var(--ink-mute)', fontFamily:"'JetBrains Mono',monospace", marginBottom:8, textTransform:'uppercase', letterSpacing:'0.05em', display:'flex', alignItems:'center', gap:8 }}>
                Scylla.sh
                <span style={{ color:'#ef4444', fontWeight:700, background:'rgba(239,68,68,0.1)', padding:'1px 8px', borderRadius:99, border:'1px solid rgba(239,68,68,0.25)', textTransform:'none', fontSize:11 }}>{data.scylla.total.toLocaleString()} entrée{data.scylla.total > 1 ? 's' : ''}</span>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                {data.scylla.hits.slice(0, 8).map((h, i) => (
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 10px', borderRadius:8, background:'var(--sb-bg)', border:'1px solid var(--rule)', fontSize:12 }}>
                    <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'var(--ink)', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{h.email || h.username || '—'}</span>
                    {h.password && <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'#ef4444', opacity:0.7, flexShrink:0 }}>{maskPass(h.password)}</span>}
                    {!h.password && h.hash && <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'var(--ink-mute)', opacity:0.6, flexShrink:0, fontSize:10 }}>hash</span>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }


    // ── Steam Result ──────────────────────────────────────────────────────────
    function SteamResult({ data }) {
      if (!data) return null;

      const stateLabel = { offline:'Hors-ligne', online:'En ligne', 'in-game':'En jeu', away:'Absent' };
      const stateColor = { offline:'#6b7280', online:'#22c55e', 'in-game':'#22c55e', away:'#f59e0b' };
      const fmt = ts => ts ? new Date(Number(ts) * 1000).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' }) : null;

      if (data.loading) return (
        <div style={{ margin:'0 0 16px', padding:'16px 20px', borderRadius:14, background:'rgba(23,33,49,0.08)', border:'1px solid rgba(103,193,245,0.18)', fontFamily:"'Geist',sans-serif", display:'flex', alignItems:'center', gap:10, color:'var(--ink-mute)', fontSize:13 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ animation:'spin 1s linear infinite', flexShrink:0 }}><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="2" strokeDasharray="60" strokeDashoffset="20"/></svg>
          Recherche Steam…
        </div>
      );

      if (data.error) return (
        <div style={{ margin:'0 0 16px', padding:'14px 18px', borderRadius:14, background:'rgba(23,33,49,0.06)', border:'1px solid rgba(103,193,245,0.15)', fontFamily:"'Geist',sans-serif", fontSize:13, color:'var(--ink-mute)' }}>
          🎮 Aucun profil Steam pour <strong style={{ color:'var(--ink)' }}>{data.query}</strong>
        </div>
      );

      const { player, aliases, steamId } = data;
      const sc = stateColor[player.onlineState] || '#6b7280';
      const isPublic = player.privacyState === 'public';
      const inGame = player.onlineState === 'in-game';

      return (
        <div style={{ margin:'0 0 16px', borderRadius:14, border:'1px solid rgba(103,193,245,0.25)', overflow:'hidden', fontFamily:"'Geist',sans-serif" }}>
          {/* Header */}
          <div style={{ padding:'14px 18px', background:'rgba(23,33,49,0.7)', display:'flex', alignItems:'center', gap:12 }}>
            {player.avatarmedium && <img src={player.avatarmedium} alt="" style={{ width:48, height:48, borderRadius:6, flexShrink:0, border:'2px solid rgba(103,193,245,0.3)' }} />}
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontWeight:700, fontSize:16, color:'#c6d4df', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{player.personaname}</div>
              {player.realname && <div style={{ fontSize:12, color:'#8f98a0', marginTop:2 }}>{player.realname}</div>}
              <div style={{ fontSize:11, color:'#8f98a0', marginTop:3, fontFamily:"'JetBrains Mono',monospace", userSelect:'all' }}>{steamId}</div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:4, flexShrink:0 }}>
              <span style={{ padding:'3px 10px', borderRadius:99, fontSize:11, fontWeight:700, background:sc+'22', color:sc, fontFamily:"'JetBrains Mono',monospace', letterSpacing:'0.04em" }}>
                {stateLabel[player.onlineState] || 'Inconnu'}
              </span>
              {inGame && player.stateMessage && <span style={{ padding:'2px 8px', borderRadius:99, fontSize:10, background:'rgba(34,197,94,0.12)', color:'#22c55e', border:'1px solid rgba(34,197,94,0.2)', maxWidth:160, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>🎮 {player.stateMessage.replace(/^In-Game\s*/i,'')}</span>}
            </div>
          </div>

          {/* Info grid */}
          <div style={{ padding:'12px 18px', background:'rgba(23,33,49,0.4)', borderTop:'1px solid rgba(103,193,245,0.1)', display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))', gap:8 }}>
            {player.location && (
              <div style={{ padding:'8px 12px', borderRadius:8, background:'rgba(23,33,49,0.5)', border:'1px solid rgba(103,193,245,0.1)' }}>
                <div style={{ fontSize:10, color:'#8f98a0', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:2 }}>Localisation</div>
                <div style={{ fontSize:12, color:'#c6d4df', fontWeight:600 }}>🌍 {player.location}</div>
              </div>
            )}
            {player.memberSince && (
              <div style={{ padding:'8px 12px', borderRadius:8, background:'rgba(23,33,49,0.5)', border:'1px solid rgba(103,193,245,0.1)' }}>
                <div style={{ fontSize:10, color:'#8f98a0', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:2 }}>Membre depuis</div>
                <div style={{ fontSize:12, color:'#c6d4df', fontWeight:600 }}>{player.memberSince}</div>
              </div>
            )}
            {player.hoursPlayed2Wk && (
              <div style={{ padding:'8px 12px', borderRadius:8, background:'rgba(23,33,49,0.5)', border:'1px solid rgba(103,193,245,0.1)' }}>
                <div style={{ fontSize:10, color:'#8f98a0', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:2 }}>Heures (2 sem.)</div>
                <div style={{ fontSize:12, color:'#c6d4df', fontWeight:600 }}>{player.hoursPlayed2Wk}h</div>
              </div>
            )}
            <div style={{ padding:'8px 12px', borderRadius:8, background:'rgba(23,33,49,0.5)', border:'1px solid rgba(103,193,245,0.1)' }}>
              <div style={{ fontSize:10, color:'#8f98a0', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:2 }}>Profil</div>
              <div style={{ fontSize:13, color: isPublic ? '#22c55e' : '#ef4444', fontWeight:600 }}>{isPublic ? 'Public' : 'Privé'}</div>
            </div>
          </div>

          {/* Name history */}
          {aliases.length > 1 && (
            <div style={{ padding:'12px 18px', background:'rgba(23,33,49,0.3)', borderTop:'1px solid rgba(103,193,245,0.08)' }}>
              <div style={{ fontSize:11, color:'#8f98a0', fontFamily:"'JetBrains Mono',monospace", marginBottom:8, textTransform:'uppercase', letterSpacing:'0.05em' }}>
                Anciens pseudos ({aliases.length - 1})
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                {aliases.slice(1, 15).map((a, i) => (
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:8, padding:'5px 10px', borderRadius:7, background:'rgba(23,33,49,0.5)', border:'1px solid rgba(103,193,245,0.08)', fontSize:12 }}>
                    <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'#c6d4df', flex:1 }}>{a.newname}</span>
                    {a.timechanged && <span style={{ fontSize:10, color:'#8f98a0', flexShrink:0 }}>{fmt(a.timechanged)}</span>}
                  </div>
                ))}
              </div>
            </div>
          )}
          {aliases.length <= 1 && isPublic && (
            <div style={{ padding:'10px 18px', background:'rgba(23,33,49,0.3)', borderTop:'1px solid rgba(103,193,245,0.08)', fontSize:11, color:'#8f98a0' }}>
              Aucun ancien pseudo enregistré
            </div>
          )}
        </div>
      );
    }

    // ── Results Page ──────────────────────────────────────────────────────────
    function ResultsPage({ query, results, loading, error, phoneResult, ipResult, whoisResult, shodanResult, personResult, emailResult, imageResult, decoderResult, usernameResult, tiktokResult, breachResult, hudsonResult, steamResult, config, onSearch, onTheme, onPricing, onPatchnote, onRedeem, onLeaderboard, onMiniGame, miniGameAvailable, credits, onBack, followSpeed, session, onLogout, onProfile, onAdmin, onBulk }) {
      const [input, setInput] = useState(query);

      const submit = e => { e.preventDefault(); if (input.trim()) onSearch(input.trim()); };

      const exportJSON = () => {
        const data = {
          query, exportedAt: new Date().toISOString(),
          results: results.map(({ title, url, description, source }) => ({ title, url, description, source })),
          ...(phoneResult && { phoneResult: { formatted: phoneResult.formatted, country: phoneResult.country, type: phoneResult.type, valid: phoneResult.valid } }),
          ...(ipResult?.data && { ipResult: ipResult.data }),
          ...(whoisResult?.data && { whoisResult: whoisResult.data }),
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `searcher-${query.replace(/\W+/g,'_').slice(0,30)}-${Date.now()}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      };

      return (
        <div className="results-root" style={{ marginLeft: 178 }}>
          <Magnifier followSpeed={followSpeed} />
          <WordField compact />
          <Sidebar
            session={session}
            credits={credits}
            activePage="results"
            onHome={onBack}
            onProfile={onProfile}
            onMiniGame={onMiniGame}
            miniGameAvailable={miniGameAvailable}
            onLeaderboard={onLeaderboard}
            onPatchnote={onPatchnote}
            onPricing={onPricing}
            onRedeem={onRedeem}
            onTheme={onTheme}
            onLogout={onLogout}
            onAdmin={onAdmin}
            onBulk={onBulk}
          />

          <div className="corner tr">
            <div className="badge"><span className="live" />&nbsp;En ligne</div>
          </div>

          <div className="results-topbar">
            <button className="nav-btn home" onClick={onBack} title="Retour à l'accueil">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/><path d="M9 21V12h6v9" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/></svg>
              Accueil
            </button>
            <form className="results-search-wrap" onSubmit={submit}>
              <span className="search-icon" style={{ left: 14, color: 'var(--ink-mute)' }}>
                <SearchIcon size={17} />
              </span>
              <input
                className="results-search"
                type="text"
                value={input}
                onChange={e => setInput(e.target.value)}
                placeholder="Nouvelle recherche…"
                autoFocus
              />
              <span className="kbd">↵</span>
            </form>
            <button
              className="export-btn"
              onClick={isPremium(session) ? exportJSON : onPricing}
              title={isPremium(session) ? 'Exporter les résultats' : 'Réservé aux abonnés Premium'}
              style={!isPremium(session) ? { opacity: 0.5 } : {}}
            >
              {isPremium(session)
                ? <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 3v13M7 11l5 5 5-5M3 18v1a2 2 0 002 2h14a2 2 0 002-2v-1" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                : <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" strokeWidth="1.8"/><path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
              }

          <div className="results-body">

            <div className="builtin-banner">
              <span className="builtin-label">Sources actives :</span>
              <span className="builtin-chip"><span className="dot-green" />Wikipedia FR+EN</span>
              <span className="builtin-chip"><span className="dot-green" />Validation téléphone</span>
              <span className="builtin-chip"><span className="dot-green" />Géolocalisation IP</span>
              <span className="builtin-chip"><span className="dot-green" />WHOIS Domaine</span>
              <span className="builtin-chip"><span className="dot-green" />Recherche Email</span>
              <span className="builtin-chip"><span className="dot-green" />Reverse Image</span>
              <span className="builtin-chip"><span className="dot-green" />Décodeur</span>
              <span className="builtin-chip"><span className="dot-green" />Username @</span>
              <span className="builtin-chip" style={{ borderColor:'rgba(105,201,208,0.4)', color:'#69C9D0', background:'rgba(105,201,208,0.08)' }}><span className="dot-green" style={{ background:'#69C9D0' }} />TikTok OSINT</span>
              {config.googleApiKey && <span className="builtin-chip"><span className="dot-green" />Google</span>}
              <span className="builtin-chip" style={{ borderColor:'#f97316', color:'#ea580c', background:'rgba(249,115,22,0.08)' }}><span className="dot-green" style={{ background:'#f97316' }} />Shodan</span>
              {config.customApis.map(a => <span key={a.name} className="builtin-chip"><span className="dot-green" />{a.name}</span>)}
            </div>

            {tiktokResult && <TikTokCard username={tiktokResult} />}
            {usernameResult && <UsernameCard username={usernameResult} />}
            {steamResult && <SteamResult data={steamResult} />}
            {decoderResult && <DecoderCard input={decoderResult} />}
            {emailResult && <EmailCard email={emailResult} />}
            {emailResult && <SocialCheckCard email={emailResult} />}
            {hudsonResult && <HudsonResult data={hudsonResult} />}
            {breachResult && <BreachResult data={breachResult} />}
            {imageResult && <ImageSearchCard url={imageResult} />}
            {personResult && <PersonCard name={personResult} />}
            {phoneResult && <PhoneCard phone={phoneResult} />}
            {phoneResult && <MessagingCard phone={phoneResult} />}
            {ipResult && <IPCard result={ipResult} />}
            {shodanResult && <ShodanCard result={shodanResult} />}
            {whoisResult && <WhoisCard result={whoisResult} />}

            <div className="results-meta">
              {loading
                ? <span className="results-count loading-pulse">Recherche en cours…</span>
                : !error && <span className="results-count">{results.length} résultat{results.length !== 1 ? 's' : ''} pour <b>"{query}"</b></span>
              }
              {!loading && results.length > 0 && (
                <div className="source-chips">
                  {[...new Set(results.map(r => r.source))].map(src => (
                    <span key={src} className="source-chip">{src}</span>
                  ))}
                </div>
              )}
            </div>

            {loading && (
              <div className="results-list">
                {[1, 2, 3].map(i => <div key={i} className="result-skeleton" style={{ height: i === 1 ? 110 : 95 }} />)}
              </div>
            )}

            {!loading && error && (
              <div className="results-error">
                <span className="error-icon">⚠</span>
                <div>
                  <div className="error-title">Erreur lors de la recherche</div>
                  <div className="error-desc">{error}</div>
                </div>
              </div>
            )}

            {!loading && !error && results.length === 0 && !phoneResult && !ipResult && !emailResult && !imageResult && !decoderResult && !usernameResult && !tiktokResult && (
              <div className="results-empty">
                <div className="empty-icon"><SearchIcon size={48} /></div>
                <div className="empty-title">Aucun résultat</div>
                <div className="empty-desc">Aucun résultat trouvé sur Wikipedia pour <b>"{query}"</b>. Essayez avec d'autres termes.</div>
              </div>
            )}

            {!loading && !error && results.length > 0 && (
              <div className="results-list">
                {results.map(r => <ResultCard key={r.id} result={r} />)}
              </div>
            )}
          </div>

          <Cursor />
        </div>
      );
    }

    // ── Search Page ───────────────────────────────────────────────────────────
    const CHIPS = ['@torvalds', 'Donald Trump', 'google.com', '8.8.8.8', 'Emmanuel Macron'];

    // ── Sidebar ──────────────────────────────────────────────────────────────────
    // ── Admin Modal ───────────────────────────────────────────────────────────
    function AdminModal({ visible, onClose, onPremiumUpdate }) {
      const [list, setList]         = useState(() => loadPremiumList());
      const [input, setInput]       = useState('');
      const [msg, setMsg]           = useState(null);
      const [crName, setCrName]     = useState('');
      const [crAmount, setCrAmount] = useState('');
      const [crMsg, setCrMsg]       = useState(null);
      const [bdName, setBdName]     = useState('');
      const [bdId, setBdId]         = useState('');
      const [bdMsg, setBdMsg]       = useState(null);

      useEffect(() => { if (!visible) { setInput(''); setMsg(null); setCrName(''); setCrAmount(''); setCrMsg(null); setBdName(''); setBdId(''); setBdMsg(null); } }, [visible]);

      const sendBadge = (action) => {
        const name = bdName.trim();
        if (!name || !bdId) return;
        const grant = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), name, badgeId: bdId, action, createdAt: Date.now() };
        const badge = BADGES_DEF.find(b => b.id === bdId);
        setBdMsg({ ok: true, text: `${action === 'give' ? '✓ Badge' : '✗ Badge retiré :'} "${badge?.label || bdId}" → ${name}.` });
        setBdName(''); setBdId('');
        pushBadgeGrant(grant);
      };

      const sendCredits = (sign) => {
        const name = crName.trim();
        const amount = parseInt(crAmount, 10);
        if (!name || isNaN(amount) || amount <= 0) return;
        const grant = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), name, amount: sign * amount, createdAt: Date.now() };
        setCrMsg({ ok: true, text: `${sign > 0 ? '+' : '-'}${amount} crédits envoyés à ${name}.` });
        setCrName(''); setCrAmount('');
        pushCreditGrant(grant);
      };

      const add = () => {
        const name = input.trim();
        if (!name) return;
        if (list.some(u => u.toLowerCase() === name.toLowerCase())) {
          setMsg({ ok: false, text: `${name} a déjà le Premium.` }); return;
        }
        const newList = [...list, name];
        setList(newList);
        onPremiumUpdate(newList);
        setInput('');
        setMsg({ ok: true, text: `✓ ${name} — Premium actif + 500 cr en route.` });
        pushPremiumList(newList);
        pushCreditGrant({ id: 'premium-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5), name, amount: 500, createdAt: Date.now() });
      };

      const remove = name => {
        const newList = list.filter(u => u.toLowerCase() !== name.toLowerCase());
        setList(newList);
        onPremiumUpdate(newList);
        pushPremiumList(newList);
      };

      return (
        <div className="modal-overlay" onClick={onClose} style={{ display: visible ? undefined : 'none' }}>
          <div className="modal" style={{ width:'min(420px,100%)' }} onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <span style={{ display:'flex', alignItems:'center', gap:8 }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" strokeWidth="1.8"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
                Panel Admin — Premium
              </span>
              <button className="modal-close" onClick={onClose}>✕</button>
            </div>
            <div className="modal-body" style={{ gap:14 }}>
              <div style={{ display:'flex', gap:8 }}>
                <input
                  type="text" placeholder="Pseudo Discord exact…" value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && add()}
                  style={{ flex:1, padding:'8px 12px', border:'1px solid var(--rule)', borderRadius:8, background:'var(--bg)', color:'var(--ink)', fontFamily:"'Geist',sans-serif", fontSize:13, cursor:'none', outline:'none' }}
                />
                <button
                  onClick={add} disabled={!input.trim()}
                  style={{ padding:'8px 18px', borderRadius:8, background:'var(--blue)', color:'#fff', border:'none', fontFamily:"'Geist',sans-serif", fontSize:13, fontWeight:600, cursor:'none', opacity:!input.trim()?0.5:1 }}
                >
                  Ajouter
                </button>
              </div>
              {msg && (
                <div style={{ padding:'8px 12px', borderRadius:8, fontSize:13, background: msg.ok ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)', color: msg.ok ? '#16a34a' : '#dc2626' }}>
                  {msg.text}
                </div>
              )}
              <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                {ADMIN_NAMES.map(name => (
                  <div key={name} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 12px', borderRadius:8, background:'rgba(248,113,113,0.08)', border:'1px solid rgba(248,113,113,0.25)' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <span style={{ fontSize:11, background:'rgba(248,113,113,0.2)', color:'#f87171', padding:'1px 6px', borderRadius:99, fontFamily:"'JetBrains Mono',monospace", letterSpacing:'0.04em' }}>ADMIN</span>
                      <span style={{ fontFamily:"'Geist',sans-serif", fontSize:13, color:'var(--ink)' }}>{name}</span>
                    </div>
                  </div>
                ))}
                {list.length === 0 && (
                  <div style={{ color:'var(--ink-mute)', fontSize:13, textAlign:'center', padding:'12px 0' }}>Aucun abonné premium ajouté.</div>
                )}
                {list.map(name => (
                  <div key={name} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 12px', borderRadius:8, background:'var(--sb-bg)', border:'1px solid var(--rule)' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <span style={{ fontSize:11, background:'rgba(245,158,11,0.15)', color:'#f59e0b', padding:'1px 6px', borderRadius:99, fontFamily:"'JetBrains Mono',monospace", letterSpacing:'0.04em' }}>★ PRE</span>
                      <span style={{ fontFamily:"'Geist',sans-serif", fontSize:13, color:'var(--ink)' }}>{name}</span>
                    </div>
                    <button
                      onClick={() => remove(name)}
                      style={{ background:'none', border:'1px solid rgba(239,68,68,0.3)', color:'#dc2626', borderRadius:6, padding:'3px 10px', fontSize:11, cursor:'none', fontFamily:"'Geist',sans-serif" }}
                    >
                      Retirer
                    </button>
                  </div>
                ))}
              </div>

              {/* ── Crédits ── */}
              <div style={{ height:1, background:'var(--rule)', margin:'4px 0' }} />
              <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:'var(--ink-mute)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:8 }}>
                ⚡ Gérer les crédits
              </div>
              <div style={{ display:'flex', gap:8, marginBottom:8 }}>
                <input
                  type="text" placeholder="Pseudo Discord exact" value={crName}
                  onChange={e => setCrName(e.target.value)}
                  style={{ flex:1, padding:'8px 12px', border:'1px solid var(--rule)', borderRadius:8, background:'var(--bg)', color:'var(--ink)', fontFamily:"'Geist',sans-serif", fontSize:13, cursor:'none', outline:'none' }}
                />
                <input
                  type="number" placeholder="Montant" value={crAmount} min="1"
                  onChange={e => setCrAmount(e.target.value)}
                  style={{ width:90, padding:'8px 10px', border:'1px solid var(--rule)', borderRadius:8, background:'var(--bg)', color:'var(--ink)', fontFamily:"'Geist',sans-serif", fontSize:13, cursor:'none', outline:'none' }}
                />
              </div>
              <div style={{ display:'flex', gap:8 }}>
                <button
                  onClick={() => sendCredits(1)} disabled={!crName.trim() || !crAmount}
                  style={{ flex:1, padding:'8px 0', borderRadius:8, background:'rgba(34,197,94,0.12)', color:'#16a34a', border:'1px solid rgba(34,197,94,0.3)', fontFamily:"'Geist',sans-serif", fontSize:13, fontWeight:600, cursor:'none', opacity:(!crName.trim()||!crAmount)?0.5:1 }}
                >
                  + Donner
                </button>
                <button
                  onClick={() => sendCredits(-1)} disabled={!crName.trim() || !crAmount}
                  style={{ flex:1, padding:'8px 0', borderRadius:8, background:'rgba(239,68,68,0.1)', color:'#dc2626', border:'1px solid rgba(239,68,68,0.3)', fontFamily:"'Geist',sans-serif", fontSize:13, fontWeight:600, cursor:'none', opacity:(!crName.trim()||!crAmount)?0.5:1 }}
                >
                  − Retirer
                </button>
              </div>
              {crMsg && (
                <div style={{ padding:'8px 12px', borderRadius:8, fontSize:12, marginTop:8, background: crMsg.ok ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)', color: crMsg.ok ? '#16a34a' : '#dc2626' }}>
                  {crMsg.text}
                </div>
              )}

              {/* ── Badges ── */}
              <div style={{ height:1, background:'var(--rule)', margin:'4px 0' }} />
              <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:'var(--ink-mute)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:8 }}>
                🏅 Donner / Retirer un badge
              </div>
              <input
                type="text" placeholder="Pseudo Discord exact" value={bdName}
                onChange={e => setBdName(e.target.value)}
                style={{ width:'100%', padding:'8px 12px', border:'1px solid var(--rule)', borderRadius:8, background:'var(--bg)', color:'var(--ink)', fontFamily:"'Geist',sans-serif", fontSize:13, cursor:'none', outline:'none', boxSizing:'border-box' }}
              />
              <div style={{ display:'flex', flexWrap:'wrap', gap:6, padding:'8px', border:'1px solid var(--rule)', borderRadius:8, background:'var(--sb-bg)', minHeight:44 }}>
                {BADGES_DEF.filter(b => b.id !== 'rank1').map(b => (
                  <div key={b.id} title={b.label} onClick={() => setBdId(bdId === b.id ? '' : b.id)}
                    style={{ width:32, height:32, borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', cursor:'none', transition:'all 0.12s',
                      background: bdId === b.id ? 'rgba(139,92,246,0.25)' : 'transparent',
                      border: bdId === b.id ? '1.5px solid rgba(139,92,246,0.6)' : '1.5px solid transparent',
                      opacity: bdId && bdId !== b.id ? 0.4 : 1 }}
                  >
                    <img src={b.img} alt={b.label} style={{ width:22, height:22, objectFit:'contain' }} />
                  </div>
                ))}
              </div>
              {bdId && (
                <div style={{ fontSize:11, color:'var(--ink-mute)', fontFamily:"'JetBrains Mono',monospace", marginTop:-4 }}>
                  Sélectionné : {BADGES_DEF.find(b => b.id === bdId)?.label}
                </div>
              )}
              <div style={{ display:'flex', gap:8 }}>
                <button
                  onClick={() => sendBadge('give')} disabled={!bdName.trim() || !bdId}
                  style={{ flex:1, padding:'8px 0', borderRadius:8, background:'rgba(139,92,246,0.12)', color:'#a78bfa', border:'1px solid rgba(139,92,246,0.3)', fontFamily:"'Geist',sans-serif", fontSize:13, fontWeight:600, cursor:'none', opacity:(!bdName.trim()||!bdId)?0.5:1 }}
                >
                  + Donner
                </button>
                <button
                  onClick={() => sendBadge('revoke')} disabled={!bdName.trim() || !bdId}
                  style={{ flex:1, padding:'8px 0', borderRadius:8, background:'rgba(239,68,68,0.1)', color:'#dc2626', border:'1px solid rgba(239,68,68,0.3)', fontFamily:"'Geist',sans-serif", fontSize:13, fontWeight:600, cursor:'none', opacity:(!bdName.trim()||!bdId)?0.5:1 }}
                >
                  − Retirer
                </button>
              </div>
              {bdMsg && (
                <div style={{ padding:'8px 12px', borderRadius:8, fontSize:12, marginTop:8, background:'rgba(139,92,246,0.1)', color:'#a78bfa' }}>
                  {bdMsg.text}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

                </div>
                <span className="sidebar-username">{session.name}</span>

              </div>

              {miniGameAvailable && <span style={{ position:'absolute', right:12, top:'50%', transform:'translateY(-50%)', width:6, height:6, borderRadius:'50%', background:'#22c55e' }} />}

      const [history, setHistory] = useState(() => loadHistory());

      const suggestions = useMemo(() => {
        const q = query.toLowerCase().trim();
        if (!q) return history.slice(0, 6);
        return history.filter(h => h.q.toLowerCase().includes(q)).slice(0, 6);
      }, [query, history]);

      const submit = e => { e.preventDefault(); if (query.trim()) { onSearch(query.trim()); setFocused(false); } };
      const chipClick = c => { setQuery(c); onSearch(c); };
      const pickSuggestion = q => { setQuery(q); onSearch(q); setFocused(false); };
      const clearHist = () => { clearHistory(); setHistory([]); };
      const showSuggestions = focused && suggestions.length > 0;

      const TAG_TEXT = 'Wikipedia · Téléphone · IP · WHOIS · et plus. Une recherche unifiée pour tout.';
      const [tagTyped, setTagTyped] = useState('');
      const [tagDone, setTagDone] = useState(false);
      useEffect(() => {
        let i = 0;
        setTagTyped('');
        setTagDone(false);
        const id = setInterval(() => {
          i++;
          setTagTyped(TAG_TEXT.slice(0, i));
          if (i >= TAG_TEXT.length) { clearInterval(id); setTimeout(() => setTagDone(true), 800); }

        return () => clearInterval(id);

    // ── Animated Background Canvas ────────────────────────────────────────────
    function AnimatedBg({ type }) {
      const canvasRef = useRef(null);
      const rafRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const W = () => canvas.width, H = () => canvas.height;
        const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
        resize();
        window.addEventListener('resize', resize);
        cancelAnimationFrame(rafRef.current);
        if (type === 'particles') {
          const pts = Array.from({length:50}, () => ({ x:Math.random()*W(), y:Math.random()*H(), vx:(Math.random()-.5)*.4, vy:-.2-Math.random()*.5, r:.8+Math.random()*2, t:Math.random()*Math.PI*2 }));
          const tick = () => {
            ctx.clearRect(0,0,W(),H());
            pts.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.t+=.02; if(p.y<-5){p.y=H()+5;p.x=Math.random()*W();} ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${.15+Math.abs(Math.sin(p.t))*.5})`; ctx.fill(); });
            rafRef.current = requestAnimationFrame(tick);
          };
          rafRef.current = requestAnimationFrame(tick);
        } else if (type === 'stars') {
          const stars = Array.from({length:100}, () => ({ x:Math.random()*W(), y:Math.random()*H(), r:.4+Math.random()*1.6, t:Math.random()*Math.PI*2 }));
          const tick = () => {
            ctx.clearRect(0,0,W(),H());
            stars.forEach(s => { s.t+=.012; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${.1+Math.abs(Math.sin(s.t))*.9})`; ctx.fill(); });
            rafRef.current = requestAnimationFrame(tick);
          };
          rafRef.current = requestAnimationFrame(tick);
        } else if (type === 'matrix') {
          const fs=13, cols=Math.floor(W()/fs);
          const drops = Array.from({length:cols}, ()=>Math.random()*-60);
          const chars='01アイウエオカキクケコ#@$%&*';
          const tick = () => {
            ctx.fillStyle='rgba(0,10,0,.07)'; ctx.fillRect(0,0,W(),H());
            ctx.font=`${fs}px 'JetBrains Mono',monospace`;
            drops.forEach((y,i)=>{ ctx.fillStyle=`rgba(34,197,94,${.35+Math.random()*.45})`; ctx.fillText(chars[Math.floor(Math.random()*chars.length)],i*fs,y*fs); if(y*fs>H()&&Math.random()>.97)drops[i]=0; drops[i]+=.5; });
            rafRef.current = requestAnimationFrame(tick);
          };
          rafRef.current = requestAnimationFrame(tick);
        } else if (type === 'rain') {
          const SYM='01{}<>[]#@!?;:SRCH'; const fs2=11;
          const cols=Math.floor(W()/fs2);
          const drops=Array.from({length:cols},()=>Math.random()*-70);
          const tick = () => {
            ctx.fillStyle='rgba(13,12,41,.08)'; ctx.fillRect(0,0,W(),H());
            ctx.font=`${fs2}px 'JetBrains Mono',monospace`;
            drops.forEach((y,i)=>{ ctx.fillStyle=`rgba(167,139,250,${.2+Math.random()*.4})`; ctx.fillText(SYM[Math.floor(Math.random()*SYM.length)],i*fs2,y*fs2); if(y*fs2>H()&&Math.random()>.96)drops[i]=0; drops[i]+=.45; });
            rafRef.current = requestAnimationFrame(tick);
          };
          rafRef.current = requestAnimationFrame(tick);
        }
        return () => { cancelAnimationFrame(rafRef.current); window.removeEventListener('resize', resize); };
      }, [type]);
      return <canvas ref={canvasRef} style={{ position:'absolute', inset:0, width:'100%', height:'100%', zIndex:0 }} />;
    }

    // ── Username Effect Components ────────────────────────────────────────────
    function UsernameDisplay({ name, effect }) {
      const containerRef = useRef(null);
      const rafRef = useRef(null);
      const lastRef = useRef(0);
      const [twIndex, setTwIndex] = useState(0);
      const [twDeleting, setTwDeleting] = useState(false);
      const isSparkle = (effect||'').startsWith('sparkles_');
      const SPARKLE_MAP = { green:'#22c55e', blue:'#3b82f6', red:'#ef4444', gold:'#eab308', white:'#e5e7eb', pink:'#ec4899', multi:null };
      const MULTI_COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#fff'];
      const sparkleKey = isSparkle ? (effect||'').replace('sparkles_','') : '';
      const sparkleColor = isSparkle ? SPARKLE_MAP[sparkleKey] : undefined;
      useEffect(() => {
        if (effect !== 'typewriter') { setTwIndex(0); setTwDeleting(false); return; }
        let t;
        if (!twDeleting) {
          if (twIndex < (name||'').length) t = setTimeout(() => setTwIndex(i => i + 1), 95);
          else t = setTimeout(() => setTwDeleting(true), 1600);
        } else {
          if (twIndex > 0) t = setTimeout(() => setTwIndex(i => i - 1), 55);
          else t = setTimeout(() => setTwDeleting(false), 350);
        }
        return () => clearTimeout(t);
      }, [effect, twIndex, twDeleting, name]);
      useEffect(() => {
        if (!isSparkle) { cancelAnimationFrame(rafRef.current); return; }
        const container = containerRef.current;
        if (!container) return;
        const tick = t => {
          if (t - lastRef.current > 175) {
            lastRef.current = t;
            const s = document.createElement('span');
            const x = 5 + Math.random() * 90;
            const y = 5 + Math.random() * 90;
            const sz = 2 + Math.random() * 3;
            const dur = 0.55 + Math.random() * 0.5;
            const c = (sparkleColor !== null && sparkleColor !== undefined) ? sparkleColor : MULTI_COLORS[Math.floor(Math.random()*MULTI_COLORS.length)];
            Object.assign(s.style, {
              position:'absolute', left:x+'%', top:y+'%',
              width:sz+'px', height:sz+'px', borderRadius:'50%',
              background:c, boxShadow:`0 0 ${sz*2}px ${c}`,
              pointerEvents:'none', zIndex:5,
              animation:`spk-float ${dur}s ease-out forwards`,
              transform:'translate(-50%,-50%)',
            });
            container.appendChild(s);
            setTimeout(()=>s.remove(), dur*1100);
          }
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
        return ()=>cancelAnimationFrame(rafRef.current);
      }, [isSparkle, sparkleColor]);
      if (effect === 'wave') return (
        <div className="pub-name">
          {[...(name||'')].map((ch,i)=>(
            <span key={i} style={{ display:'inline-block', animation:`name-wave 1.4s ease-in-out ${i*.08}s infinite` }}>{ch===' '?' ':ch}</span>
          ))}
        </div>
      );
      if (effect === 'typewriter') return (
        <div className="pub-name">{(name||'').slice(0, twIndex)}<span className="pub-name-tw-cursor">|</span></div>
      );
      if (effect === 'rainbow') return <div className="pub-name pub-name-rainbow">{name}</div>;
      if (effect === 'glitch')  return <div className="pub-name pub-name-glitch">{name}</div>;
      if (effect === 'neon')    return <div className="pub-name pub-name-neon">{name}</div>;
      if (isSparkle) return (
        <div ref={containerRef} className="pub-name" style={{ position:'relative', overflow:'visible' }}>{name}</div>
      );
      return <div className="pub-name">{name}</div>;
    }

                </div>
                {showNeonPicker && (() => {

                    { label:'Vert',   color:'#39ff14' },
                    { label:'Rose',   color:'#ff6ec7' },
                    { label:'Bleu',   color:'#4d8aff' },
                    { label:'Orange', color:'#ff6b35' },

                            width:28, height:28, borderRadius:'50%', cursor:'none',

                        <input type="color" value={profile.neonColor || '#00f5ff'}
                          onChange={e => set('neonColor', e.target.value)}
                          style={{ width:34, height:28, borderRadius:6, border:'1px solid var(--rule)', cursor:'none', padding:2 }}
                        />
                        {profile.neonColor && (
                          <span style={{ fontSize:11, fontFamily:"'JetBrains Mono',monospace", color:'var(--ink-mute)' }}>{profile.neonColor}</span>
                        )}
                      </div>
                    </div>
                  );
                })()}
              </div>

              {/* Links */}
              <div className="dash-section">
                <div className="dash-stitle">Liens sociaux</div>
                {(profile.links||[]).map((link, i) => (
                  <div key={i} className="dash-link-row">
                    <select value={link.platform} onChange={e => updateLink(i,'platform',e.target.value)}>
                      {Object.entries(PLATFORM_META).map(([k,v]) => (
                        <option key={k} value={k}>{v.label}</option>
                      ))}
                    </select>
                    <input
                      type="text"
                      placeholder={link.platform === 'custom' ? 'Label affiché' : 'Nom / @pseudo'}
                      value={link.label}
                      onChange={e => updateLink(i,'label',e.target.value)}

                    />
                    <input
                      type="url"
                      placeholder="https://…"
                      value={link.url}
                      onChange={e => updateLink(i,'url',e.target.value)}
                    />
                    <button className="dash-link-del" onClick={() => removeLink(i)}>×</button>
                  </div>
                ))}
                <button className="dash-btn-sm" onClick={addLink}>+ Ajouter un lien</button>
              </div>

              {/* Background */}
              <div className="dash-section">
                <div className="dash-stitle">Arrière-plan</div>
                <div className="bg-swatch-row">
                  {BG_PRESETS.map(b => (
                    <div key={b.id} className={`bg-swatch${profile.bgPreset === b.id ? ' active' : ''}`}
                      style={{ background:b.value }} onClick={() => set('bgPreset', b.id)} title={b.id} />
                  ))}
                  <div className={`bg-swatch${profile.bgPreset === 'custom' ? ' active' : ''}`}
                    style={{ background:'conic-gradient(red,yellow,lime,cyan,blue,magenta,red)' }}
                    onClick={() => set('bgPreset','custom')} title="CSS personnalisé" />
                  <div className={`bg-swatch${profile.bgPreset === 'video' ? ' active' : ''}`}
                    style={{ background:'#111', display:'flex', alignItems:'center', justifyContent:'center', fontSize:16 }}
                    onClick={() => videoInputRef.current?.click()} title="Vidéo locale">
                    🎬
                  </div>
                  <div className={`bg-swatch${profile.bgPreset === 'image' ? ' active' : ''}`}
                    style={{ background:'#1a1a2e', display:'flex', alignItems:'center', justifyContent:'center', fontSize:16 }}
                    onClick={() => imageInputRef.current?.click()} title="Image locale">
                    🖼️
                  </div>
                  {ANIM_BG_DEF.map(b => {
                    const owned = b.free || (profile.unlockedAnimBgs||[]).includes(b.id);
                    return (
                      <div key={b.id}
                        className={`bg-swatch${profile.bgPreset === b.id ? ' active' : ''}`}
                        style={{ background:b.dark, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, position:'relative', color: b.id==='matrix'?'#22c55e':b.id==='rain'?'#a78bfa':'rgba(255,255,255,0.8)' }}
                        title={`${b.label}${b.free?'':`  (${b.cost} cr)`}`}
                        onClick={() => {
                          if (owned) { applyAndSync({ bgPreset: b.id }); return; }
                          const cred = loadCredits();
                          if (cred.balance < b.cost) return;
                          saveCredits({ balance: cred.balance - b.cost });
                          applyAndSync({ bgPreset: b.id, unlockedAnimBgs: [...(profile.unlockedAnimBgs||[]), b.id] });
                        }}>
                        {b.icon}
                        {!owned && <span style={{ position:'absolute', top:1, right:2, fontSize:7, color:'rgba(255,255,255,0.7)' }}>🔒</span>}
                      </div>
                    );
                  })}
                </div>
                {profile.bgPreset === 'custom' && (
                  <div className="dash-field">
                    <div className="dash-label">Gradient ou couleur CSS</div>
                    <input className="dash-input" placeholder="linear-gradient(…) ou #hex" value={profile.bgCustom} onChange={e => set('bgCustom', e.target.value)} />
                  </div>
                )}
                {/* Video / Image file pickers */}
                <input ref={videoInputRef} type="file" accept="video/*" style={{ display:'none' }} onChange={pickVideoFile} />
                <input ref={imageInputRef} type="file" accept="image/*" style={{ display:'none' }} onChange={pickImageFile} />
                <button className={`file-pick-btn${videoFileName && profile.bgPreset==='video' ? ' has-file' : ''}`} onClick={() => videoInputRef.current?.click()}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M15 10l4.553-2.277A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z" stroke="currentColor" strokeWidth="1.8"/></svg>
                  {videoFileName && profile.bgPreset==='video' ? `✓ ${videoFileName.slice(0,28)}${videoFileName.length>28?'…':''}` : 'Choisir une vidéo locale…'}
                </button>
                <button className={`file-pick-btn${imageFileName && profile.bgPreset==='image' ? ' has-file' : ''}`} onClick={() => imageInputRef.current?.click()}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" strokeWidth="1.8"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
                  {imageFileName && profile.bgPreset==='image' ? `✓ ${imageFileName.slice(0,28)}${imageFileName.length>28?'…':''}` : 'Choisir une image locale…'}
                </button>
                {(profile.bgPreset === 'video' || profile.bgPreset === 'image') && (
                  <button className="file-pick-btn" onClick={clearBgFile}
                    style={{ color:'rgba(239,68,68,0.85)', borderColor:'rgba(239,68,68,0.25)', marginTop:2 }}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
