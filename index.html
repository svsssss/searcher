<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Searcher</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230f0c29'/%3E%3Ccircle cx='13.5' cy='13.5' r='6' fill='none' stroke='white' stroke-width='2.2'/%3E%3Cline x1='18' y1='18' x2='24.5' y2='24.5' stroke='white' stroke-width='2.2' stroke-linecap='round'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/libphonenumber-js@1.11.4/bundle/libphonenumber-min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --bg: #ffffff;
      --ink: #0a0a0a;
      --ink-soft: #2a2a2a;
      --ink-mute: #6b7280;
      --ink-faint: #d4d6db;
      --rule: #e5e7eb;
      --blue: #2563ff;
      --blue-soft: #e8efff;
      --blue-deep: #0040d6;
      --sb-bg: #f7f8f9;
      --sb-hover: rgba(0,0,0,0.05);
      --input-bg: #f8f8f8;
      --card-bg: rgba(255,255,255,0.9);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(37,99,255,0.04) 0%, transparent 70%),
        linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(10,10,10,0.08) 1px, transparent 1px);
      background-size: 28px 28px;
      z-index: 1;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
      opacity: 0.6;
    }

    #root { position: relative; height: 100%; z-index: 3; }

    /* ── Shared layout ── */
    .word-field {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }
    .word {
      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink);
      white-space: nowrap;
      user-select: none;
      will-change: transform, opacity;
    }

    .magnifier {
      position: fixed;
      pointer-events: none;
      top: 0; left: 0;
      z-index: 0;
      will-change: transform;
      filter: blur(10px) opacity(0.65);
    }

    .cursor-dot {
      position: fixed;
      pointer-events: none;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ink);
      z-index: 9999;
      transform: translate(-50%, -50%);
    }
    .cursor-ring {
      position: fixed;
      pointer-events: none;
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--blue);
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.2s ease, height 0.2s ease, background 0.2s ease;
    }
    .cursor-ring.hover { width: 44px; height: 44px; background: rgba(37,99,255,0.06); }

    .corner {
      position: fixed;
      z-index: 6;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-mute);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .corner.tl { top: 24px; left: 28px; }
    .corner.tr { top: 24px; right: 28px; }
    .corner.bl { bottom: 24px; left: 28px; }
    .corner.br { bottom: 24px; right: 28px; }

    .logo {
      width: 26px; height: 26px;
      border-radius: 7px;
      flex-shrink: 0;
      display: block;
    }
    .brand-name {
      font-family: 'Geist', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue-deep);
      font-size: 10.5px;
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
    }
    .badge .live {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--blue);
      animation: pulse 2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(37,99,255,0.55); }
      70%  { box-shadow: 0 0 0 10px rgba(37,99,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(37,99,255,0); }
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 22px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .eyebrow .pulse {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--blue);
      animation: pulse 2s ease-out infinite;
    }

    /* ── Search Page ── */
    .stage {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 48px 24px;
      gap: 40px;
    }
    .masthead {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }
    .wordmark {
      font-family: 'Geist', sans-serif;
      font-weight: 600;
      font-size: clamp(64px, 10vw, 132px);
      letter-spacing: -0.045em;
      color: var(--ink);
      line-height: 0.95;
    }
    .wordmark .accent {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      color: var(--blue);
      letter-spacing: -0.02em;
    }
    .wordmark .dot { color: var(--blue); }
    .tag-cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: var(--ink-mute);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .tag {
      font-size: 15px;
      color: var(--ink-mute);
      margin-top: 18px;
      max-width: 460px;
      text-align: center;
      line-height: 1.5;
    }

    .search-wrap {
      position: relative;
      width: min(640px, 92vw);
    }
    .search {
      width: 100%;
      background: var(--input-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--ink-faint);
      border-radius: 14px;
      padding: 20px 96px 20px 56px;
      font-family: 'Geist', sans-serif;
      font-size: 17px;
      color: var(--ink);
      outline: none;
      box-shadow: 0 1px 2px rgba(10,10,10,0.04), 0 8px 28px rgba(10,10,10,0.06);
      transition: box-shadow 0.18s, border-color 0.18s;
      cursor: none;
    }
    .search::placeholder { color: var(--ink-mute); }
    .search:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px var(--blue-soft), 0 8px 32px rgba(37,99,255,0.12);
    }
    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-mute);
      pointer-events: none;
      transition: color 0.18s;
    }
    .search-wrap:focus-within .search-icon { color: var(--blue); }
    .kbd {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--ink-mute);
      border: 1px solid var(--ink-faint);
      border-bottom-width: 2px;
      border-radius: 6px;
      padding: 4px 8px;
      pointer-events: none;
      background: var(--input-bg);
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      color: var(--ink-mute);
      flex-wrap: wrap;
      justify-content: center;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 11px;
      border: 1px solid var(--ink-faint);
      border-radius: 999px;
      background: var(--input-bg);
      transition: border-color 0.18s, color 0.18s, background 0.18s;
      cursor: none;
    }
    .chip:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-soft); }

    .settings-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-mute);
      background: none;
      border: 1px solid var(--ink-faint);
      border-radius: 8px;
      padding: 5px 10px;
      cursor: none;
      transition: color 0.18s, border-color 0.18s;
    }
    .settings-btn:hover { color: var(--blue); border-color: var(--blue); }

    /* ── Results Page ── */
    .results-root {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .results-topbar {
      position: relative;
      z-index: 6;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--rule);
      background: var(--bg);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .results-search-wrap {
      position: relative;
      flex: 1;
      max-width: 600px;
    }
    .results-search-wrap .search-icon {
      left: 14px;
    }
    .results-search {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--ink-faint);
      border-radius: 10px;
      padding: 11px 60px 11px 40px;
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      cursor: none;
    }
    .results-search::placeholder { color: var(--ink-mute); }
    .results-search:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }
    .results-search-wrap .kbd { right: 10px; }

    .logo-btn {
      background: none;
      border: none;
      cursor: none;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0;
    }
    .logo-btn:hover .logo { background: var(--blue); }

    .results-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 28px 24px 48px;
      position: relative;
      z-index: 5;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      scrollbar-width: thin;
      scrollbar-color: var(--ink-faint) transparent;
    }
    .results-body::-webkit-scrollbar { width: 6px; }
    .results-body::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 3px; }

    .results-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .results-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--ink-mute);
    }
    .results-count b { color: var(--ink); }
    .loading-pulse { animation: textPulse 1.2s ease-in-out infinite; }
    @keyframes textPulse { 0%,100% { opacity: 0.5 } 50% { opacity: 1 } }

    .source-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .source-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue-deep);
      font-weight: 500;
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-card {
      display: block;
      background: var(--card-bg);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.18s, box-shadow 0.18s, transform 0.18s;
      cursor: none;
    }
    .result-card:hover {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft), 0 4px 16px rgba(37,99,255,0.08);
      transform: translateY(-1px);
    }
    .result-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .result-favicon { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
    .result-source {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue-deep);
      flex-shrink: 0;
    }
    .result-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-mute);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-title {
      font-family: 'Geist', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .result-card:hover .result-title { color: var(--blue); }
    .result-description {
      font-size: 13.5px;
      color: var(--ink-mute);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .result-skeleton {
      height: 100px;
      border-radius: 12px;
      background: linear-gradient(90deg, var(--bg) 25%, rgba(37,99,255,0.04) 50%, var(--bg) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border: 1px solid var(--rule);
    }
    @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }

    .results-error {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 20px;
      background: rgba(255,59,48,0.05);
      border: 1px solid rgba(255,59,48,0.2);
      border-radius: 12px;
      margin-top: 20px;
    }
    .error-icon { font-size: 22px; color: #ff3b30; line-height: 1; }
    .error-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .error-desc { font-size: 13px; color: var(--ink-mute); white-space: pre-wrap; }

    .results-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 24px;
      gap: 12px;
      color: var(--ink-mute);
    }
    .empty-icon { opacity: 0.25; margin-bottom: 8px; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--ink); }
    .empty-desc { font-size: 14px; max-width: 360px; line-height: 1.55; }
    .btn-configure {
      margin-top: 12px;
      padding: 10px 20px;
      border-radius: 10px;
      background: var(--blue);
      color: white;
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: none;
      transition: background 0.18s;
    }
    .btn-configure:hover { background: var(--blue-deep); }

    /* ── Settings Modal ── */
    @keyframes overlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(10,10,10,0.45);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: overlayIn 0.15s ease;
    }
    .modal-overlay .modal {
      animation: modalIn 0.18s cubic-bezier(.22,.68,0,1.2);
    }
    .modal {
      background: var(--card-bg);
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.22);
      width: min(580px, 100%);
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--rule);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--rule);
      font-family: 'Geist', sans-serif;
      font-size: 16px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .modal-close {
      background: none;
      border: none;
      cursor: none;
      color: var(--ink-mute);
      font-size: 18px;
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .modal-close:hover { background: var(--rule); color: var(--ink); }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scrollbar-width: thin;
    }
    .modal-section { display: flex; flex-direction: column; gap: 12px; }
    .modal-section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mute);
      padding-bottom: 4px;
      border-bottom: 1px solid var(--rule);
    }
    .modal-field { display: flex; flex-direction: column; gap: 6px; }
    .modal-field label {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ink-soft);
    }
    .modal-field input, .modal-field select {
      padding: 10px 12px;
      border: 1px solid var(--ink-faint);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--ink);
      background: var(--input-bg);
      outline: none;
      transition: border-color 0.18s;
      cursor: none;
    }
    .modal-field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
    .modal-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--blue);
      text-decoration: none;
      align-self: flex-start;
    }
    .modal-link:hover { text-decoration: underline; }

    .api-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--blue-soft);
      border-radius: 8px;
      border: 1px solid rgba(37,99,255,0.12);
    }
    .api-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--blue-deep);
      flex-shrink: 0;
      min-width: 80px;
    }
    .api-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-mute);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .api-remove {
      background: none;
      border: none;
      cursor: none;
      color: var(--ink-mute);
      font-size: 14px;
      width: 24px; height: 24px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .api-remove:hover { background: rgba(255,59,48,0.1); color: #ff3b30; }

    .api-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px;
      background: rgba(0,0,0,0.02);
      border-radius: 10px;
      border: 1px dashed var(--ink-faint);
    }
    .api-form input {
      padding: 9px 11px;
      border: 1px solid var(--ink-faint);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      color: var(--ink);
      background: var(--input-bg);
      outline: none;
      cursor: none;
    }
    .api-form input:focus { border-color: var(--blue); }
    .api-form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .api-form-actions { display: flex; gap: 8px; }
    .api-form-actions button {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      border: none;
      font-family: 'Geist', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: none;
      transition: background 0.15s;
    }
    .api-form-actions button:first-child { background: var(--blue); color: #fff; }
    .api-form-actions button:first-child:hover { background: var(--blue-deep); }
    .api-form-actions button.secondary { background: var(--rule); color: var(--ink-soft); }
    .api-form-actions button.secondary:hover { background: var(--ink-faint); }

    .add-api-btn {
      align-self: flex-start;
      background: none;
      border: 1px dashed var(--ink-faint);
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--ink-mute);
      cursor: none;
      transition: color 0.18s, border-color 0.18s;
    }
    .add-api-btn:hover { color: var(--blue); border-color: var(--blue); }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: flex-end;
      flex-shrink: 0;
    }
    .btn-save {
      padding: 10px 24px;
      border-radius: 10px;
      background: var(--ink);
      color: #fff;
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: none;
      transition: background 0.15s;
    }
    .btn-save:hover { background: var(--blue); }

    .api-hint {
      font-size: 12px;
      color: var(--ink-mute);
      line-height: 1.55;
      padding: 10px 12px;
      background: rgba(37,99,255,0.04);
      border-radius: 8px;
      border-left: 3px solid var(--blue);
    }

    /* ── Phone card ── */
    .phone-card {
      border-radius: 14px;
      border: 1.5px solid var(--rule);
      background: var(--card-bg);
      padding: 20px 22px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .phone-card.valid   { border-color: #16a34a; background: rgba(22,163,74,0.04); }
    .phone-card.invalid { border-color: #dc2626; background: rgba(220,38,38,0.04); }

    .phone-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .phone-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-mute);
      display: flex; align-items: center; gap: 7px;
    }
    .phone-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border-radius: 999px;
    }
    .phone-badge.valid   { background: rgba(22,163,74,0.12); color: #16a34a; }
    .phone-badge.invalid { background: rgba(220,38,38,0.10); color: #dc2626; }

    .phone-number-display {
      font-family: 'Geist', sans-serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
    }
    .phone-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .phone-meta-item {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      padding: 4px 10px;
      border-radius: 8px;
      background: rgba(0,0,0,0.04);
      color: var(--ink-soft);
      display: flex; align-items: center; gap: 5px;
    }
    .phone-invalid-msg {
      font-size: 13.5px;
      color: #dc2626;
      opacity: 0.85;
    }
    .phone-osint-section { margin-top:4px; padding-top:12px; border-top:1px solid var(--rule); display:flex; flex-direction:column; gap:8px; }
    .phone-osint-title { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-mute); font-family:'JetBrains Mono',monospace; }
    .phone-osint-meta { display:flex; flex-wrap:wrap; gap:6px; }
    .phone-rep-grid { display:flex; flex-wrap:wrap; gap:6px; }
    .phone-rep-link { display:inline-flex; align-items:center; gap:5px; padding:5px 11px; border-radius:8px; border:1px solid var(--rule); background:var(--input-bg); color:var(--ink-soft); font-size:12px; font-family:'Geist',sans-serif; text-decoration:none; transition:border-color .12s, color .12s; }
    .phone-rep-link:hover { border-color:var(--blue); color:var(--blue); }

    /* ── Social Check Card ── */
    .social-card { border-radius:14px; border:1.5px solid var(--rule); background:var(--card-bg); padding:20px 22px; margin-bottom:20px; display:flex; flex-direction:column; gap:12px; }
    .social-auto { display:flex; flex-direction:column; gap:6px; }
    .social-auto-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 13px; border-radius:9px; background:rgba(0,0,0,0.03); border:1px solid var(--rule); flex-wrap:wrap; }
    .social-auto-label { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-mute); flex-shrink:0; }
    .social-auto-val { font-size:13px; font-weight:500; display:flex; align-items:center; gap:6px; font-family:'Geist',sans-serif; }
    .social-found { color:#16a34a; } .social-notfound { color:var(--ink-mute); } .social-loading { color:var(--ink-mute); opacity:0.55; }

    /* ── Bulk Email Page ── */
    .bulk-root { position:relative; height:100%; display:flex; flex-direction:column; overflow:hidden; }
    .bulk-body { flex:1; overflow-y:auto; padding:80px 24px 80px; max-width:740px; width:100%; margin:0 auto; position:relative; z-index:1; scrollbar-width:none; }
    .bulk-body::-webkit-scrollbar { display:none; }
    .bulk-title { font-family:'Geist',sans-serif; font-size:28px; font-weight:700; letter-spacing:-.03em; color:var(--ink); margin-bottom:6px; }
    .bulk-sub { font-size:13px; color:var(--ink-mute); margin-bottom:20px; font-family:'Geist',sans-serif; }
    .bulk-textarea { width:100%; min-height:110px; padding:13px 15px; border-radius:12px; border:1.5px solid var(--rule); background:var(--input-bg); color:var(--ink); font-family:'JetBrains Mono',monospace; font-size:13px; resize:vertical; outline:none; margin-bottom:12px; transition:border-color .15s; }
    .bulk-textarea:focus { border-color:var(--blue); }
    .bulk-btn { display:inline-flex; align-items:center; gap:8px; padding:10px 22px; background:var(--blue); color:#fff; border:none; border-radius:9px; font-family:'Geist',sans-serif; font-weight:600; font-size:14px; cursor:none; transition:opacity .15s; }
    .bulk-btn:hover { opacity:0.88; } .bulk-btn:disabled { opacity:0.4; }
    .bulk-export-btn { background:none; border:1px solid var(--rule); color:var(--ink-mute); font-family:'JetBrains Mono',monospace; font-size:11px; padding:7px 14px; border-radius:8px; cursor:none; transition:all .15s; }
    .bulk-export-btn:hover { border-color:var(--blue); color:var(--blue); }
    .bulk-table { width:100%; border-collapse:collapse; margin-top:24px; }
    .bulk-table th { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-mute); padding:8px 14px; text-align:left; border-bottom:1px solid var(--rule); }
    .bulk-table td { padding:11px 14px; border-bottom:1px solid var(--ink-faint); font-size:13px; vertical-align:middle; }
    .bulk-table tr:hover td { background:rgba(0,0,0,0.015); }
    .bulk-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:999px; font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; }
    .bulk-badge-ok { background:rgba(220,38,38,0.12); color:#dc2626; }
    .bulk-badge-clean { background:rgba(22,163,74,0.12); color:#16a34a; }
    .bulk-badge-loading { background:rgba(107,114,128,0.1); color:var(--ink-mute); }
    .bulk-badge-error { background:rgba(245,158,11,0.12); color:#d97706; }

    /* ── Messaging Card ── */
    .msg-card {
      border-radius: 14px;
      border: 1.5px solid var(--rule);
      background: var(--bg);
      padding: 20px 22px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .msg-card-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-mute);
      display: flex; align-items: center; gap: 7px;
    }
    .msg-platforms { display: flex; flex-direction: column; gap: 8px; }
    .msg-platform {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid var(--rule);
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
      background: var(--bg);
    }
    .msg-platform:hover { border-color: var(--mc); background: var(--mb); }
    .msg-platform-dot {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .msg-platform-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .msg-platform-name { font-weight: 600; font-size: 14px; color: var(--ink); }
    .msg-platform-desc { font-size: 11.5px; color: var(--ink-mute); }
    .msg-note {
      padding: 10px 14px;
      background: rgba(59,130,246,0.07);
      border-radius: 8px;
      font-size: 12px;
      color: var(--ink-mute);
      border-left: 3px solid var(--blue);
      line-height: 1.5;
    }

    /* ── Nav buttons ── */
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-mute);
      background: none;
      border: 1px solid var(--ink-faint);
      border-radius: 8px;
      padding: 5px 10px;
      cursor: none;
      transition: color 0.18s, border-color 0.18s, background 0.18s;
      white-space: nowrap;
    }
    .nav-btn:hover { color: var(--blue); border-color: var(--blue); background: var(--blue-soft); }
    .nav-btn.home:hover { color: var(--ink); border-color: var(--ink); background: rgba(10,10,10,0.05); }

    /* ── Pricing Modal ── */
    .pricing-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(10,10,10,0.45);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: overlayIn 0.15s ease;
    }
    .pricing-overlay .pricing-modal {
      animation: modalIn 0.18s cubic-bezier(.22,.68,0,1.2);
    }
    .pricing-modal {
      background: var(--bg);
      border-radius: 22px;
      box-shadow: 0 32px 100px rgba(0,0,0,0.25);
      width: min(860px, 100%);
      max-height: 92vh;
      overflow-y: auto;
      border: 1px solid var(--rule);
      padding: 40px;
      scrollbar-width: thin;
    }
    .pricing-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .pricing-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 10px;
    }
    .pricing-title {
      font-family: 'Geist', sans-serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .pricing-subtitle {
      font-size: 15px;
      color: var(--ink-mute);
    }
    .pricing-close {
      position: absolute;
      top: 20px; right: 24px;
      background: none;
      border: none;
      cursor: none;
      color: var(--ink-mute);
      font-size: 20px;
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .pricing-close:hover { background: var(--rule); color: var(--ink); }

    .pricing-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 640px) { .pricing-cards { grid-template-columns: 1fr; } }

    .pricing-card {
      border: 1.5px solid var(--rule);
      border-radius: 16px;
      padding: 28px 26px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      transition: transform 0.22s cubic-bezier(.22,.68,0,1.2), box-shadow 0.22s ease, border-color 0.22s ease;
      cursor: none;
      background: var(--sb-bg);
    }
    .pricing-card:hover {
      transform: translateY(-6px) scale(1.012);
      box-shadow: 0 20px 60px rgba(37,99,255,0.12), 0 4px 16px rgba(0,0,0,0.06);
      border-color: var(--blue);
    }
    .pricing-card.popular {
      border-color: var(--blue);
      background: linear-gradient(135deg, rgba(37,99,255,0.06) 0%, var(--sb-bg) 60%);
    }
    .pricing-card.popular:hover {
      transform: translateY(-8px) scale(1.016);
      box-shadow: 0 28px 72px rgba(37,99,255,0.18), 0 4px 20px rgba(0,0,0,0.08);
    }

    .popular-badge {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--blue);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .plan-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }
    .plan-price {
      display: flex;
      align-items: baseline;
      gap: 4px;
      line-height: 1;
    }
    .plan-amount {
      font-family: 'Geist', sans-serif;
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--ink);
    }
    .plan-currency {
      font-family: 'Geist', sans-serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--ink-mute);
      align-self: flex-start;
      margin-top: 8px;
    }
    .plan-period {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--ink-mute);
    }
    .plan-desc {
      font-size: 13.5px;
      color: var(--ink-mute);
      line-height: 1.5;
    }
    .plan-features {
      display: flex;
      flex-direction: column;
      gap: 9px;
      flex: 1;
    }
    .plan-feature {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      font-size: 13.5px;
      color: var(--ink-soft);
      line-height: 1.4;
    }
    .plan-feature .check {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(22,163,74,0.12);
      color: #16a34a;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .pricing-card.popular .plan-feature .check {
      background: var(--blue-soft);
      color: var(--blue);
    }
    .plan-cta {
      width: 100%;
      padding: 13px;
      border-radius: 11px;
      border: none;
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: none;
      transition: background 0.18s, transform 0.12s;
    }
    .plan-cta:hover { transform: scale(1.02); }
    .plan-cta.free { background: var(--rule); color: var(--ink); }
    .plan-cta.free:hover { background: var(--ink-faint); }
    .plan-cta.paid { background: var(--blue); color: #fff; }
    .plan-cta.paid:hover { background: var(--blue-deep); }

    .pricing-divider {
      margin: 28px 0 20px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-mute);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .pricing-divider::before, .pricing-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--rule);
    }

    /* ── IP card ── */
    .ip-card {
      border-radius: 14px;
      border: 1.5px solid var(--blue);
      background: var(--blue-soft);
      padding: 20px 22px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .ip-card.loading { opacity: 0.7; }
    .ip-card.error { border-color: #dc2626; background: rgba(220,38,38,0.04); }
    .ip-address {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .ip-location {
      font-family: 'Geist', sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ip-flag { font-size: 22px; line-height: 1; }
    .ip-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ip-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 8px;
      background: rgba(99,102,241,0.09);
      color: var(--blue);
      font-weight: 500;
    }

    /* ── Shodan card ── */
    .shodan-card {
      border-radius: 14px;
      border: 1.5px solid #f97316;
      background: rgba(249,115,22,0.04);
      padding: 20px 22px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .shodan-card.loading { opacity: 0.7; }
    .shodan-card.error   { border-color: #dc2626; background: rgba(220,38,38,0.04); }
    .shodan-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ea580c;
      display: flex; align-items: center; gap: 7px;
    }
    .shodan-ports {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .shodan-port {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 6px;
      background: rgba(249,115,22,0.12);
      color: #c2410c;
    }
    .shodan-services {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .shodan-service {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      color: var(--ink-soft);
    }
    .shodan-service-port {
      background: rgba(249,115,22,0.12);
      color: #c2410c;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 5px;
      flex-shrink: 0;
    }
    .shodan-service-name { color: var(--ink); font-weight: 600; }
    .shodan-vulns {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .shodan-vuln {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 5px;
      background: rgba(220,38,38,0.1);
      color: #dc2626;
    }
    .shodan-org {
      font-size: 13px;
      color: var(--ink-mute);
    }

    /* ── Person card ── */
    .person-card {
      border-radius: 14px;
      border: 1.5px solid var(--blue);
      background: var(--blue-soft);
      padding: 20px 22px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .person-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--blue);
      display: flex; align-items: center; gap: 7px;
    }
    .person-name-display {
      font-family: 'Geist', sans-serif;
      font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink);
      line-height: 1;
    }
    .person-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 8px;
    }
    .person-link {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 13px; border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.07);
      text-decoration: none;
      font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500;
      color: var(--ink); background: rgba(255,255,255,0.8);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      cursor: none;
    }
    .person-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      background: #fff;
    }
    .person-link-name { flex: 1; }
    .person-link-arrow { font-size: 10px; opacity: 0.35; flex-shrink: 0; }
    .person-note {
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
      color: var(--ink-mute); line-height: 1.55;
      padding: 8px 12px; background: rgba(0,0,0,0.03); border-radius: 8px;
    }

    /* ── Built-in sources banner ── */
    .builtin-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .builtin-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--ink-mute);
    }
    .builtin-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid var(--ink-faint);
      color: var(--ink-mute);
      display: flex; align-items: center; gap: 5px;
    }
    .builtin-chip .dot-green { width: 5px; height: 5px; border-radius: 50%; background: #16a34a; }

    @keyframes drift-0 { from { translate: 0 0 } to { translate: 8px -6px } }
    @keyframes drift-1 { from { translate: 0 0 } to { translate: -10px 4px } }
    @keyframes drift-2 { from { translate: 0 0 } to { translate: 6px 8px } }
    @keyframes drift-3 { from { translate: 0 0 } to { translate: -7px -9px } }

    @media (max-width: 640px) {
      /* hide desktop-only decorations */
      .corner.tr, .corner.bl { display: none; }
      .cursor-dot, .cursor-ring { display: none !important; }
      .magnifier { display: none !important; }

      /* top-left logo closer to edge */
      .corner.tl { top: 14px; left: 14px; }

      /* bottom-right corner → full-width scrollable nav bar */
      .corner.br {
        bottom: 0; left: 0; right: 0;
        flex-wrap: nowrap;
        gap: 6px;
        padding: 10px 14px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
        background: var(--bg);
        border-top: 1px solid var(--rule);
        box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
        overflow-x: auto;
        justify-content: flex-start;
        scrollbar-width: none;
        z-index: 20;
      }
      .corner.br::-webkit-scrollbar { display: none; }

      /* home stage: extra bottom room for nav bar + less top */
      .stage { padding: 60px 16px 100px; gap: 26px; }
      .tag { font-size: 13px; margin-top: 12px; }

      /* results page */
      .results-topbar { padding: 10px 12px; }
      .results-body { padding: 18px 14px 30px; }

      /* dashboard */
      .dashboard-body { padding: 56px 14px 24px; }
      .api-form-row { grid-template-columns: 1fr; }

      /* volume control: lift above bottom bar */
      .vol-ctrl { bottom: 72px; left: 14px; min-width: 148px; padding: 8px 12px; }
    }
    /* ── Auth page ── */
    .auth-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; background: #06060e; font-family: 'Geist', sans-serif;
    }
    .auth-left {
      width: 56%; background: #06060e; display: flex; flex-direction: column;
      justify-content: flex-end; padding: 48px 52px;
      border-right: 1px solid rgba(120,50,255,0.18);
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .auth-left::before {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 80% at 48% 42%, rgba(130,50,255,0.16) 0%, transparent 62%),
        radial-gradient(ellipse 45% 50% at 88% 12%, rgba(160,80,255,0.1) 0%, transparent 58%),
        radial-gradient(ellipse 50% 45% at 4% 88%, rgba(80,20,200,0.13) 0%, transparent 58%),
        radial-gradient(ellipse 30% 30% at 20% 20%, rgba(200,100,255,0.06) 0%, transparent 50%);

    .auth-left > * { position: relative; z-index: 1; }
    .auth-globe-canvas { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -52%); z-index: 0; pointer-events: none; opacity: 0.92; }
    .auth-left-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 0; }
    .auth-left-brand-mark {
      width: 32px; height: 32px; border-radius: 8px; background: #fff; color: #07070f;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; flex-shrink: 0;
    }
    .auth-left-brand-name { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
    .auth-left-content { margin-top: auto; padding-top: 60%; }
    .auth-left-title {
      font-size: 58px; font-weight: 900; color: #fff;
      line-height: 0.97; letter-spacing: -0.055em; margin-bottom: 24px;
      text-shadow: 0 0 100px rgba(160,80,255,0.4);
    }
    .auth-left-title em {
      background: linear-gradient(135deg, #d8b4fe 0%, #a78bfa 45%, #818cf8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; font-style: normal;
    }
    .auth-features { display: flex; flex-direction: column; gap: 14px; margin-bottom: 32px; }
    .auth-feature { display: flex; align-items: flex-start; gap: 11px; }
    .auth-feature-icon {
      width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0; margin-top: 1px;
      background: rgba(140,60,255,0.14); border: 1px solid rgba(140,60,255,0.28);
      display: flex; align-items: center; justify-content: center; font-size: 12px;
    }
    .auth-feature-text { font-size: 12.5px; color: rgba(255,255,255,0.4); line-height: 1.6; padding-top: 3px; }
    .auth-feature-text strong { color: rgba(255,255,255,0.82); font-weight: 600; }
    .auth-bottom { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .auth-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .auth-badge {
      padding: 4px 10px; border-radius: 99px; font-size: 10px; letter-spacing: 0.06em;
      color: rgba(200,160,255,0.5); background: rgba(140,60,255,0.08);
      border: 1px solid rgba(140,60,255,0.2); text-transform: uppercase;
    }
    .auth-tagline { font-size: 11px; color: rgba(255,255,255,0.2); font-style: italic; }
    .auth-right {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px; background: #08081a;
    }
    .auth-card {
      width: 100%; max-width: 400px; background: rgba(14,14,28,0.95);
      border: 1px solid rgba(140,60,255,0.2); border-radius: 20px;
      padding: 26px; display: flex; flex-direction: column; gap: 15px;
      box-shadow: 0 0 80px rgba(120,50,255,0.12), 0 24px 60px rgba(0,0,0,0.5);
    }
    .auth-card-title {
      font-size: 17px; font-weight: 700; color: #fff;
      letter-spacing: -0.02em; text-align: center; margin-bottom: 2px;
    }
    .auth-tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 11px; padding: 3px;
    }
    .auth-tab {
      padding: 9px 12px; border: none; background: transparent; border-radius: 9px;
      font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,0.32); cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .auth-tab.active { background: rgba(140,60,255,0.18); color: #d8b4fe; border: 1px solid rgba(140,60,255,0.3); }
    .auth-form { display: flex; flex-direction: column; gap: 12px; }
    .auth-field { display: flex; flex-direction: column; gap: 5px; }
    .auth-field label {
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 500;
      color: rgba(255,255,255,0.28); text-transform: uppercase; letter-spacing: 0.07em;
    }
    .auth-input {
      width: 100%; padding: 11px 14px; box-sizing: border-box;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
      font-family: 'Geist', sans-serif; font-size: 13px; color: #fff;
      background: rgba(255,255,255,0.04); outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .auth-input::placeholder { color: rgba(255,255,255,0.16); }
    .auth-input:focus { border-color: rgba(140,60,255,0.5); box-shadow: 0 0 0 3px rgba(140,60,255,0.1); background: rgba(140,60,255,0.05); }
    .auth-submit {
      width: 100%; padding: 13px; background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff; border: none; border-radius: 10px; font-family: 'Geist', sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .auth-submit:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 28px rgba(124,58,237,0.55); }
    .auth-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .auth-error {
      padding: 9px 13px; border-radius: 9px; font-size: 12px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171;
    }
    .auth-footer {
      font-size: 11px; color: rgba(255,255,255,0.16); text-align: center; line-height: 1.7;
    }
    @media (max-width: 800px) {
      .auth-left { display: none; }
      .auth-right { background: #06060e; }
    }
    /* ── Theme Modal ── */
    .theme-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 6px;
    }
    .theme-card {
      border: 2px solid var(--rule); border-radius: 12px;
      padding: 13px 11px; cursor: pointer; transition: all 0.15s;
      display: flex; flex-direction: column; gap: 9px; background: var(--bg);
    }
    .theme-card:hover { border-color: var(--blue); }
    .theme-card.selected { border-color: var(--blue); background: var(--blue-soft); }
    .theme-swatches { display: flex; gap: 5px; }
    .theme-swatch {
      width: 18px; height: 18px; border-radius: 50%;
      border: 1.5px solid rgba(128,128,128,0.2);
    }
    .theme-card-name {
      font-family: 'Geist', sans-serif; font-size: 12px; font-weight: 600; color: var(--ink);
    }
    .theme-custom-section {
      border-top: 1.5px solid var(--rule); padding-top: 16px; margin-top: 8px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .theme-section-label {
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-mute); margin-bottom: 2px;
    }
    .theme-color-row {
      display: flex; align-items: center; gap: 10px;
    }
    .theme-color-row label {
      font-family: 'Geist', sans-serif; font-size: 13px; color: var(--ink); min-width: 70px;
    }
    .theme-color-input {
      width: 34px; height: 34px; border: none; border-radius: 8px;
      cursor: pointer; padding: 2px; background: var(--rule); flex-shrink: 0;
    }
    .theme-hex {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      width: 88px; padding: 6px 9px; border: 1.5px solid var(--rule);
      border-radius: 8px; background: var(--bg); color: var(--ink); outline: none;
    }
    .theme-hex:focus { border-color: var(--blue); }
    .theme-select {
      flex: 1; padding: 8px 10px; border: 1.5px solid var(--rule);
      border-radius: 8px; font-family: 'Geist', sans-serif; font-size: 13px;
      background: var(--bg); color: var(--ink); cursor: pointer; outline: none;
    }
    .theme-select:focus { border-color: var(--blue); }
    /* ── Discord button ── */
    .auth-divider {
      display: flex; align-items: center; gap: 12px;
      color: rgba(255,255,255,0.2); font-size: 12px; font-family: 'Geist', sans-serif;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07);
    }
    .discord-btn {
      width: 100%; padding: 13px 20px;
      background: rgba(88,101,242,0.12); border: 1px solid rgba(88,101,242,0.28);
      color: rgba(165,180,252,0.9); border-radius: 10px;
      font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.15s; position: relative; overflow: hidden;
    }
    .discord-btn:hover {
      background: rgba(88,101,242,0.22); border-color: rgba(88,101,242,0.45);
      color: #c7d2ff; transform: translateY(-1px);
    }
    .discord-btn:active { transform: none; }
    .discord-logo { flex-shrink: 0; }
    .user-avatar-img {
      width: 20px; height: 20px; border-radius: 50%; object-fit: cover;
    }
    /* logout button */
    .nav-btn.logout { color: #b91c1c; }
    .nav-btn.logout:hover { border-color: #b91c1c; background: rgba(220,38,38,0.07); color: #b91c1c; }
    /* apparence button accent */
    .nav-btn.apparence:hover { color: var(--blue); border-color: var(--blue); background: var(--blue-soft); }
    /* user chip in nav */
    .user-chip {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--ink-mute); white-space: nowrap;
    }
    .user-avatar {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--blue); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
    }

    /* ── Suggestions dropdown ── */
    .search-suggestions {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--bg); border: 1px solid var(--rule);
      border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      z-index: 100; overflow: hidden;
    }
    .suggestion-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: none; transition: background 0.12s;
      font-family: 'Geist', sans-serif; font-size: 14px; color: var(--ink);
    }
    .suggestion-item:hover { background: var(--blue-soft); }
    .sug-type {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      padding: 2px 7px; border-radius: 999px; flex-shrink: 0;
      background: var(--blue-soft); color: var(--blue-deep);

    .sug-type[data-t="email"]    { background: rgba(245,158,11,0.14); color: #b45309; }
    .sug-type[data-t="ip"]       { background: rgba(239,68,68,0.14);  color: #dc2626; }
    .sug-type[data-t="domain"]   { background: rgba(139,92,246,0.14); color: #7c3aed; }
    .sug-type[data-t="username"] { background: rgba(14,165,233,0.14); color: #0284c7; }
    .sug-type[data-t="tiktok"]   { background: rgba(0,0,0,0.1);       color: var(--ink); }
    .sug-type[data-t="person"]   { background: rgba(236,72,153,0.14); color: #be185d; }
    .sug-type[data-t="image"]    { background: rgba(168,85,247,0.14); color: #9333ea; }
    .suggestion-clear {
      display: flex; align-items: center; justify-content: flex-end;
      padding: 6px 14px; border-top: 1px solid var(--rule);
      font-size: 11px; color: var(--ink-mute); cursor: none;
      font-family: 'JetBrains Mono', monospace; transition: color 0.15s;
    }
    .suggestion-clear:hover { color: #dc2626; }

    /* ── Copy button ── */
    .copy-btn {
      background: none; border: 1px solid var(--ink-faint); border-radius: 7px;
      padding: 4px 9px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
      color: var(--ink-mute); cursor: none; display: inline-flex; align-items: center;
      gap: 4px; transition: all 0.15s; flex-shrink: 0;
    }
    .copy-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-soft); }
    .copy-btn.copied { border-color: #16a34a; color: #16a34a; background: rgba(22,163,74,0.08); }

    /* ── Export button ── */
    .export-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute);
      background: none; border: 1px solid var(--ink-faint); border-radius: 8px;
      padding: 5px 10px; cursor: none; transition: color 0.18s, border-color 0.18s, background 0.18s;
      white-space: nowrap;
    }
    .export-btn:hover { color: var(--blue); border-color: var(--blue); background: var(--blue-soft); }

    /* ── WHOIS card ── */
    .whois-card {
      border-radius: 14px; border: 1.5px solid var(--blue); background: var(--blue-soft);
      padding: 20px 22px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 14px;

      letter-spacing: -0.01em; color: var(--ink);

    .whois-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .whois-row { display: flex; flex-direction: column; gap: 4px; }
    .whois-label {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-mute);

    .whois-value { font-family: 'Geist', sans-serif; font-size: 14px; color: var(--ink); }
    .whois-ns { display: flex; flex-wrap: wrap; gap: 6px; }
    .whois-ns-item {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      padding: 3px 9px; border-radius: 8px; background: rgba(0,0,0,0.04); color: var(--ink-soft);
    }
    .whois-status { display: flex; flex-wrap: wrap; gap: 6px; }
    .whois-status-tag {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      padding: 3px 8px; border-radius: 6px; background: rgba(99,102,241,0.09); color: var(--blue);
    }

    /* ── Profile modal ── */
    .profile-tabs {
      display: flex; gap: 4px; background: var(--rule); border-radius: 10px;
      padding: 3px; margin-bottom: 4px;
    }
    .profile-tab {
      flex: 1; padding: 8px; border: none; background: transparent; border-radius: 8px;
      font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500;
      color: var(--ink-mute); cursor: none; transition: all 0.15s;
    }
    .profile-tab.active { background: #fff; color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .profile-avatar-preview {
      width: 64px; height: 64px; border-radius: 50%; background: var(--blue); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; font-family: 'Geist', sans-serif;
      flex-shrink: 0; border: 2px solid var(--rule); object-fit: cover;
    }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-card {
      background: var(--blue-soft); border-radius: 12px; padding: 14px 12px;
      display: flex; flex-direction: column; gap: 4px; border: 1px solid rgba(37,99,255,0.1);
    }
    .stat-value {
      font-family: 'Geist', sans-serif; font-size: 26px; font-weight: 700;
      color: var(--blue); letter-spacing: -0.03em; line-height: 1;
    }
    .stat-label {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-mute);

    .history-list {
      display: flex; flex-direction: column; gap: 5px;

      font-family: 'JetBrains Mono', monospace; font-size: 9.5px;

    .hist-type[data-t="email"]    { background: rgba(245,158,11,0.14); color: #b45309; }
    .hist-type[data-t="ip"]       { background: rgba(239,68,68,0.14);  color: #dc2626; }
    .hist-type[data-t="domain"]   { background: rgba(139,92,246,0.14); color: #7c3aed; }
    .hist-type[data-t="username"] { background: rgba(14,165,233,0.14); color: #0284c7; }
    .hist-type[data-t="tiktok"]   { background: rgba(0,0,0,0.1);       color: var(--ink); }

    .user-chip-btn {

      display: inline-flex; align-items: center; gap: 6px;

    .user-chip-btn:hover .user-avatar { background: var(--blue-deep); }

      position: relative; z-index: 1;

      gap: 10px; margin-bottom: 52px;

    .patchnote-hero-title {

    .patchnote-version-header {
