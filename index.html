    }
    .patchnote-version-tag {
      font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;
      padding: 5px 13px; border-radius: 999px;
      background: var(--ink); color: #fff; letter-spacing: 0.02em;
    }
    .patchnote-version-tag.latest { background: var(--blue); }
    .patchnote-version-date {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--ink-mute); letter-spacing: 0.04em;
    }
    .patchnote-version-name {
      font-family: 'Geist', sans-serif; font-size: 15px; font-weight: 600;
      color: var(--ink); margin-left: auto;
    }
    .patchnote-entries { display: flex; flex-direction: column; gap: 6px; }
    .patchnote-entry {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 11px 14px; border-radius: 10px; border: 1px solid var(--rule);
      background: var(--sb-bg); transition: border-color 0.15s;
    }
    .patchnote-entry:hover { border-color: var(--blue); }
    .patchnote-tag {
      font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 700;
      padding: 3px 8px; border-radius: 6px; flex-shrink: 0; letter-spacing: 0.06em;
      text-transform: uppercase; margin-top: 1px;
    }
    .patchnote-tag.new  { background: rgba(22,163,74,0.12);  color: #15803d; }
    .patchnote-tag.fix  { background: rgba(245,158,11,0.12); color: #b45309; }
    .patchnote-tag.perf { background: rgba(37,99,255,0.1);   color: var(--blue); }
    .patchnote-entry-text {
      font-family: 'Geist', sans-serif; font-size: 14px; color: var(--ink-soft);
      line-height: 1.5; flex: 1;
    }
    .patchnote-entry-text strong { color: var(--ink); font-weight: 600; }

    /* ── Credits badge ── */
    .credits-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 999px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
      border: 1px solid; cursor: none; transition: all 0.18s;
      white-space: nowrap; background: none;
    }
    .credits-badge.ok    { border-color: rgba(22,163,74,0.3);  color: #16a34a; background: rgba(22,163,74,0.08); }
    .credits-badge.low   { border-color: rgba(245,158,11,0.3); color: #d97706; background: rgba(245,158,11,0.08); }
    .credits-badge.empty { border-color: rgba(220,38,38,0.3);  color: #dc2626; background: rgba(220,38,38,0.08);
                           animation: creditPulse 1.5s ease infinite; }
    @keyframes creditPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.3); }
      50%     { box-shadow: 0 0 0 5px rgba(220,38,38,0); }
    }
    .credits-badge:hover { filter: brightness(0.88); transform: scale(1.04); }

    /* ── Redeem modal ── */
    .redeem-input {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid var(--ink-faint); border-radius: 10px;
      font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--ink);
      background: var(--bg); outline: none; transition: border-color 0.18s;
      letter-spacing: 0.06em; text-transform: uppercase; cursor: none;
    }
    .redeem-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
    .redeem-input.error-state { border-color: #dc2626; }
    .redeem-msg { padding: 11px 14px; border-radius: 9px; font-size: 13px; margin-top: 2px; font-family: 'Geist', sans-serif; }
    .redeem-msg.success { background: rgba(22,163,74,0.08); border: 1px solid rgba(22,163,74,0.25); color: #15803d; }
    .redeem-msg.error   { background: rgba(220,38,38,0.07); border: 1px solid rgba(220,38,38,0.2);  color: #b91c1c; }

    /* ── Dashboard ── */
    .dashboard-root { position:relative; height:100%; display:flex; flex-direction:column; overflow:hidden; }
    .dashboard-body {
      flex:1; overflow-y:auto; overflow-x:hidden; padding:80px 28px 80px;
      width:100%; max-width:1080px; margin:0 auto; box-sizing:border-box;
      display:grid; grid-template-columns:1fr 360px; gap:28px; align-items:start;
      position:relative; z-index:1;
    }
    @media(max-width:820px){ .dashboard-body{grid-template-columns:1fr;} }
    .dash-edit-col { display:flex; flex-direction:column; gap:18px; }
    .dash-preview-col { display:flex; flex-direction:column; gap:14px; position:sticky; top:16px; }
    .dash-section {
      background:var(--surface,rgba(255,255,255,0.04)); border:1px solid var(--rule);
      border-radius:14px; padding:20px; display:flex; flex-direction:column; gap:14px;
    }
    .dash-stitle {
      font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
      color:var(--ink-mute); letter-spacing:.1em; text-transform:uppercase; margin-bottom:2px;
    }
    .dash-field { display:flex; flex-direction:column; gap:5px; }
    .dash-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-mute); letter-spacing:.07em; text-transform:uppercase; }
    .dash-input {
      width:100%; padding:9px 12px; border:1.5px solid var(--ink-faint); border-radius:8px;
      font-family:'Geist',sans-serif; font-size:13px; color:var(--ink);
      background:var(--bg); outline:none; transition:border-color .18s; cursor:none; box-sizing:border-box;
    }
    .dash-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-soft); }
    .dash-textarea {
      width:100%; padding:9px 12px; border:1.5px solid var(--ink-faint); border-radius:8px;
      font-family:'Geist',sans-serif; font-size:13px; color:var(--ink);
      background:var(--bg); outline:none; transition:border-color .18s; cursor:none;
      resize:vertical; min-height:70px; line-height:1.5; box-sizing:border-box;
    }
    .dash-textarea:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-soft); }
    .dash-btn-primary {
      padding:10px 20px; border-radius:9px; border:none; cursor:none;
      background:var(--ink); color:var(--bg); font-family:'Geist',sans-serif;
      font-size:13px; font-weight:600; transition:opacity .15s;
      display:inline-flex; align-items:center; gap:7px;
    }
    .dash-btn-primary:hover { opacity:.8; }
    .dash-btn-blue {
      padding:10px 20px; border-radius:9px; cursor:none; border:none;
      background:var(--blue); color:#fff; font-family:'Geist',sans-serif;
      font-size:13px; font-weight:600; transition:opacity .15s;
      display:inline-flex; align-items:center; gap:7px;
    }
    .dash-btn-blue:hover { opacity:.85; }
    .dash-btn-sm {
      padding:6px 13px; border-radius:7px; border:1px solid var(--rule); cursor:none;
      background:none; color:var(--ink-mute); font-family:'Geist',sans-serif;
      font-size:12px; transition:all .15s; display:inline-flex; align-items:center; gap:5px;
    }
    .dash-btn-sm:hover { border-color:var(--blue); color:var(--ink); }
    .dash-link-row {
      display:flex; align-items:center; gap:8px; padding:8px 10px;
      border:1px solid var(--rule); border-radius:8px; background:var(--bg);
    }
    .dash-link-row select, .dash-link-row input {
      border:none; background:transparent; font-family:'Geist',sans-serif;
      font-size:12px; color:var(--ink); outline:none; cursor:none;
    }
    .dash-link-row select { flex-shrink:0; font-weight:600; max-width:110px; }
    .dash-link-row input { flex:1; min-width:0; }
    .dash-link-del { border:none; background:none; cursor:none; color:var(--ink-mute); font-size:16px; padding:0 2px; line-height:1; transition:color .12s; }
    .dash-link-del:hover { color:#dc2626; }
    .bg-swatch-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .bg-swatch {
      width:34px; height:34px; border-radius:8px; cursor:none;
      border:2.5px solid transparent; transition:border-color .15s; flex-shrink:0;
    }
    .bg-swatch.active { border-color:var(--blue); }
    .file-pick-btn {
      display:inline-flex; align-items:center; gap:6px; padding:7px 13px;
      border-radius:8px; border:1.5px dashed var(--ink-faint); cursor:none;
      font-family:'Geist',sans-serif; font-size:12px; color:var(--ink-mute);
      background:var(--bg); transition:all .15s;
    }
    .file-pick-btn:hover { border-color:var(--blue); color:var(--ink); }
    .file-pick-btn.has-file { border-style:solid; border-color:rgba(22,163,74,0.4); color:#16a34a; background:rgba(22,163,74,0.06); }
    .audio-mode-toggle { display:flex; gap:6px; margin-bottom:4px; }
    .audio-mode-btn {
      padding:5px 12px; border-radius:7px; border:1px solid var(--rule); cursor:none;
      font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600;
      color:var(--ink-mute); background:var(--bg); transition:all .15s; letter-spacing:.04em;
    }
    .audio-mode-btn.active { background:var(--ink); color:var(--bg); border-color:var(--ink); }
    .badge-pill-row { display:flex; flex-wrap:wrap; gap:8px; }
    .badge-pill {
      display:flex; align-items:center; gap:5px; padding:5px 12px;
      border:1.5px solid var(--rule); border-radius:999px; cursor:none;
      font-family:'Geist',sans-serif; font-size:12px; color:var(--ink-mute);
      background:var(--bg); transition:all .15s;
    }
    .badge-pill.active { border-color:var(--blue); color:var(--ink); background:var(--blue-soft); }
    .badge-pill.locked { opacity:.38; pointer-events:none; }
    /* mini preview */
    .dash-preview-box {
      border-radius:14px; overflow:hidden; border:1px solid var(--rule);
      position:relative; height:260px; display:flex; align-items:center; justify-content:center;
    }
    .dash-preview-card {
      position:relative; z-index:2; width:190px;
      background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14);
      border-radius:16px; padding:18px 14px; display:flex; flex-direction:column;
      align-items:center; gap:8px; backdrop-filter:blur(16px);
      box-shadow:0 4px 20px rgba(0,0,0,0.45);
    }
    .dash-preview-bg { position:absolute; inset:0; z-index:0; background-size:cover; background-position:center; }
    .dash-preview-overlay { position:absolute; inset:0; z-index:1; background:rgba(0,0,0,0.3); }
    .dash-preview-av {
      width:48px; height:48px; border-radius:50%; object-fit:cover;
      border:2px solid rgba(255,255,255,0.22); flex-shrink:0;
    }
    .dash-preview-av-init {
      width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.14);
      border:2px solid rgba(255,255,255,0.22); display:flex; align-items:center; justify-content:center;
      font-size:18px; font-weight:700; color:rgba(255,255,255,0.85); font-family:'Geist',sans-serif; flex-shrink:0;
    }
    .dash-preview-name { font-family:'Geist',sans-serif; font-size:13px; font-weight:700; color:#fff; text-align:center; }
    .dash-preview-bio { font-family:'Geist',sans-serif; font-size:10px; color:rgba(255,255,255,0.55); text-align:center; line-height:1.4; }

    /* ── Public profile page ── */
    .pub-root { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .pub-bg { position:absolute; inset:0; z-index:0; background-size:cover; background-position:center; }
    .pub-overlay { position:absolute; inset:0; z-index:1; background:rgba(0,0,0,0.4); }
    .pub-card {
      position:relative; z-index:2; width:min(460px,90vw);
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.13);
      border-radius:24px; padding:36px 28px 32px;
      display:flex; flex-direction:column; align-items:center;
      backdrop-filter:blur(16px);
      box-shadow:0 8px 48px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.1);
      overflow-x:hidden; overflow-y:auto; max-height:90vh; gap:0; will-change:transform;
    }
    .pub-card { transform-style: preserve-3d; }
    .pub-tilt-shine { position:absolute; inset:0; border-radius:inherit; pointer-events:none; z-index:10; }
    .pub-av-img { width:84px; height:84px; border-radius:50%; object-fit:cover; border:3px solid rgba(255,255,255,0.22); margin-bottom:14px; box-shadow:0 4px 20px rgba(0,0,0,0.45); }
    .pub-av-init {
      width:84px; height:84px; border-radius:50%; background:rgba(255,255,255,0.13);
      border:3px solid rgba(255,255,255,0.22); margin-bottom:14px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Geist',sans-serif; font-size:34px; font-weight:700; color:rgba(255,255,255,0.85);
    }
    .pub-name { font-family:'Geist',sans-serif; font-size:22px; font-weight:700; color:#fff; letter-spacing:-.02em; text-align:center; margin-bottom:10px; }
    @keyframes spk-float { 0%{transform:translate(-50%,-50%) scale(1);opacity:1} 100%{transform:translate(-50%,-220%) scale(0);opacity:0} }
    @keyframes rainbow-cycle { 0%{background-position:0% 50%} 100%{background-position:200% 50%} }
    @keyframes name-wave { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }
    @keyframes neon-pulse { 0%,100%{text-shadow:0 0 7px #a78bfa,0 0 14px #a78bfa,0 0 28px #7c3aed} 50%{text-shadow:0 0 3px #a78bfa,0 0 5px #a78bfa} }
    @keyframes neon-border-pulse {
      0%,100% { box-shadow:0 0 8px var(--nc),0 0 22px var(--nc),0 0 48px var(--nc),0 8px 48px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.1); }
      50%      { box-shadow:0 0 3px var(--nc),0 0 9px var(--nc),0 0 20px var(--nc),0 8px 48px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.1); }
    }
    .pub-card.has-neon { border-color:var(--nc) !important; animation:neon-border-pulse 2.5s ease-in-out infinite; }
    @keyframes glitch-move { 0%,88%,100%{transform:none;filter:none} 90%{transform:translateX(-3px) skewX(-5deg);filter:hue-rotate(90deg)} 94%{transform:translateX(3px) skewX(5deg);filter:hue-rotate(-90deg)} }
    .pub-name-rainbow { background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#c77dff,#ff6b6b); background-size:200% auto; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:rainbow-cycle 3s linear infinite; }
    .pub-name-neon { color:#a78bfa !important; text-shadow:0 0 7px #a78bfa,0 0 14px #a78bfa,0 0 28px #7c3aed; animation:neon-pulse 2s ease-in-out infinite; }
    .pub-name-glitch { animation:glitch-move 3.5s steps(1) infinite; }
    @keyframes tw-blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .pub-name-tw-cursor { animation:tw-blink 0.65s step-end infinite; margin-left:1px; color:#a78bfa; }
    .pub-badges { display:flex; flex-wrap:wrap; justify-content:center; gap:6px; margin-bottom:14px; max-width:100%; }
    .pub-badge {
      position:relative; display:inline-flex; align-items:center; justify-content:center;
      width:30px; height:30px; border-radius:50%;
      background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.18);
      font-size:15px; cursor:default; transition:transform .15s;
    }
    .pub-badge:hover { transform:scale(1.18); }
    .pub-badge::after {
      content:attr(data-tip); position:absolute; bottom:calc(100% + 7px); left:50%;
      transform:translateX(-50%); white-space:nowrap;
      background:rgba(0,0,0,0.88); color:#fff; font-family:'Geist',sans-serif;
      font-size:11px; font-weight:600; padding:4px 10px; border-radius:7px;
      pointer-events:none; opacity:0; transition:opacity .15s; z-index:99;
    }
    .pub-badge:hover::after { opacity:1; }
    .pub-badge.rank1     { background:linear-gradient(135deg,rgba(255,215,0,0.22),rgba(255,140,0,0.18)); border-color:rgba(255,200,0,0.45); }
    .pub-badge.crown     { background:rgba(255,60,60,0.15);    border-color:rgba(255,60,60,0.35); }
    .pub-badge.early     { background:rgba(255,255,255,0.12);  border-color:rgba(255,255,255,0.25); }
    .pub-badge.verified  { background:rgba(88,101,242,0.2);    border-color:rgba(88,101,242,0.4); }
    .pub-badge.bughunter { background:rgba(34,197,94,0.18);    border-color:rgba(34,197,94,0.35); }
    .pub-badge.searcher  { background:rgba(88,101,242,0.18);   border-color:rgba(88,101,242,0.35); }
    .pub-badge.elite     { background:rgba(100,130,255,0.18);  border-color:rgba(100,130,255,0.38); }
    .pub-badge.sub       { background:rgba(255,200,0,0.18);    border-color:rgba(255,200,0,0.38); }
    @keyframes crownBob { 0%,100%{transform:translateY(0) rotate(-6deg)} 50%{transform:translateY(-4px) rotate(6deg)} }
    .crown-anim { display:inline-block; animation:crownBob 1.4s ease-in-out infinite; }
    .pub-bio { font-family:'Geist',sans-serif; font-size:13px; color:rgba(255,255,255,0.6); text-align:center; line-height:1.6; margin-bottom:22px; max-width:340px; }
    .pub-links { display:flex; flex-direction:column; gap:9px; width:100%; }
    .pub-link-btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      padding:12px 20px; border-radius:12px; border:1px solid rgba(255,255,255,0.13);
      background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.88);
      font-family:'Geist',sans-serif; font-size:13px; font-weight:500;
      text-decoration:none; transition:all .18s; cursor:pointer;
    }
    .pub-link-btn:hover { background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.28); transform:translateY(-1px); }
    .pub-back {
      position:fixed; top:22px; left:22px; z-index:60;
      padding:8px 16px; border-radius:999px; border:1px solid rgba(255,255,255,0.18);
      background:rgba(0,0,0,0.35); color:rgba(255,255,255,0.82);
      font-family:'JetBrains Mono',monospace; font-size:11px;
      backdrop-filter:blur(12px); cursor:none; transition:all .18s;
    }
    .pub-back:hover { background:rgba(0,0,0,0.55); color:#fff; }
    .vol-ctrl { position:fixed; bottom:24px; left:24px; z-index:60; display:flex; align-items:center; gap:10px; padding:10px 16px; border-radius:999px; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); min-width:170px; }
    .vol-icon { background:none; border:none; cursor:none; font-size:17px; padding:0; line-height:1; color:var(--vol-accent,#fff); flex-shrink:0; }
    .vol-slider { flex:1; -webkit-appearance:none; appearance:none; height:3px; border-radius:2px; background:rgba(255,255,255,0.18); outline:none; cursor:none; }
    .vol-slider::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--vol-accent,#fff); cursor:none; box-shadow:0 0 7px var(--vol-accent,rgba(255,255,255,0.7)); transition:transform .1s; }
    .vol-slider::-webkit-slider-thumb:active { transform:scale(1.35); }
    .vol-slider::-moz-range-thumb { width:13px; height:13px; border-radius:50%; background:var(--vol-accent,#fff); border:none; cursor:none; }
    /* Audio */
    .pub-audio {
      position:fixed; bottom:22px; right:22px; z-index:60;
      display:flex; align-items:center; gap:9px; padding:9px 16px;
      border-radius:999px; border:1px solid rgba(255,255,255,0.14);
      background:rgba(0,0,0,0.45); backdrop-filter:blur(16px);
      color:rgba(255,255,255,0.75); font-family:'JetBrains Mono',monospace; font-size:11px;
    }
    .pub-audio-btn {
      width:28px; height:28px; border-radius:50%; border:none;
      background:rgba(255,255,255,0.14); color:#fff; cursor:none;
      display:flex; align-items:center; justify-content:center; transition:background .15s; flex-shrink:0;
    }
    .pub-audio-btn:hover { background:rgba(255,255,255,0.26); }
    .audio-eq { display:flex; align-items:flex-end; gap:2px; height:14px; }
    .audio-eq-bar { width:3px; background:rgba(255,255,255,0.75); border-radius:2px; min-height:4px; }
    @keyframes eq1 { 0%,100%{height:4px}  50%{height:13px} }
    @keyframes eq2 { 0%,100%{height:9px}  50%{height:4px}  }
    @keyframes eq3 { 0%,100%{height:11px} 50%{height:4px}  }
    .audio-eq-bar:nth-child(1) { animation:eq1 .75s ease infinite; }
    .audio-eq-bar:nth-child(2) { animation:eq2 .75s ease .15s infinite; }
    .audio-eq-bar:nth-child(3) { animation:eq3 .75s ease .3s infinite; }
    .pub-audio.paused .audio-eq-bar { animation-play-state:paused; height:5px !important; }

    /* ── Leaderboard ── */
    .lb-root { position:relative; height:100%; display:flex; flex-direction:column; overflow:hidden; }
    .lb-body { flex:1; overflow-y:auto; padding:80px 24px 80px; max-width:720px; width:100%; margin:0 auto; position:relative; z-index:1; scrollbar-width:none; }
    .lb-body::-webkit-scrollbar { display:none; }
    .lb-title { font-family:'Geist',sans-serif; font-size:28px; font-weight:700; letter-spacing:-.03em; color:var(--ink); margin-bottom:6px; }
    .lb-sub { font-size:13px; color:var(--ink-mute); margin-bottom:32px; font-family:'Geist',sans-serif; }
    .lb-entry {
      display:flex; align-items:center; gap:14px; padding:14px 18px;
      border:1px solid var(--rule); border-radius:14px;
      background:var(--surface,rgba(255,255,255,0.03));
      cursor:none; transition:all .15s; margin-bottom:10px;

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ── Config ────────────────────────────────────────────────────────────────
    const CONFIG_KEY = 'searcher_v1_config';
    const DEFAULT_CONFIG = {
      googleApiKey: '',
      googleCx: '',
      customApis: [],
      followSpeed: 0.12,
      shodanKey: 'yDYVZESGL41gWxqEdSujNxn8caEeYmEI',
    };

    function loadConfig() {
      try {
        const raw = localStorage.getItem(CONFIG_KEY);
        return raw ? { ...DEFAULT_CONFIG, ...JSON.parse(raw) } : { ...DEFAULT_CONFIG };
      } catch { return { ...DEFAULT_CONFIG }; }
    }
    function saveConfig(cfg) {
      try { localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); } catch {}
    }

    // ── Phone validation ──────────────────────────────────────────────────────
    const PHONE_TYPE_FR = {
      MOBILE: 'Mobile', FIXED_LINE: 'Fixe', FIXED_LINE_OR_MOBILE: 'Fixe / Mobile',
      TOLL_FREE: 'Numéro gratuit', PREMIUM_RATE: 'Surtaxé', VOIP: 'VoIP',
      PERSONAL_NUMBER: 'Personnel', PAGER: 'Pager', UAN: 'UAN',
      SHARED_COST: 'Coût partagé',
    };

    function countryFlag(code) {
      if (!code || code.length !== 2) return '';
      return Array.from(code.toUpperCase()).map(c => String.fromCodePoint(c.charCodeAt(0) + 127397)).join('');
    }

    function looksLikePhone(q) {
      const cleaned = q.trim().replace(/[\s\-\.\(\)]/g, '');
      return /^[\+\d]{7,}$/.test(cleaned);
    }

    function getCountryName(code) {
      if (!code) return null;
      try { return new Intl.DisplayNames(['fr'], { type: 'region' }).of(code); }
      catch { return code; }
    }

    // Estimate French carrier from number prefix (approximate)
    function guessCarrier(national, country) {
      if (country !== 'FR') return null;
      const digits = national.replace(/\D/g, '');
      if (digits.length < 4) return null;
      const p = parseInt(digits.substring(0, 4));
      // Free Mobile: 0650-0659, 0750-0759
      if ((p >= 650 && p <= 659) || (p >= 750 && p <= 759)) return 'Free Mobile';
      // Orange: 0600-0609, 0690-0699, 0760-0769
      if ((p >= 600 && p <= 609) || (p >= 690 && p <= 699) || (p >= 760 && p <= 769)) return 'Orange';
      // SFR: 0610-0619, 0670-0679, 0770-0779
      if ((p >= 610 && p <= 619) || (p >= 670 && p <= 679) || (p >= 770 && p <= 779)) return 'SFR';
      // Bouygues: 0620-0629, 0660-0669, 0780-0789
      if ((p >= 620 && p <= 629) || (p >= 660 && p <= 669) || (p >= 780 && p <= 789)) return 'Bouygues';
      // Numéros fixes
      if (digits.startsWith('01') || digits.startsWith('02') || digits.startsWith('03') ||
          digits.startsWith('04') || digits.startsWith('05')) return 'Fixe';
      return null;
    }

    function validatePhone(q) {
      const lib = window.libphonenumber;
      if (!lib) {
        const cleaned = q.replace(/[\s\-\.\(\)]/g, '');
        const valid = /^\+?[1-9]\d{6,14}$/.test(cleaned);
        return { input: q, valid, formatted: q, national: q, country: null, countryName: null, type: null, carrier: null };
      }
      try {
        const parsed = lib.parsePhoneNumber(q, 'FR');
        const country = parsed.country;
        const national = parsed.formatNational();
        return {
          input: q,
          valid: parsed.isValid(),
          formatted: parsed.formatInternational(),
          national,
          country,
          countryName: getCountryName(country),
          type: parsed.getType(),
          carrier: guessCarrier(national, country),
        };
      } catch {
        return { input: q, valid: false, formatted: q, national: q, country: null, countryName: null, type: null, carrier: null };
      }
    }

    async function lookupPhoneOsint(e164) {
      try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), 6000);
        const res = await fetch(`https://api.veriphone.io/v2/verify?phone=${encodeURIComponent(e164)}&key=demo`, { signal: ctrl.signal });
        if (!res.ok) return null;
        const d = await res.json();
        if (!d.phone_valid) return null;
        return {
          carrier: d.carrier || null,
          lineType: d.phone_type || null,
          region: d.phone_region || null,
          localNumber: d.local_number || null,
        };
      } catch { return null; }
    }

    // ── IP geolocation (ipinfo.io) ────────────────────────────────────────────
    function looksLikeIP(q) {
      const s = q.trim();
      if (/^(\d{1,3}\.){3}\d{1,3}$/.test(s)) return true;
      if (/^[0-9a-fA-F:]{2,}:[0-9a-fA-F:]+$/.test(s)) return true;
      return false;
    }

    async function geolocateIP(ip) {
      const res = await fetch(`https://ipinfo.io/${encodeURIComponent(ip.trim())}/json`);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || 'IP introuvable');
      if (data.bogon) throw new Error('Adresse IP privée / réservée');
      return data;
    }

    async function lookupShodan(ip) {
      const res = await fetch(`https://internetdb.shodan.io/${encodeURIComponent(ip.trim())}`);
      if (res.status === 404) throw new Error('Aucune donnée Shodan pour cette IP.');
      if (!res.ok) throw new Error(`Shodan erreur ${res.status}`);
      const d = await res.json();
      // normalize to match the card's expected shape
      return { ports: d.ports || [], data: (d.ports || []).map(p => ({ port: p })), vulns: Object.fromEntries((d.vulns || []).map(v => [v, true])), hostnames: d.hostnames || [], cpes: d.cpes || [], tags: d.tags || [], org: (d.hostnames || [])[0] || '' };
    }

    // ── WHOIS / RDAP lookup ───────────────────────────────────────────────────
    const COMMON_TLDS = new Set(['com','net','org','io','fr','de','uk','co','app','dev','ai','gov','edu','mil','biz','info','tech','online','site','store','shop','blog','club','xyz','live','news','media','digital','cloud','me','tv','cc','us','ca','au','jp','ru','br','it','es','nl','pl','be','ch','at','se','no','dk','fi','nz','sg','hk','in','id','mx','ar','za','ae','sa']);

    function looksLikeDomain(q) {
      let s = q.trim().toLowerCase().replace(/^https?:\/\//,'').replace(/[/?#].*$/,'');
      if (looksLikeIP(s)) return false;
      if (/[\s@]/.test(s)) return false;
      if (!/^[a-z0-9]([a-z0-9\-\.]*[a-z0-9])?$/.test(s)) return false;
      const parts = s.split('.');
      if (parts.length < 2) return false;
      const tld = parts[parts.length - 1];
      return COMMON_TLDS.has(tld) || tld.length === 2;
    }

    function looksLikePerson(q) {
      const s = q.trim();
      if (looksLikeIP(s) || looksLikeDomain(s) || looksLikePhone(s)) return false;
      const words = s.split(/\s+/);
      if (words.length < 2 || words.length > 5) return false;
      // Each word: letters only (accents, hyphens, apostrophes OK), min 2 chars
      const wordOk = w => /^[A-ZÀ-Ÿa-zà-ÿ][A-ZÀ-Ÿa-zà-ÿ'\-]{1,}$/.test(w);
      if (!words.every(wordOk)) return false;
      // At least the first 2 words must start with uppercase
      const startsUpper = w => w[0] === w[0].toUpperCase() && w[0] !== w[0].toLowerCase();
      return startsUpper(words[0]) && startsUpper(words[1]);
    }

    function looksLikeEmail(q) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(q.trim());
    }

    function looksLikeUsername(q) {
      return /^@[a-zA-Z0-9_]{2,30}$/.test(q.trim());
    }

    function looksLikeDiscordId(q) {
      return /^\d{17,19}$/.test(q.trim());
    }

    function looksLikeSteamId(q) {
      return /^765\d{14}$/.test(q.trim());
    }

    function looksLikeUUID(q) {
      return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(q.trim());
    }

    function looksLikeTiktokProfile(q) {
      return /^(?:https?:\/\/)?(?:www\.)?tiktok\.com\/@[a-zA-Z0-9._]{1,30}\/?(\?.*)?$/.test(q.trim());
    }
    function extractTiktokUsername(q) {
      const m = q.trim().match(/tiktok\.com\/@([a-zA-Z0-9._]{1,30})/);
      return m ? m[1] : null;
    }

    function looksLikeImageUrl(q) {
      const s = q.trim().toLowerCase();
      if (!/^https?:\/\//.test(s)) return false;
      if (/\.(jpe?g|png|gif|webp|bmp|svg|tiff?)(\?.*)?$/.test(s)) return true;
      return /i\.imgur\.com|i\.redd\.it|cdn\.discordapp\.com|pbs\.twimg\.com|images\.unsplash\.com|media\.giphy\.com/.test(s);
    }

    function looksLikeEncoded(q) {
      const s = q.trim();
      if (s.length < 4) return false;
      // URL encoded — doit contenir au moins un %XX
      if (/%[0-9A-Fa-f]{2}/.test(s)) return true;
      // Base64 — chars base64 valides + padding = obligatoire pour éviter les faux positifs
      if (/^[A-Za-z0-9+/]+=+$/.test(s) && s.length >= 8) return true;
      // Hex pur — uniquement hex, longueur paire, min 8 chars
      if (/^[0-9a-fA-F]+$/.test(s) && s.length % 2 === 0 && s.length >= 8) return true;
      return false;
    }

    function tryDecode(s) {
      const results = [];
      const isPrintable = str => str.length > 0 &&
        [...str].filter(c => { const n = c.charCodeAt(0); return n >= 32 && n < 127; }).length / str.length > 0.75;

      // URL encoded
      if (/%[0-9A-Fa-f]{2}/.test(s)) {
        try {
          const d = decodeURIComponent(s);
          if (d !== s) results.push({ type:'URL encodé', icon:'🔗', value:d });
        } catch {}
      }

      // Base64
      if (/^[A-Za-z0-9+/=]+$/.test(s) && s.length >= 8) {
        try {
          const d = atob(s.replace(/\s/g,''));
          if (isPrintable(d)) results.push({ type:'Base64', icon:'📦', value:d });
        } catch {}
      }

      // Hex
      if (/^[0-9a-fA-F]+$/.test(s) && s.length % 2 === 0) {
        try {
          const bytes = s.match(/.{2}/g).map(b => parseInt(b, 16));
          const d = String.fromCharCode(...bytes);
          if (isPrintable(d)) results.push({ type:'Hexadécimal', icon:'🔢', value:d });
        } catch {}
      }

      return results;
    }

    async function lookupHudson(query) {
      const q = query.trim();
      const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(q);
      const endpoint = isEmail
        ? `https://cavalier.hudsonrock.com/api/json/v2/osint-tools/search-by-email?email=${encodeURIComponent(q)}`
        : `https://cavalier.hudsonrock.com/api/json/v2/osint-tools/search-by-username?username=${encodeURIComponent(q)}`;
      const res = await fetch(endpoint, { headers: { 'Content-Type': 'application/json' } });
      if (!res.ok) throw new Error(`Erreur ${res.status}`);
      const data = await res.json();
      if (!data.stealers || data.stealers.length === 0) throw new Error('Aucun log infostealer trouvé.');
      return { query: q, stealers: data.stealers };
    }

    async function lookupBreach(query) {
      const q = query.trim();
      const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(q);
      const isIp       = /^(\d{1,3}\.){3}\d{1,3}$/.test(q);
      const isPhone    = !isEmail && !isIp && /^\+?[\d\s\-()+]{7,20}$/.test(q);
      const isDomain   = !isEmail && !isIp && !isPhone && /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/.test(q);
      const isSteamId  = !isEmail && !isIp && !isPhone && !isDomain && looksLikeSteamId(q);
      const isDiscordId= !isEmail && !isIp && !isPhone && !isDomain && !isSteamId && looksLikeDiscordId(q);
      const isUUID     = !isEmail && !isIp && !isPhone && !isDomain && !isSteamId && !isDiscordId && looksLikeUUID(q);
      const isName     = !isEmail && !isIp && !isPhone && !isDomain && !isSteamId && !isDiscordId && !isUUID && /\s/.test(q);
      const out = { query: q };

      // Determine breach.vip fields from query type
      let bvipFields;
      if (isEmail)        bvipFields = ['email'];
      else if (isPhone)   bvipFields = ['phone'];
      else if (isIp)      bvipFields = ['ip'];
      else if (isDomain)  bvipFields = ['domain'];
      else if (isSteamId) bvipFields = ['steamid'];
      else if (isDiscordId) bvipFields = ['discordid'];
      else if (isUUID)    bvipFields = ['uuid'];
      else if (isName)    bvipFields = ['name'];
      else                bvipFields = ['username'];

      const tasks = [
        // COMB
        fetch(`https://api.proxynova.com/comb?query=${encodeURIComponent(q)}&start=0&limit=20`)
          .then(r => r.ok ? r.json() : null)
          .then(d => { if (d) out.comb = { count: d.count || 0, lines: d.lines || [] }; })
          .catch(() => {}),
        // Scylla
        fetch(`https://scylla.sh/search?q=${encodeURIComponent(q)}&size=20`)
          .then(r => r.ok ? r.json() : null)
          .then(d => {
            if (!d) return;
            const raw = d.hits?.hits || (Array.isArray(d) ? d : []);
            const hits = raw.map(h => h._source || h).filter(h => h && (h.email || h.username || h.password));
            if (hits.length) out.scylla = { total: d.hits?.total || hits.length, hits };
          })
          .catch(() => {}),
        // BreachVIP — cascade de proxies jusqu'à succès
        (async () => {
          const body = JSON.stringify({ term: q, fields: bvipFields, wildcard: false, case_sensitive: false });
          const hdrs = { 'Content-Type': 'application/json' };
          const attempts = [
            () => fetch('https://breach.vip/api/search',                                   { method:'POST', headers:hdrs, body }),
            () => fetch('https://corsproxy.io/?https://breach.vip/api/search',             { method:'POST', headers:hdrs, body }),
            () => fetch('https://thingproxy.freeboard.io/fetch/https://breach.vip/api/search', { method:'POST', headers:hdrs, body }),
            () => fetch('https://api.codetabs.com/v1/proxy?quest=https://breach.vip/api/search', { method:'POST', headers:hdrs, body }),
          ];
          let d = null;
          for (const attempt of attempts) {
            try {
              const r = await attempt();
              if (r.ok) { d = await r.json(); break; }
            } catch {}
          }
          if (!d) { out.bvip = { total: 0, bySource: {}, fields: bvipFields, error: true }; return; }
          if (!d.results?.length) { out.bvip = { total: 0, bySource: {}, fields: bvipFields }; return; }
          const bySource = {};
          for (const r of d.results) {
            const src = r.source || 'Inconnu';
            if (!bySource[src]) bySource[src] = { categories: r.categories || [], records: [] };
            bySource[src].records.push(r);
          }
          out.bvip = { total: d.results.length, bySource, fields: bvipFields };
        })(),
      ];
      if (isEmail) {
        tasks.push(
          fetch(`https://emailrep.io/${encodeURIComponent(q)}`, { headers: { 'User-Agent': 'Searcher-OSINT/1.0' } })
            .then(r => r.ok ? r.json() : null)
            .then(d => { if (d) out.rep = d; })
            .catch(() => {}),
          fetch(`https://leakcheck.io/api/public?check=${encodeURIComponent(q)}`)
            .then(r => r.ok ? r.json() : null)
            .then(d => { if (d?.success && d.found) out.leakcheck = { found: d.found, sources: d.sources || [] }; })
            .catch(() => {})
        );
      }
      await Promise.all(tasks);
      if (!out.comb && !out.rep && !out.leakcheck && !out.scylla && !out.bvip) throw new Error('Aucune donnée dans les bases de fuites.');
      return out;
    }


    async function lookupSteam(query) {
      const q = query.trim();
      const isId64 = /^765\d{14}$/.test(q);
      const proxy = url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
      const xmlUrl = isId64
        ? `https://steamcommunity.com/profiles/${q}/?xml=1`
        : `https://steamcommunity.com/id/${q}/?xml=1`;
      const r = await fetch(proxy(xmlUrl));
      if (!r.ok) throw new Error(`Proxy erreur ${r.status}`);
      const raw = await r.json();
      if (!raw.contents) throw new Error('Profil Steam introuvable');
      const xml = new DOMParser().parseFromString(raw.contents, 'text/xml');
      const get = tag => xml.querySelector(tag)?.textContent?.trim() || '';
      const steamId = get('steamID64');
      if (!steamId) throw new Error('Profil Steam introuvable ou privé');
      const player = {
        personaname: get('steamID'),
        realname: get('realname'),
        avatarmedium: get('avatarMedium'),
        onlineState: get('onlineState'),
        stateMessage: get('stateMessage'),
        privacyState: get('privacyState'),
        location: get('location'),
        memberSince: get('memberSince'),
        hoursPlayed2Wk: get('hoursPlayed2Wk'),
        customURL: get('customURL'),
      };
      if (!player.personaname) throw new Error('Profil Steam introuvable ou privé');
      let aliases = [];
      try {
        const ar = await fetch(proxy(`https://steamcommunity.com/profiles/${steamId}/ajaxaliases/`));
        if (ar.ok) { const ad = await ar.json(); aliases = JSON.parse(ad.contents || '[]'); }
      } catch {}
      return { query: q, steamId, player, aliases: Array.isArray(aliases) ? aliases : [] };
    }

    async function lookupDomain(domain) {
      const d = domain.trim().toLowerCase().replace(/^https?:\/\//,'').replace(/[/?#].*$/,'');
      const res = await fetch(`https://rdap.org/domain/${encodeURIComponent(d)}`);
      if (res.status === 404) throw new Error(`Domaine "${d}" introuvable dans le registre RDAP.`);
      if (!res.ok) throw new Error(`Erreur ${res.status} lors de la recherche RDAP`);
      return res.json();

    async function verifyAndRedeemCode(raw) {
      const input = raw.trim().toUpperCase();

      // ── Codes spéciaux directs ──
      const DIRECT_BADGE_CODES = { 'URSSAF': 'urssaf', 'QLF': 'qlf', 'JAMAL': 'jamal' };
      if (DIRECT_BADGE_CODES[input]) {
        const badgeId = DIRECT_BADGE_CODES[input];
        const badge = BADGES_DEF.find(b => b.id === badgeId);
        if (!badge) throw new Error('Badge introuvable.');
        if (getUsedCodes().includes(`direct:${badgeId}`))
          throw new Error('Ce code a déjà été utilisé sur cet appareil.');
        markCodeUsed(`direct:${badgeId}`);
        const profile = loadPublicProfile();
        if (!profile.manualBadges.includes(badgeId))
          profile.manualBadges = [...profile.manualBadges, badgeId];
        if (!profile.enabledBadges.includes(badgeId))
          profile.enabledBadges = [...profile.enabledBadges, badgeId];
        savePublicProfile(profile);
        return { badgeId, badgeLabel: badge.label };
      }

      const parts = input.split('-');

      // ── Badge code : BADGE-BADGEID-XXXX-CHCK ──
      if (parts[0] === 'BADGE' && parts.length === 4) {
        const [, badgeIdRaw, codeId, check] = parts;
        const badgeId = badgeIdRaw.toLowerCase();
        const badge = BADGES_DEF.find(b => b.id === badgeId && b.codeOnly);
        if (!badge) throw new Error('Badge inconnu dans ce code.');
        const usedKey = `badge:${badgeId}:${codeId}`;
        if (getUsedCodes().includes(usedKey))
          throw new Error('Ce code a déjà été utilisé sur cet appareil.');
        const msg = `badge:${badgeId}:${codeId.toLowerCase()}:${CODE_SECRET}`;
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
        const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
        if (hex.slice(0, 4).toUpperCase() !== check)
          throw new Error('Code invalide ou expiré. Vérifiez et réessayez.');
        markCodeUsed(usedKey);
        const profile = loadPublicProfile();
        if (!profile.manualBadges.includes(badgeId))
          profile.manualBadges = [...profile.manualBadges, badgeId];
        if (!profile.enabledBadges.includes(badgeId))
          profile.enabledBadges = [...profile.enabledBadges, badgeId];
        savePublicProfile(profile);
        return { badgeId, badgeLabel: badge.label };
      }

      // ── Credit code : SRCH-XXXX-XXXX-000 ──
      if (parts.length !== 4 || parts[0] !== 'SRCH')
        throw new Error('Format invalide — attendu : SRCH-XXXX-XXXX-000 ou BADGE-ID-XXXX-CHCK');
      const [, id4, check, amtStr] = parts;
      const amount = parseInt(amtStr, 10);
      if (isNaN(amount) || amount <= 0 || amount > 99999)
        throw new Error('Quantité de crédits invalide dans le code.');
      if (getUsedCodes().includes(id4))
        throw new Error('Ce code a déjà été utilisé sur cet appareil.');
      const msg = id4.toLowerCase() + ':' + amount + ':' + CODE_SECRET;
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
      const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
      if (hex.slice(0, 4).toUpperCase() !== check)
        throw new Error('Code invalide ou expiré. Vérifiez et réessayez.');
      markCodeUsed(id4);
      const cred = loadCredits();
      const newBalance = (cred.balance || 0) + amount;
      saveCredits({ balance: newBalance });
      return { amount, newBalance };
    }

    function seededShuffle(arr, seed) {
      const a = [...arr]; let s = seed;
      for (let i = a.length - 1; i > 0; i--) {
        s = (s * 1664525 + 1013904223) & 0x7fffffff;
        const j = s % (i + 1);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    async function getAvatarForLeaderboard(profile, session) {
      if (profile.avatarCatboxUrl) return profile.avatarCatboxUrl;
      if (profile.avatarType !== 'file') return profile.avatarUrl || session?.avatar || null;
      try {
        const r = await loadMediaFile('avatar');
        if (!r) return session?.avatar || null;
        return await new Promise(resolve => {
          const img = new Image();
          img.onload = () => {
            const size = 80;
            const c = document.createElement('canvas');
            c.width = size; c.height = size;
            const ctx = c.getContext('2d');
            const s = Math.min(size / img.width, size / img.height);
            const w = img.width * s, h = img.height * s;
            ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
            URL.revokeObjectURL(r.url);
            resolve(c.toDataURL('image/jpeg', 0.65));
          };
          img.onerror = () => { URL.revokeObjectURL(r.url); resolve(session?.avatar || null); };
          img.src = r.url;
        });
      } catch { return session?.avatar || null; }
    }

    // ── IndexedDB media store ─────────────────────────────────────────────────
    function openMediaDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('searcher_media_v1', 1);
        req.onupgradeneeded = e => { e.target.result.createObjectStore('files'); };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror  = e => reject(e.target.error);
      });
    }
    async function saveMediaFile(key, file) {
      const db  = await openMediaDB();
      const buf = await file.arrayBuffer();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('files','readwrite');
        tx.objectStore('files').put({ buf, type:file.type, name:file.name }, key);
        tx.oncomplete = () => resolve();
        tx.onerror    = e => reject(e.target.error);
      });
    }
    async function loadMediaFile(key) {
      const db = await openMediaDB();
      return new Promise((resolve, reject) => {
        const tx  = db.transaction('files','readonly');
        const req = tx.objectStore('files').get(key);
        req.onsuccess = e => {
          const d = e.target.result;
          if (!d) { resolve(null); return; }
          resolve({ url: URL.createObjectURL(new Blob([d.buf], { type:d.type })), name:d.name });
        };
        req.onerror = e => reject(e.target.error);
      });
    }

    // ── Wikipedia search ──────────────────────────────────────────────────────
    async function searchWikipedia(query) {
      // Search on both FR and EN Wikipedia concurrently
      const search = async (lang) => {
        const url = `https://${lang}.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=5&srprop=snippet`;
        const res = await fetch(url);
        const data = await res.json();
        return (data.query?.search || []).map(item => ({
          id: `wiki-${lang}-${item.pageid}`,
          title: item.title,
          description: item.snippet.replace(/<[^>]+>/g, '').replace(/&amp;/g, '&').replace(/&quot;/g, '"'),
          url: `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(item.title.replace(/ /g, '_'))}`,
          source: lang === 'fr' ? 'Wikipedia FR' : 'Wikipedia EN',
          favicon: `https://${lang}.wikipedia.org/favicon.ico`,
        }));
      };
      const [fr, en] = await Promise.allSettled([search('fr'), search('en')]);
      const frResults = fr.status === 'fulfilled' ? fr.value : [];
      const enResults = en.status === 'fulfilled' ? en.value : [];
      // Merge, FR first, deduplicate by title
      const seen = new Set(frResults.map(r => r.title.toLowerCase()));
      const deduped = enResults.filter(r => !seen.has(r.title.toLowerCase()));
      return [...frResults, ...deduped].slice(0, 8);
    }

    async function searchGoogle(query, apiKey, cx) {

    async function searchCustomApi(query, api) {
      const url = api.url.replace(/\{query\}/g, encodeURIComponent(query));
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Erreur ${res.status}`);
      let data = await res.json();
      if (api.resultsPath) {
        for (const key of api.resultsPath.split('.')) data = data?.[key];

      return data.map((item, i) => ({

    // ── Word Field ────────────────────────────────────────────────────────────
    const WORDS = [
      "GET", "POST", "PUT", "DELETE", "PATCH", "endpoint", "payload", "JSON",
      "schema", "header", "200", "401", "404", "500", "rate limit", "auth",
      "token", "OAuth", "bearer", "API key", "webhook", "graphql", "REST",
      "gRPC", "socket", "query", "params", "body", "response", "request",
      "timeout", "retry", "cache", "TTL", "etag", "OpenAPI", "swagger",
      "curl", "fetch", "async", "await", "promise", "stream", "uuid",
      "cursor", "offset", "sandbox", "production", "v1", "v2", "stable",
      "beta", "deprecated", "throughput", "latency", "uptime", "SLA",
    ];

    function WordField({ compact = false }) {
      const items = useMemo(() => {
        const out = [];
        const cols = compact ? 5 : 7;
        const rows = compact ? 6 : 9;
        let i = 0;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const word = WORDS[(i * 17 + r * 3 + c * 5) % WORDS.length];
            const x = (c + 0.5) / cols * 100 + Math.sin(i * 1.7) * 4;
            const y = (r + 0.5) / rows * 100 + Math.cos(i * 2.3) * 3;
            const rot = ((i * 31) % 17) - 8;
            const size = compact ? 9 + (i * 7) % 10 : 11 + (i * 7) % 14;
            const blue = (i * 11) % 7 === 0;
            const opacity = blue ? (compact ? 0.15 : 0.30) : 0.04 + (i * 13) % 8 / 100;
            const driftDur = 14 + (i * 11) % 18;
            const driftDelay = -((i * 3) % driftDur);
            out.push({ word, x, y, rot, size, opacity, driftDur, driftDelay, blue, key: i });
            i++;
          }
        }
        return out;
      }, [compact]);

      return (
        <div className="word-field" aria-hidden="true">
          {items.map(it => (
            <span key={it.key} className="word" style={{
              left: `${it.x}%`, top: `${it.y}%`,
              fontSize: `${it.size}px`, opacity: it.opacity,
              color: it.blue ? 'var(--blue)' : 'var(--ink)',
              transform: `translate(-50%, -50%) rotate(${it.rot}deg)`,
              animation: `drift-${it.key % 4} ${it.driftDur}s ease-in-out ${it.driftDelay}s infinite alternate`,
            }}>{it.word}</span>
          ))}
        </div>
      );
    }

    function Magnifier({ followSpeed }) {
      const ref = useRef(null);
      const target = useRef({ x: 0, y: 0 });
      const pos = useRef({ x: 0, y: 0 });
      const rafId = useRef(null);
      const tilt = useRef(0);
      const sizeRef = useRef(560);
      const [size, setSize] = useState(560);

      useEffect(() => {
        target.current = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        pos.current = { ...target.current };

        const onMove = e => { target.current.x = e.clientX; target.current.y = e.clientY; };
        const onResize = () => {
          const s = Math.max(420, Math.min(720, Math.min(window.innerWidth, window.innerHeight) * 0.7));
          sizeRef.current = s;
          setSize(s);
        };
        onResize();
        window.addEventListener('mousemove', onMove);
        window.addEventListener('resize', onResize);

        let lastTime = performance.now(), bobPhase = 0;
        const tick = t => {
          const dt = Math.min(48, t - lastTime);
          lastTime = t;
          bobPhase += dt * 0.0015;
          const k = Math.min(1, followSpeed * (dt / 16.67));
          const dx = target.current.x - pos.current.x;
          const dy = target.current.y - pos.current.y;
          pos.current.x += dx * k;
          pos.current.y += dy * k;
          tilt.current += (Math.max(-10, Math.min(10, dx * 0.04)) - tilt.current) * 0.08;
          if (ref.current) {
            const lx = (95 / 220) * sizeRef.current, ly = lx;
            ref.current.style.transform =
              `translate(${pos.current.x - lx + Math.cos(bobPhase * 0.7) * 4}px, ${pos.current.y - ly + Math.sin(bobPhase) * 6}px) rotate(${tilt.current}deg)`;
            ref.current.style.transformOrigin = `${lx}px ${ly}px`;
          }
          rafId.current = requestAnimationFrame(tick);
        };
        rafId.current = requestAnimationFrame(tick);
        return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('resize', onResize); cancelAnimationFrame(rafId.current); };
      }, [followSpeed]);

      return <div ref={ref} className="magnifier" aria-hidden="true"><MagnifierGlyph size={size} /></div>;
    }

    }

    // ── Cursor ────────────────────────────────────────────────────────────────
    function Cursor() {
      const dotRef = useRef(null), ringRef = useRef(null);
      const target = useRef({ x: -100, y: -100 }), ring = useRef({ x: -100, y: -100 });
      const rafId = useRef(null);

      useEffect(() => {
        const onMove = e => {
          target.current = { x: e.clientX, y: e.clientY };
          ringRef.current?.classList.toggle('hover', !!e.target?.closest?.('input,button,a,.chip,.btn-configure,.logo-btn'));
        };
        window.addEventListener('mousemove', onMove);
        const tick = () => {
          ring.current.x += (target.current.x - ring.current.x) * 0.22;
          ring.current.y += (target.current.y - ring.current.y) * 0.22;
          if (dotRef.current) { dotRef.current.style.left = target.current.x + 'px'; dotRef.current.style.top = target.current.y + 'px'; }
          if (ringRef.current) { ringRef.current.style.left = ring.current.x + 'px'; ringRef.current.style.top = ring.current.y + 'px'; }
          rafId.current = requestAnimationFrame(tick);
        };
        rafId.current = requestAnimationFrame(tick);
        return () => { window.removeEventListener('mousemove', onMove); cancelAnimationFrame(rafId.current); };
      }, []);

      return <><div ref={ringRef} className="cursor-ring" /><div ref={dotRef} className="cursor-dot" /></>;
    }

    function loadTheme() {
      try { return JSON.parse(localStorage.getItem(THEME_KEY)) || PRESET_THEMES[0]; }
      catch { return PRESET_THEMES[0]; }
    }
    function saveTheme(t) { localStorage.setItem(THEME_KEY, JSON.stringify(t)); }

    function ensureFont(name) {
      if (name === 'System' || name === 'Courier New') return;
      const id = `gf-${name.replace(/\s/g, '-').toLowerCase()}`;
      if (document.getElementById(id)) return;
      const link = document.createElement('link');
      link.id = id; link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${name.replace(/\s/g, '+')}:wght@300;400;500;600;700&display=swap`;
      document.head.appendChild(link);
    }

    function applyTheme(t) {
      const r = document.documentElement.style;
      r.setProperty('--bg', t.bg);
      r.setProperty('--ink', t.ink);
      r.setProperty('--ink-soft', t.inkSoft || t.ink);
      r.setProperty('--ink-mute', t.inkMute);
      r.setProperty('--ink-faint', t.inkFaint);
      r.setProperty('--rule', t.rule);
      r.setProperty('--blue', t.blue);
      r.setProperty('--blue-soft', t.blueSoft);
      r.setProperty('--blue-deep', t.blueDeep || t.blue);

      ensureFont(t.fontMain); ensureFont(t.fontMono);

      // Detect dark bg for derived values
      const isDark = parseInt(t.bg.slice(1,3), 16) < 100;
      const dotAlpha = isDark ? '0.06' : '0.08';
      const dotRgb   = isDark ? '200,220,255' : '10,10,10';
      const blueR = parseInt(t.blue.slice(1,3),16), blueG = parseInt(t.blue.slice(3,5),16), blueB = parseInt(t.blue.slice(5,7),16);
      const bgR   = parseInt(t.bg.slice(1,3),16),   bgG   = parseInt(t.bg.slice(3,5),16),   bgB   = parseInt(t.bg.slice(5,7),16);
      // Sidebar derived variables
      r.setProperty('--sb-bg', `rgb(${Math.max(0,bgR-8)},${Math.max(0,bgG-8)},${Math.max(0,bgB-8)})`);
      r.setProperty('--sb-hover', isDark ? 'rgba(255,255,255,0.055)' : 'rgba(0,0,0,0.05)');
      r.setProperty('--input-bg', inputBg);
      r.setProperty('--card-bg', cardBg);
      const bodyBg = `radial-gradient(ellipse 80% 60% at 50% 0%, rgba(${blueR},${blueG},${blueB},${isDark?'0.08':'0.04'}) 0%, transparent 70%), linear-gradient(180deg, ${t.bg} 0%, rgb(${Math.max(0,bgR-6)},${Math.max(0,bgG-6)},${Math.max(0,bgB-6)}) 100%)`;
      const inputBg  = isDark ? `rgb(${Math.min(255,bgR+14)},${Math.min(255,bgG+14)},${Math.min(255,bgB+14)})` : t.bg;
      const cardBg   = isDark ? `rgba(${Math.min(255,bgR+10)},${Math.min(255,bgG+10)},${Math.min(255,bgB+10)},0.95)` : `rgba(${bgR},${bgG},${bgB},0.9)`;
      const fm  = t.fontMain === 'System' ? 'system-ui, ui-sans-serif, sans-serif' : `'${t.fontMain}', ui-sans-serif, system-ui, sans-serif`;
      const fmo = t.fontMono === 'Courier New' ? "'Courier New', monospace" : `'${t.fontMono}', monospace`;

      let el = document.getElementById('theme-dyn');
      if (!el) { el = document.createElement('style'); el.id = 'theme-dyn'; document.head.appendChild(el); }
      el.textContent = `
        body { background: ${bodyBg} !important; font-family: ${fm} !important; }
        body::before { background-image: radial-gradient(circle, rgba(${dotRgb},${dotAlpha}) 1px, transparent 1px) !important; }
        button, input, select, textarea, .modal, .results-body, .masthead,
        .modal-title, .modal-section-title, .ip-location,
        .result-title, .result-description { font-family: ${fm} !important; }
        .result-url, .chip, .source-chip, .nav-btn, .builtin-chip, .builtin-label,
        .ip-address, .ip-tag, kbd, .phone-badge, .auth-field label,
        .phone-meta-item, .phone-number-display { font-family: ${fmo} !important; }
        .result-card, .phone-card, .ip-card, .modal { background: ${cardBg} !important; }
        .theme-hex, .theme-select { background: ${inputBg} !important; color: ${t.ink} !important; }
        .theme-card { background: ${t.bg} !important; }
        .theme-card.selected { background: ${t.blueSoft} !important; border-color: ${t.blue} !important; }
      `;
    }

    // ── Theme Modal ───────────────────────────────────────────────────────────
    function ThemeModal({ theme, onSave, onApply, onClose, visible }) {
      const [local, setLocal] = useState({ ...theme });

      useEffect(() => {
        if (visible) setLocal({ ...theme });
      }, [visible]);

      const set = (k, v) => setLocal(p => {
        const next = { ...p, [k]: v };
        if (k !== 'id') next.id = 'custom';
        return next;
      });

      const selectPreset = (preset) => {
        const next = { ...preset };
        setLocal(next);
        applyTheme(next);
      };

      const handleColorChange = (k, v) => {
        const next = { ...local, [k]: v, id: 'custom' };
        setLocal(next);
        applyTheme(next);
      };

      const handleFontChange = (k, v) => {
        const next = { ...local, [k]: v, id: 'custom' };
        setLocal(next);
        applyTheme(next);
      };

      const apply = () => { saveTheme(local); applyTheme(local); onSave(local); onApply(); };

      return (
        <div className="modal-overlay" onClick={onClose} style={{ display: visible ? undefined : 'none' }}>

                  { label: 'Fond',    k: 'bg' },
                  { label: 'Texte',   k: 'ink' },
                  { label: 'Accent',  k: 'blue' },
                ].map(({ label, k }) => (
                  <div className="theme-color-row" key={k}>
                    <label>{label}</label>
                    <input type="color" className="theme-color-input" value={local[k]} onChange={e => handleColorChange(k, e.target.value)} />
                    <input type="text" className="theme-hex" value={local[k]} onChange={e => /^#[0-9a-fA-F]{0,6}$/.test(e.target.value) && handleColorChange(k, e.target.value)} />

    // ── IP Card ───────────────────────────────────────────────────────────────
    function IPCard({ result }) {
      const [copied, setCopied] = useState(false);
      // Globe icon
      const GlobeIcon = () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="1.8"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" stroke="currentColor" strokeWidth="1.8"/>
        </svg>
      );

      if (result.loading) {
        return (
          <div className="ip-card loading">
            <div className="phone-card-header">
              <div className="phone-label"><GlobeIcon /> Géolocalisation IP</div>
              <span className="phone-badge" style={{ background: 'var(--blue-soft)', color: 'var(--blue)' }}>Recherche…</span>
            </div>
            <div className="ip-address" style={{ color: 'var(--ink-mute)' }}>{result.ip}</div>
          </div>
        );
      }

      if (result.error) {
        return (
          <div className="ip-card error">
            <div className="phone-card-header">
              <div className="phone-label"><GlobeIcon /> Géolocalisation IP</div>
              <span className="phone-badge invalid">✗ Erreur</span>
            </div>
            <div className="ip-address">{result.ip}</div>
            <div className="phone-invalid-msg">{result.error}</div>
          </div>
        );
      }

      const d = result.data;
      // ipinfo.io: loc = "lat,lon", org = "AS#### Name", country = "US"
      const [lat, lon] = (d.loc || '').split(',');
      const countryName = getCountryName(d.country);
      const flag = d.country ? countryFlag(d.country) : '';
      const locationParts = [d.city, d.region, countryName].filter(Boolean);
      const tags = [
        d.org && { label: d.org },
        d.postal && { label: d.postal },
        d.timezone && { label: d.timezone },
        d.hostname && { label: d.hostname },
      ].filter(Boolean);
      const copy = () => {
        const text = [`IP: ${d.ip}`, locationParts.length && `Lieu: ${locationParts.join(', ')}`, d.org && `Org: ${d.org}`, d.timezone && `TZ: ${d.timezone}`].filter(Boolean).join('\n');
        navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
      };

      return (
        <div className="ip-card">
          <div className="phone-card-header">
            <div className="phone-label"><GlobeIcon /> Géolocalisation IP</div>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <span className="phone-badge valid">✓ Trouvé</span>
              <button className={`copy-btn${copied ? ' copied' : ''}`} onClick={copy}>
                {copied ? '✓ Copié' : '⎘ Copier'}
              </button>
            </div>
          </div>
          <div className="ip-address">{d.ip}</div>
          <div className="ip-location">
            {flag && <span className="ip-flag">{flag}</span>}
            {locationParts.join(', ')}
          </div>
          {tags.length > 0 && (
            <div className="ip-meta">
              {tags.map((t, i) => <span key={i} className="ip-tag">{t.label}</span>)}
            </div>
          )}
          {lat && lon && (() => {
            const la = parseFloat(lat), lo = parseFloat(lon);
            const delta = 0.08;
            const bbox = `${lo-delta},${la-delta},${lo+delta},${la+delta}`;
            const mapUrl = `https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${la},${lo}`;
            return (
              <>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: 'var(--ink-mute)' }}>
                  {la.toFixed(4)}, {lo.toFixed(4)}
                </div>
                <iframe
                  src={mapUrl}
                  style={{ width: '100%', height: 200, border: 'none', borderRadius: 10, marginTop: 4 }}
                  title="Carte IP"
                  loading="lazy"
                />
              </>
            );
          })()}
        </div>
      );
    }

    // ── WHOIS Card ────────────────────────────────────────────────────────────
    function WhoisCard({ result }) {
      const [copied, setCopied] = useState(false);

      const DomainIcon = () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="3" width="20" height="14" rx="2" stroke="currentColor" strokeWidth="1.8"/>
          <path d="M8 21h8M12 17v4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
        </svg>
      );

      const copy = () => {
        if (!result.data) return;
        const d = result.data;
        const registrar = (d.entities || []).find(e => e.roles?.includes('registrar'));
        const regName = registrar?.vcardArray?.[1]?.find?.(v => v[0] === 'fn')?.[3] || '';
        const regEvt = (d.events || []).find(e => e.eventAction === 'registration');
        const expEvt = (d.events || []).find(e => e.eventAction === 'expiration');
        const text = [
          `Domaine: ${(d.ldhName || result.domain).toLowerCase()}`,
          regName && `Registrar: ${regName}`,
          regEvt?.eventDate && `Enregistré: ${new Date(regEvt.eventDate).toLocaleDateString('fr-FR')}`,
          expEvt?.eventDate && `Expire: ${new Date(expEvt.eventDate).toLocaleDateString('fr-FR')}`,
          (d.status || []).length && `Statut: ${(d.status || []).join(', ')}`,
        ].filter(Boolean).join('\n');
        navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
      };

      if (result.loading) return (
        <div className="whois-card loading">
          <div className="phone-card-header">
            <div className="phone-label"><DomainIcon /> WHOIS / Domaine</div>
            <span className="phone-badge" style={{ background:'var(--blue-soft)', color:'var(--blue)' }}>Recherche…</span>
          </div>
          <div className="whois-domain" style={{ color:'var(--ink-mute)' }}>{result.domain}</div>
        </div>
      );

      if (result.error) return (
        <div className="whois-card error">
          <div className="phone-card-header">
            <div className="phone-label"><DomainIcon /> WHOIS / Domaine</div>
            <span className="phone-badge invalid">✗ Erreur</span>

    function SocialCheckCard({ email }) {

      useEffect(() => {
        async function checkGravatar() {
          try {
            const enc = new TextEncoder();
            const buf = await crypto.subtle.digest('SHA-256', enc.encode(email.trim().toLowerCase()));
            const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
            const avatarUrl = `https://gravatar.com/avatar/${hex}?s=80`;
            const img = new Image();
            img.onload = () => setGravatar({ found: true, url: avatarUrl });
            img.onerror = () => setGravatar({ found: false });
            img.src = `https://gravatar.com/avatar/${hex}?d=404&s=1`;
          } catch { setGravatar({ found: false }); }
        }
        async function checkGitHub() {
          try {
            const ctrl = new AbortController();
            setTimeout(() => ctrl.abort(), 7000);
            const res = await fetch(`https://api.github.com/search/users?q=${encodeURIComponent(email)}+in:email&per_page=5`, { signal: ctrl.signal });
            if (!res.ok) { setGhResult([]); return; }
            const d = await res.json();
            setGhResult(d.items || []);
          } catch { setGhResult([]); }
        }
        checkGravatar();
        checkGitHub();
      }, [email]);

      const [ghStatus, setGhStatus] = useState('checking');

          .then(r => {
            if (r.status === 404) { setGhStatus('not_found'); return null; }
