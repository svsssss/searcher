                  </button>
                )}
              </div>

              {/* Audio */}
              <div className="dash-section">
                <div className="dash-stitle">Musique de fond</div>
                {/* input toujours dans le DOM pour que le ref soit disponible immédiatement */}
                <input ref={audioInputRef} type="file" accept="audio/*" style={{ display:'none' }} onChange={pickAudioFile} />
                <div className="audio-mode-toggle">
                  <button className={`audio-mode-btn${profile.audioType !== 'file' ? ' active' : ''}`} onClick={() => set('audioType','url')}>URL</button>
                  <button className={`audio-mode-btn${profile.audioType === 'file' ? ' active' : ''}`} onClick={() => { set('audioType','file'); audioInputRef.current?.click(); }}>Fichier local</button>
                </div>
                {profile.audioType === 'file' ? (
                  <button className={`file-pick-btn${audioFileName ? ' has-file' : ''}`} onClick={() => audioInputRef.current?.click()}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M9 18V5l12-2v13" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/><circle cx="6" cy="18" r="3" stroke="currentColor" strokeWidth="1.8"/><circle cx="18" cy="16" r="3" stroke="currentColor" strokeWidth="1.8"/></svg>
                    {audioFileName ? `✓ ${audioFileName.slice(0,28)}${audioFileName.length>28?'…':''}` : 'Choisir un fichier audio…'}
                  </button>
                ) : (
                  <div className="dash-field">
                    <div className="dash-label">URL audio (mp3, ogg…)</div>
                    <input className="dash-input" type="url" placeholder="https://…/music.mp3" value={profile.audioUrl} onChange={e => set('audioUrl', e.target.value)} />
                  </div>
                )}
                {(audioFileName || profile.audioUrl) && (
                  <div style={{ fontSize:11, color:'#16a34a', fontFamily:"'JetBrains Mono',monospace" }}>✓ Audio configuré</div>
                )}
              </div>

              {/* Badges */}
              <div className="dash-section">
                <div className="dash-stitle">Badges affichés</div>
                <div className="badge-pill-row">
                  {BADGES_DEF.map(badge => {
                    const unlocked = unlockedIds.includes(badge.id);
                    const enabled  = (profile.enabledBadges||[]).includes(badge.id);
                    return (
                      <button
                        key={badge.id}
                        className={`badge-pill${enabled ? ' active' : ''}${!unlocked ? ' locked' : ''}`}
                        onClick={() => toggleBadge(badge.id)}
                        title={!unlocked ? 'Non débloqué' : enabled ? 'Masquer' : 'Afficher'}
                      >
                        <img src={badge.img} width="16" height="16" style={{ objectFit:'contain' }} alt="" />
                        {badge.label}
                        {!unlocked && <span style={{ fontSize:10 }}>🔒</span>}
                      </button>
                    );
                  })}
                </div>
                <div style={{ fontSize:11, color:'var(--ink-mute)', fontFamily:"'JetBrains Mono',monospace" }}>
                  Certains badges sont attribués manuellement par l'owner.
                </div>
              </div>

              {/* Stats */}
              <div className="dash-section">
                <div className="dash-stitle">Statistiques</div>
                <div style={{ background:'var(--blue-soft)', borderRadius:10, padding:'12px 14px', display:'flex', alignItems:'center', gap:10, border:'1px solid rgba(37,99,255,0.12)', marginBottom:4 }}>
                  <span style={{ fontSize:20 }}>⚡</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, color:'var(--ink-mute)', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:2 }}>Crédits restants</div>
                    <div style={{ fontFamily:"'Geist',sans-serif", fontSize:20, fontWeight:700, color: credits === 0 ? '#dc2626' : credits <= 5 ? '#d97706' : 'var(--blue)', letterSpacing:'-0.03em', lineHeight:1 }}>{credits}</div>
                  </div>
                </div>
                <div className="stat-grid">
                  {[['Total',stats.total||0],['Wikipedia',stats.wiki||0],['Personne',stats.person||0],['Téléphone',stats.phone||0],['IP',stats.ip||0],['Domaine',stats.domain||0]].map(([label,value]) => (
                    <div key={label} className="stat-card">
                      <div className="stat-value">{value}</div>
                      <div className="stat-label">{label}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* History */}
              <div className="dash-section">
                <div className="dash-stitle">Historique</div>
                {historyItems.length === 0
                  ? <div style={{ textAlign:'center', color:'var(--ink-mute)', padding:'16px 0', fontSize:13 }}>Aucune recherche.</div>
                  : (
                    <div className="history-list">
                      {historyItems.map((item,i) => (
                        <div key={i} className="history-item" style={{ cursor:'none' }}>
                          <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontSize:13 }}>{item.q}</span>
                          <span className="hist-type">{item.type}</span>
                          <span className="hist-time">{relativeTime(item.at)}</span>
                        </div>
                      ))}
                    </div>
                  )
                }
                {historyItems.length > 0 && (
                  <button onClick={() => { clearHistory(); setHistoryItems([]); }} style={{ alignSelf:'flex-start', background:'none', border:'1px solid rgba(220,38,38,0.3)', color:'#dc2626', borderRadius:7, padding:'5px 11px', fontSize:11, cursor:'none', fontFamily:"'JetBrains Mono',monospace" }}>
                    Effacer
                  </button>
                )}
              </div>

              <div style={{ display:'flex', gap:10, paddingBottom:24 }}>
                <button className="dash-btn-primary" onClick={save}>{saved ? '✓ Sauvegardé' : 'Enregistrer'}</button>
                <button className="dash-btn-blue" onClick={() => { save(); onViewPublic(); }}><EyeIcon /> Voir mon profil</button>
              </div>
            </div>

            {/* ─ Preview column ─ */}
            <div className="dash-preview-col">
              <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:'var(--ink-mute)', textTransform:'uppercase', letterSpacing:'0.08em' }}>Aperçu live</div>
              <div className="dash-preview-box">
                <div className="dash-preview-bg" style={{ background:bgValue }} />
                <div className="dash-preview-overlay" />
                <div className="dash-preview-card" style={profile.neonColor ? {
                  borderColor: profile.neonColor,
                  boxShadow: `0 0 10px ${profile.neonColor}, 0 0 24px ${profile.neonColor}80, 0 4px 20px rgba(0,0,0,0.45)`,
                } : {}}>
                  {session?.avatar
                    ? <img className="dash-preview-av" src={session.avatar} alt="" />
                    : <div className="dash-preview-av-init">{(session?.name?.[0]||'?').toUpperCase()}</div>
                  }
                  <div className="dash-preview-name">{session?.name || 'Mon profil'}</div>
                  {(profile.enabledBadges||[]).length > 0 && (
                    <div style={{ display:'flex', flexWrap:'wrap', justifyContent:'center', gap:4 }}>
                      {BADGES_DEF.filter(b => (profile.enabledBadges||[]).includes(b.id)).map(b => (
                        <img key={b.id} src={b.img} width="18" height="18" style={{ objectFit:'contain' }} alt={b.label} />
                      ))}
                    </div>
                  )}
                  {profile.bio && <div className="dash-preview-bio">{profile.bio.slice(0,60)}{profile.bio.length>60?'…':''}</div>}
                  {(profile.links||[]).filter(l=>l.url).slice(0,2).map((link,i) => (
                    <div key={i} style={{ width:'100%', padding:'5px 8px', borderRadius:7, border:'1px solid rgba(255,255,255,0.14)', background:'rgba(255,255,255,0.07)', textAlign:'center', color:'rgba(255,255,255,0.75)', fontSize:10, fontFamily:"'Geist',sans-serif" }}>
                      {link.label || PLATFORM_META[link.platform]?.label || 'Lien'}
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ fontSize:11, color:'var(--ink-mute)', fontFamily:"'JetBrains Mono',monospace", textAlign:'center' }}>
                Aperçu réduit · cliquez sur "Voir mon profil" pour la version complète
              </div>
              <button className="dash-btn-blue" style={{ width:'100%', justifyContent:'center' }} onClick={() => { save(); onViewPublic(); }}>
                <EyeIcon /> Ouvrir le profil public
              </button>
            </div>
          </div>

          {showFramePicker && (
            <FramePickerModal
              current={profile.avatarFrame || 'none'}
              credits={credits}
              unlockedFrames={profile.unlockedFrames || []}
              onSelect={f => {
                const fDef = AVATAR_FRAMES_DEF.find(d => d.id === f);
                const already = (profile.unlockedFrames||[]).includes(f);
                if (fDef && !fDef.free && !already) {
                  const cred = loadCredits();
                  saveCredits({ balance: cred.balance - (fDef.cost||0) });
                  applyAndSync({ avatarFrame: f, unlockedFrames: [...(profile.unlockedFrames||[]), f] });
                } else {
                  applyAndSync({ avatarFrame: f });
                }
              }}
              onClose={() => setShowFramePicker(false)}
            />
          )}
          {showEffectPicker && (
            <EffectPickerModal
              current={profile.usernameEffect || 'none'}
              credits={credits}
              name={session?.name}
              unlockedEffects={profile.unlockedEffects || []}
              onSelect={eff => {
                const effDef = EFFECTS_DEF.find(e => e.id === eff);
                const already = (profile.unlockedEffects || []).includes(eff);
                if (effDef && !effDef.free && !already) {
                  const cred = loadCredits();
                  saveCredits({ balance: cred.balance - (effDef.cost || 0) });
                  applyAndSync({ usernameEffect: eff, unlockedEffects: [...(profile.unlockedEffects || []), eff] });
                } else {
                  applyAndSync({ usernameEffect: eff });
                }
              }}
              onClose={() => setShowEffectPicker(false)}
            />
          )}

          <Cursor />
        </div>
      );
    }

    // ── 3D Tilt hook ─────────────────────────────────────────────────────────
    function useTilt(maxDeg = 10) {
      const ref = useRef(null);
      const [tiltStyle, setTiltStyle] = useState({});
      const [shinePos, setShinePos] = useState({ x: 50, y: 50 });
      const onMouseMove = (e) => {
        const card = ref.current;
        if (!card) return;
        const { left, top, width, height } = card.getBoundingClientRect();
        const x = Math.max(0, Math.min(1, (e.clientX - left) / width));
        const y = Math.max(0, Math.min(1, (e.clientY - top) / height));
        setShinePos({ x: x * 100, y: y * 100 });
        setTiltStyle({
          transform: `perspective(900px) rotateX(${-(y - 0.5) * maxDeg * 2}deg) rotateY(${(x - 0.5) * maxDeg * 2}deg) scale3d(1.02,1.02,1.02)`,
          transition: 'transform 0.06s linear',
        });
      };
      const onMouseLeave = () => {
        setShinePos({ x: 50, y: 50 });
        setTiltStyle({
          transform: 'perspective(900px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)',
          transition: 'transform 0.5s cubic-bezier(.03,.98,.52,.99)',
        });
      };
      return { ref, tiltStyle, shinePos, onMouseMove, onMouseLeave };
    }

    // ── Public Profile Page ───────────────────────────────────────────────────
    function PublicProfilePage({ session, onBack }) {
      const profile  = useMemo(() => loadPublicProfile(), []);
      const credits  = useMemo(() => loadCredits().balance, []);
      const stats    = useMemo(() => loadStats(), []);
      const [playing, setPlaying]         = useState(false);
      const [audioSrc, setAudioSrc]       = useState(null);
      const [videoBgSrc, setVideoBgSrc]   = useState(null);
      const [imageBgSrc, setImageBgSrc]   = useState(null);
      const [avatarSrc, setAvatarSrc]     = useState(null);
      const audioRef = useRef(null);
      const audioSrcRef = useRef(null);
      const videoBgSrcRef = useRef(null);
      const imageBgSrcRef = useRef(null);

      useEffect(() => {
        const loadAll = async () => {
          if (profile.avatarType === 'file') {
            const r = await loadMediaFile('avatar').catch(() => null);
            if (r) setAvatarSrc(r.url);
          } else {
            setAvatarSrc(profile.avatarUrl || session?.avatar || null);
          }
          if (profile.audioType === 'file') {
            const r = await loadMediaFile('audio').catch(() => null);
            if (r) { audioSrcRef.current = r.url; setAudioSrc(r.url); }
          } else if (profile.audioUrl) {
            setAudioSrc(profile.audioUrl);
          }
          if (profile.bgPreset === 'video') {
            const r = await loadMediaFile('bgvideo').catch(() => null);
            if (r) { videoBgSrcRef.current = r.url; setVideoBgSrc(r.url); }
          }
          if (profile.bgPreset === 'image') {
            const r = await loadMediaFile('bgimage').catch(() => null);
            if (r) { imageBgSrcRef.current = r.url; setImageBgSrc(r.url); }
          }
        };
        loadAll();
        return () => {
          if (audioSrcRef.current?.startsWith('blob:')) URL.revokeObjectURL(audioSrcRef.current);
          if (videoBgSrcRef.current?.startsWith('blob:')) URL.revokeObjectURL(videoBgSrcRef.current);
          if (imageBgSrcRef.current?.startsWith('blob:')) URL.revokeObjectURL(imageBgSrcRef.current);
        };
      }, []);

      /* Auto-play dès que la source audio est prête */
      useEffect(() => {
        if (!audioSrc || !audioRef.current) return;
        audioRef.current.play().then(() => setPlaying(true)).catch(() => {});
      }, [audioSrc]);

      const bgValue = profile.bgPreset === 'custom'
        ? (profile.bgCustom || BG_PRESETS[0].value)
        : (profile.bgPreset === 'video' || profile.bgPreset === 'image' || ANIM_BG_IDS.includes(profile.bgPreset))
        ? (ANIM_BG_DEF.find(b=>b.id===profile.bgPreset)?.dark || '#0d0d1a')
        : (BG_PRESETS.find(b => b.id === profile.bgPreset)?.value || BG_PRESETS[0].value);

      const unlockedIds = useMemo(() => {
        const auto = BADGES_DEF.filter(b => b.autoCheck && b.autoCheck(credits, stats)).map(b => b.id);
        return [...new Set([...(profile.manualBadges||[]), ...auto])];
      }, [credits, stats, profile.manualBadges]);

      const visibleBadges = useMemo(() =>
        BADGES_DEF.filter(b => unlockedIds.includes(b.id) && (profile.enabledBadges||[]).includes(b.id)),
        [unlockedIds, profile.enabledBadges]
      );

      const tilt = useTilt();
      const tiltOn = profile.tilt3d !== false;

      const toggleAudio = () => {
        const a = audioRef.current;
        if (!a) return;
        if (playing) { a.pause(); setPlaying(false); }
        else { a.play().then(() => setPlaying(true)).catch(() => {}); }
      };

      const PlayIcon  = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>;
      const PauseIcon = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;

      return (
        <div className="pub-root">
          {profile.bgPreset === 'video' && videoBgSrc
            ? <video className="pub-bg" src={videoBgSrc} autoPlay loop muted playsInline style={{ objectFit:'cover', width:'100%', height:'100%' }} />
            : profile.bgPreset === 'image' && imageBgSrc
            ? <img className="pub-bg" src={imageBgSrc} alt="" style={{ objectFit:'cover', width:'100%', height:'100%' }} />
            : ANIM_BG_IDS.includes(profile.bgPreset)
            ? <><div className="pub-bg" style={{ background:bgValue }} /><AnimatedBg type={profile.bgPreset} /></>
            : <div className="pub-bg" style={{ background:bgValue }} />
          }
          <div className="pub-overlay" />

          <div className={`pub-card${profile.neonColor ? ' has-neon' : ''}`}
            ref={tiltOn ? tilt.ref : null}
            style={{ ...(tiltOn ? tilt.tiltStyle : {}), ...(profile.neonColor ? { '--nc': profile.neonColor } : {}) }}
            onMouseMove={tiltOn ? tilt.onMouseMove : null}
            onMouseLeave={tiltOn ? tilt.onMouseLeave : null}>
            {tiltOn && <div className="pub-tilt-shine" style={{ background:`radial-gradient(circle at ${tilt.shinePos.x}% ${tilt.shinePos.y}%, rgba(255,255,255,0.07) 0%, transparent 60%)` }} />}
            <AvatarWithFrame src={avatarSrc} name={session?.name} frame={profile.avatarFrame} />
            <UsernameDisplay name={session?.name} effect={profile.usernameEffect} />

            {visibleBadges.length > 0 && (
              <div className="pub-badges">
                {visibleBadges.map(badge => (
                  <span key={badge.id} className={`pub-badge ${badge.cls}`} data-tip={`${badge.label} : ${badge.desc}`}>
                    <img src={badge.img} width="18" height="18" style={{ objectFit:'contain', display:'block' }} alt={badge.label} />
                  </span>
                ))}
              </div>
            )}

            {profile.bio && <div className="pub-bio">{profile.bio}</div>}

            {(profile.links||[]).filter(l => l.url).length > 0 && (
              <div className="pub-links">
                {(profile.links||[]).filter(l => l.url).map((link, i) => {
                  const meta = PLATFORM_META[link.platform];
                  return (
                    <a key={i} href={link.url} target="_blank" rel="noopener noreferrer" className="pub-link-btn">
                      {meta?.domain && <img src={`https://www.google.com/s2/favicons?domain=${meta.domain}&sz=16`} width="16" height="16" style={{ borderRadius:3 }} />}

                    </a>
                  );
                })}
              </div>
            )}
          </div>

          <button className="pub-back" onClick={onBack}>← Dashboard</button>

          {audioSrc && (
            <div className={`pub-audio${!playing ? ' paused' : ''}`}>
              <audio ref={audioRef} src={audioSrc} loop />
              <button className="pub-audio-btn" onClick={toggleAudio}>

                <div className="audio-eq-bar" />
                <div className="audio-eq-bar" />
              </div>
              <span>Musique</span>
            </div>
          )}

          <Cursor />
        </div>
      );
    }

    // ── Profile Viewer (depuis classement) ────────────────────────────────────
    function ProfileViewer({ entry, onBack, session }) {
      const isOwn = useMemo(() => {
        if (!session) return false;
        const myUid = session.id || session.email || session.name;
        return entry.uid === myUid;
      }, [entry, session]);

      const fullProfile = useMemo(() => isOwn ? loadPublicProfile() : null, [isOwn]);

      const bgValue = useMemo(() => {
        const preset = fullProfile?.bgPreset || entry.profile?.bgPreset;
        const custom = fullProfile?.bgCustom || entry.profile?.bgCustom;
        if (preset === 'video' || preset === 'image') return '#0d0d1a';
        if (ANIM_BG_IDS.includes(preset)) return ANIM_BG_DEF.find(b=>b.id===preset)?.dark || '#0d0d1a';
        if (preset === 'custom') return custom || BG_PRESETS[0].value;
        return BG_PRESETS.find(b => b.id === preset)?.value || BG_PRESETS[0].value;
      }, [fullProfile, entry]);

      const [avatarSrc, setAvatarSrc]   = useState(null);
      const [audioSrc, setAudioSrc]     = useState(null);
      const [videoBgSrc, setVideoBgSrc] = useState(null);
      const [imageBgSrc, setImageBgSrc] = useState(null);
      const [playing, setPlaying]       = useState(false);
      const [volume, setVolume] = useState(0.8);
      const [prevVolume, setPrevVolume] = useState(0.8);
      const audioRef = useRef(null);

      useEffect(() => {
        const cleanups = [];
        const load = async () => {
          if (isOwn && fullProfile) {
            const p = fullProfile;
            if (p.avatarType === 'file') {
              const r = await loadMediaFile('avatar').catch(() => null);
              if (r) { cleanups.push(r.url); setAvatarSrc(r.url); }
            } else {
              setAvatarSrc(p.avatarUrl || entry.avatar || null);
            }
            if (p.audioType === 'file') {
              const r = await loadMediaFile('audio').catch(() => null);
              if (r) { cleanups.push(r.url); setAudioSrc(r.url); }
            } else if (p.audioUrl) {
              setAudioSrc(p.audioUrl);
            }
            if (p.bgPreset === 'video') {
              const r = await loadMediaFile('bgvideo').catch(() => null);
              if (r) { cleanups.push(r.url); setVideoBgSrc(r.url); }
            }
            if (p.bgPreset === 'image') {
              const r = await loadMediaFile('bgimage').catch(() => null);
              if (r) { cleanups.push(r.url); setImageBgSrc(r.url); }
            }
          } else {
            setAvatarSrc(entry.avatar || null);
            if (entry.profile?.audioCatboxUrl) setAudioSrc(entry.profile.audioCatboxUrl);

    const SESSION_KEY = 'searcher_session_v1';
    const USERS_KEY   = 'searcher_users_v1';

    function loadSession() {
      try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; }
    }
    function saveSession(s) { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }

    function getUsers() {
      try { return JSON.parse(localStorage.getItem(USERS_KEY)) || []; } catch { return []; }
    }
    function isReservedName(n) {
      return ADMIN_NAMES.some(a => a.toLowerCase() === n.trim().toLowerCase());
    }
    function registerUser(name, email, password) {
      const users = getUsers();
      if (users.find(u => u.email.toLowerCase() === email.toLowerCase()))
        throw new Error('Un compte existe déjà avec cet email.');
      if (isReservedName(name))
        throw new Error('Ce nom est réservé et ne peut pas être utilisé.');
      const user = { name: name.trim(), email: email.trim().toLowerCase(), password };
      localStorage.setItem(USERS_KEY, JSON.stringify([...users, user]));
      return user;
    }
    function loginUser(email, password) {
      const user = getUsers().find(u =>
        u.email === email.trim().toLowerCase() && u.password === password
      );
      if (!user) throw new Error('Email ou mot de passe incorrect.');
      return user;
    }

    const DISCORD_CLIENT_ID = '1499170366109782097'; 

    function discordLogin() {
      if (!DISCORD_CLIENT_ID) {
        alert('Ajoute ton Client ID Discord dans le code source (DISCORD_CLIENT_ID).');
        return;
      }
      const redirectUri = window.location.href.split('#')[0].split('?')[0];
      const params = new URLSearchParams({
        client_id: DISCORD_CLIENT_ID,
        redirect_uri: redirectUri,
        response_type: 'token',
        scope: 'identify',
      });
      window.location.href = `https://discord.com/api/oauth2/authorize?${params}`;
    }

    async function handleDiscordCallback() {
      const hash = window.location.hash;
      if (!hash || !hash.includes('access_token')) return null;
      history.replaceState(null, '', window.location.pathname + window.location.search);
      const params = new URLSearchParams(hash.slice(1));
      if (params.get('error') || !params.get('access_token')) return null;
      const token = params.get('access_token');
      const res = await fetch('https://discord.com/api/users/@me', {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) throw new Error('Impossible de récupérer le profil Discord.');
      const u = await res.json();
      return {
        name: u.global_name || u.username,
        id: u.id,
        email: `discord:${u.id}`,
        avatar: u.avatar ? `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png?size=64` : null,
        discord: true,
      };
    }

    // ── Auth Globe Canvas ─────────────────────────────────────────────────────
    function AuthGlobe() {
      const cvRef = useRef(null);
      const animRef = useRef(null);
      const rotRef = useRef(0);
      const geoRef = useRef(null);

      const STARS = useMemo(() => Array.from({ length: 130 }, (_, i) => ({
        x: ((i * 174.317) % 1) * 520,
        y: ((i * 97.731 + 0.31) % 1) * 520,
        r: 0.4 + (i % 4) * 0.35,
        a: 0.12 + (i % 6) * 0.05,
      })), []);

      const CITIES = [
        [48.85,2.35],[51.5,-0.12],[40.71,-74.0],[35.68,139.69],
        [-23.5,-46.6],[55.75,37.62],[1.35,103.82],[19.43,-99.13],
        [-33.87,151.2],[28.61,77.21],[37.77,-122.4],[52.37,4.9],
      ];

      // Load world border data
      useEffect(() => {
        fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
          .then(r => r.json())
          .then(topo => {
            if (!window.topojson) return;
            const countries = window.topojson.feature(topo, topo.objects.countries);
            // Thin coordinates for perf: keep every 2nd point
            const thin = arr => arr.filter((_, i) => i % 2 === 0 || i === arr.length - 1);
            geoRef.current = countries.features.map(f => {
              const g = f.geometry;
              if (!g) return f;
              if (g.type === 'Polygon')
                return { ...f, geometry: { ...g, coordinates: g.coordinates.map(thin) } };
              if (g.type === 'MultiPolygon')
                return { ...f, geometry: { ...g, coordinates: g.coordinates.map(p => p.map(thin)) } };
              return f;
            });
          })
          .catch(() => {});
      }, []);

      useEffect(() => {
        const canvas = cvRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const W = 520, H = 520, cx = W/2, cy = H/2, R = 196;

        const draw = () => {
          rotRef.current += 0.11;
          const rot = rotRef.current;
          ctx.clearRect(0, 0, W, H);

          // Stars
          STARS.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            ctx.fillStyle = `rgba(210,195,255,${s.a})`; ctx.fill();
          });

          // Atmosphere halo
          const atmo = ctx.createRadialGradient(cx,cy,R*0.88,cx,cy,R*1.48);
          atmo.addColorStop(0,'rgba(140,60,255,0.24)');
          atmo.addColorStop(0.45,'rgba(100,35,220,0.1)');
          atmo.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle = atmo; ctx.fillRect(0,0,W,H);

          // Outer ring
          const ring2 = ctx.createRadialGradient(cx,cy,R*1.1,cx,cy,R*1.55);
          ring2.addColorStop(0,'rgba(120,50,255,0.08)');
          ring2.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle = ring2; ctx.fillRect(0,0,W,H);

          // Globe base
          const base = ctx.createRadialGradient(cx-R*0.25,cy-R*0.25,R*0.05,cx,cy,R);
          base.addColorStop(0,'rgba(45,15,90,0.97)');
          base.addColorStop(0.55,'rgba(12,6,30,0.99)');
          base.addColorStop(1,'rgba(4,2,14,1)');
          ctx.save();
          ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
          ctx.fillStyle = base; ctx.fill();
          ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();

          // Very faint equator + tropics for reference
          for (let lat = -60; lat <= 60; lat += 30) {
            const sinL = Math.sin(lat*Math.PI/180), cosL = Math.cos(lat*Math.PI/180);
            const rx = R * cosL; if (rx < 2) continue;
            ctx.beginPath();
            ctx.ellipse(cx, cy - R*sinL, rx, rx*0.16, 0, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(130,70,220,0.07)';
            ctx.lineWidth = 0.4; ctx.stroke();
          }

          // ── Country borders from topojson ──────────────────────────────────
          if (geoRef.current) {
            for (const feature of geoRef.current) {
              const g = feature.geometry;
              if (!g) continue;
              const polys = g.type === 'Polygon' ? [g.coordinates]
                : g.type === 'MultiPolygon' ? g.coordinates : [];
              for (const poly of polys) {
                for (const ring of poly) {
                  let penDown = false;
                  ctx.beginPath();
                  for (const [lon, lat] of ring) {
                    const lonR = (lon + rot) * Math.PI / 180;
                    const latR = lat * Math.PI / 180;
                    const cosLat = Math.cos(latR);
                    const z = cosLat * Math.sin(lonR);
                    const px = cx + R * cosLat * Math.cos(lonR);
                    const py = cy - R * Math.sin(latR);
                    if (z >= -0.06) {
                      if (!penDown) { ctx.moveTo(px, py); penDown = true; }
                      else ctx.lineTo(px, py);
                    } else {
                      penDown = false;
                    }
                  }
                  // subtle fill: land area
                  ctx.fillStyle = 'rgba(90,45,160,0.18)';
                  ctx.fill();
                  // border
                  ctx.strokeStyle = 'rgba(195,135,255,0.6)';
                  ctx.lineWidth = 0.65;
                  ctx.stroke();
                }
              }
            }
          }

          ctx.restore();

          // Rim glow
          const rim = ctx.createRadialGradient(cx,cy,R*0.84,cx,cy,R*1.06);
          rim.addColorStop(0,'rgba(0,0,0,0)');
          rim.addColorStop(0.62,'rgba(130,55,255,0.48)');
          rim.addColorStop(1,'rgba(80,20,200,0)');
          ctx.beginPath(); ctx.arc(cx,cy,R*1.06,0,Math.PI*2);
          ctx.fillStyle = rim; ctx.fill();

          // Specular highlight
          const hl = ctx.createRadialGradient(cx-R*0.3,cy-R*0.3,0,cx,cy,R);
          hl.addColorStop(0,'rgba(220,180,255,0.18)');
          hl.addColorStop(0.38,'rgba(0,0,0,0)');
          ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
          ctx.fillStyle = hl; ctx.fill();

          // Cities
          CITIES.forEach(([lat,lon]) => {
            const lonR = (lon + rot) * Math.PI / 180;
            const latR = lat * Math.PI / 180;
            const cosLat = Math.cos(latR);
            const z = cosLat * Math.sin(lonR);
            if (z < 0) return;
            const sx = cx + R * cosLat * Math.cos(lonR);
            const sy = cy - R * Math.sin(latR);
            const depth = (z + 1) / 2;
            const alpha = 0.3 + depth * 0.7;
            const cg = ctx.createRadialGradient(sx,sy,0,sx,sy,11);
            cg.addColorStop(0,`rgba(210,155,255,${alpha*0.75})`);
            cg.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle = cg; ctx.fillRect(sx-11,sy-11,22,22);
            ctx.beginPath(); ctx.arc(sx,sy,1.8,0,Math.PI*2);
            ctx.fillStyle = `rgba(235,210,255,${alpha})`; ctx.fill();
          });

          animRef.current = requestAnimationFrame(draw);
        };
        draw();
        return () => cancelAnimationFrame(animRef.current);
      }, [STARS]);

      return <canvas ref={cvRef} width={520} height={520} className="auth-globe-canvas" />;
    }

    // ── Mini-Game Modal ───────────────────────────────────────────────────────
    function MiniGameModal({ visible, onClose, credits, onCreditsUpdate, showToast }) {
      if (!visible) return null;

      const today = new Date().toISOString().slice(0, 10);
      const seed  = today.split('-').reduce((a, v) => a * 100 + parseInt(v), 0);
      const q     = QUIZ_POOL[seed % QUIZ_POOL.length];

      const raw    = localStorage.getItem(DAILY_GAME_KEY);
      const saved  = raw ? JSON.parse(raw) : {};
      const todaySave = saved.date === today ? saved : null;

      const [phase,    setPhase]   = useState(todaySave?.done ? 'done' : 'playing');
      const [chosen,   setChosen]  = useState(todaySave?.chosen || null);
      const [attempts, setAttempts]= useState(todaySave?.attempts || 0);
      const [earned,   setEarned]  = useState(todaySave?.earned || 0);

      const shuffled = useMemo(() => seededShuffle(q.opts, seed + 7), [q, seed]);

      const won = phase === 'done' && (todaySave?.won || chosen === q.answer);

      const nextResetLabel = useMemo(() => {
        const d = new Date(); d.setDate(d.getDate() + 1); d.setHours(0,0,0,0);
        const ms = d - new Date();
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        return `${h}h ${m}m`;
      }, []);

      const guess = opt => {
        if (phase !== 'playing') return;
        const newAttempts = attempts + 1;
        const correct = opt === q.answer;
        setChosen(opt);
        setAttempts(newAttempts);
        if (correct) {
          const reward = newAttempts === 1 ? 30 : 10;
          const newBal = credits + reward;
          saveCredits({ balance: newBal });
          onCreditsUpdate(newBal);
          setEarned(reward);
          setPhase('done');
          localStorage.setItem(DAILY_GAME_KEY, JSON.stringify({ date:today, done:true, won:true, chosen:opt, attempts:newAttempts, earned:reward }));
          showToast(`+${reward} crédits — Bonne réponse ! 🎉`);
        } else if (newAttempts >= 2) {
          setPhase('done');
          localStorage.setItem(DAILY_GAME_KEY, JSON.stringify({ date:today, done:true, won:false, chosen:opt, attempts:newAttempts, earned:0 }));
        } else {
          setTimeout(() => { setChosen(null); setPhase('playing'); }, 800);
          setPhase('wrong1');
        }
      };

      const btnStyle = opt => {
        const base = { padding:'13px 10px', borderRadius:10, border:'1px solid var(--rule)', background:'rgba(255,255,255,0.03)', color:'var(--ink)', cursor: phase === 'done' ? 'default' : 'pointer', fontFamily:"'JetBrains Mono',monospace", fontSize:13, transition:'all .2s', width:'100%', textAlign:'center' };
        if (phase !== 'done' && !(phase === 'wrong1' && opt === chosen)) return base;
        if (opt === q.answer) return { ...base, background:'rgba(34,197,94,0.18)', borderColor:'#22c55e', color:'#22c55e', fontWeight:600 };
        if (opt === chosen)   return { ...base, background:'rgba(239,68,68,0.15)', borderColor:'#ef4444', color:'#ef4444' };
        return { ...base, opacity:0.35 };
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" style={{ width:'min(440px,100%)' }} onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <span style={{ display:'flex', alignItems:'center', gap:8 }}>🎮 Défi quotidien</span>
              <button className="modal-close" onClick={onClose}>✕</button>
            </div>
            <div className="modal-body" style={{ gap:16 }}>

              {/* Meta */}
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <span style={{ fontSize:11, padding:'3px 10px', borderRadius:999, background: q.type==='ip' ? 'rgba(59,130,246,0.15)' : 'rgba(167,139,250,0.15)', color: q.type==='ip' ? '#60a5fa' : '#a78bfa', fontFamily:"'JetBrains Mono',monospace" }}>
                  {q.type === 'ip' ? '🌐 IP → Pays' : '🔗 Domaine → Propriétaire'}
                </span>
                <span style={{ fontSize:11, color:'var(--ink-mute)' }}>Prochain dans {nextResetLabel}</span>
              </div>

              {/* Question */}
              <div>
                <div style={{ fontSize:12, color:'var(--ink-mute)', marginBottom:8 }}>{q.q}</div>
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:26, fontWeight:700, color:'var(--ink)', letterSpacing:1, padding:'14px 18px', background:'rgba(0,0,0,0.2)', borderRadius:10, border:'1px solid var(--rule)', textAlign:'center' }}>
                  {q.target}
                </div>
              </div>

              {/* Reward hint */}
              {phase === 'playing' && attempts === 0 && (
                <div style={{ fontSize:12, color:'var(--ink-mute)', textAlign:'center' }}>
                  1ère bonne réponse <b style={{ color:'#22c55e' }}>+30 cr</b> · 2ème essai <b style={{ color:'#eab308' }}>+10 cr</b>
                </div>
              )}
              {phase === 'wrong1' && (
                <div style={{ fontSize:13, color:'#f97316', textAlign:'center', padding:'6px 0' }}>
                  ✗ Mauvaise réponse — encore une chance (+10 cr)
                </div>
              )}

              {/* Options 2x2 */}
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                {shuffled.map(opt => (
                  <button key={opt} onClick={() => guess(opt)} disabled={phase === 'done' || phase === 'wrong1'} style={btnStyle(opt)}>
                    {opt}
                  </button>
                ))}
              </div>

              {/* Result */}
              {phase === 'done' && (
                <div style={{ padding:'16px', borderRadius:12, textAlign:'center', background: won ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.08)', border:`1px solid ${won ? 'rgba(34,197,94,0.3)' : 'rgba(239,68,68,0.25)'}` }}>
                  <div style={{ fontSize:28, marginBottom:6 }}>{won ? '🎉' : '😔'}</div>
                  {won
                    ? <div style={{ fontWeight:700, color:'#22c55e', fontSize:16 }}>+{earned} crédits gagnés !</div>
                    : <><div style={{ fontWeight:700, color:'#ef4444', fontSize:15 }}>Raté !</div>
                       <div style={{ fontSize:13, color:'var(--ink)', marginTop:4 }}>Réponse : <b style={{ color:'#22c55e' }}>{q.answer}</b></div></>
                  }
                  <div style={{ fontSize:12, color:'var(--ink-mute)', marginTop:6 }}>💡 {q.hint}</div>
                </div>
              )}

            </div>
          </div>
        </div>
      );
    }

                <line x1="13.8" y1="11" x2="17" y2="11" stroke="white" strokeWidth="1.2" strokeLinecap="round"/>
                <line x1="11" y1="5" x2="11" y2="8.2" stroke="white" strokeWidth="1.2" strokeLinecap="round"/>
                <line x1="11" y1="13.8" x2="11" y2="17" stroke="white" strokeWidth="1.2" strokeLinecap="round"/>
                <circle cx="11" cy="11" r="1.6" fill="#8b5cf6"/>
                <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="white" strokeWidth="2" strokeLinecap="round"/>
              </svg>
              <div className="brand-name">Searcher</div>
            </button>

          <div className="corner tr"><div className="badge"><span className="live" />&nbsp;En ligne</div></div>
          <div className="corner bl"><Clock /> · v0.5</div>
          <div className="corner br" style={{ gap:8 }}>
            <button className="nav-btn home" onClick={onBack}><BackIcon /> Retour</button>

          <div className="bulk-body">
            <div className="lb-title">📋 Analyse Bulk</div>

            <textarea

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [session, setSession] = useState(loadSession);
      const [discordLoading, setDiscordLoading] = useState(() => window.location.hash.includes('access_token'));
      const [config, setConfig] = useState(loadConfig);
      const [page, setPage] = useState('search');
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [phoneResult, setPhoneResult] = useState(null);
      const [ipResult, setIpResult] = useState(null);
      const [whoisResult, setWhoisResult] = useState(null);
      const [shodanResult, setShodanResult] = useState(null);
      const [personResult, setPersonResult] = useState(null);
      const [emailResult, setEmailResult] = useState(null);
      const [imageResult, setImageResult] = useState(null);
      const [decoderResult, setDecoderResult] = useState(null);
      const [usernameResult, setUsernameResult] = useState(null);
      const [tiktokResult, setTiktokResult]     = useState(null);
      const [breachResult, setBreachResult]     = useState(null);
      const [hudsonResult, setHudsonResult]     = useState(null);
      const [steamResult, setSteamResult]       = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [theme, setTheme] = useState(loadTheme);
      const [showTheme, setShowTheme] = useState(false);
      const [showPricing, setShowPricing] = useState(false);
      const [showProfile] = useState(false);
      const [showRedeem, setShowRedeem] = useState(false);
      const [showMiniGame, setShowMiniGame] = useState(false);
      const miniGameAvailable = useMemo(() => {
        const raw = localStorage.getItem(DAILY_GAME_KEY);
        if (!raw) return true;
        const s = JSON.parse(raw);
        return s.date !== new Date().toISOString().slice(0, 10);
      }, [showMiniGame]);
      const [credits, setCredits] = useState(() => loadCredits().balance);
      const [premiumList, setPremiumList] = useState(() => loadPremiumList());
      const [showAdmin, setShowAdmin] = useState(false);
      const [viewedEntry, setViewedEntry] = useState(null);
      const [toast, setToast] = useState(null);
      const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 3500); };
      useEffect(() => { applyTheme(theme); }, []);
      useEffect(() => {
        fetchLeaderboard().then(() => {
          setPremiumList(loadPremiumList());

          // Badge Abonné : sync avec le statut premium
          if (session) {
            const p = loadPublicProfile();
            const hasSub = p.manualBadges.includes('sub') || p.enabledBadges.includes('sub');
            if (isPremium(session) && !hasSub) {
              const updated = {
                ...p,
                manualBadges: [...p.manualBadges, 'sub'],
                enabledBadges: [...p.enabledBadges, 'sub'],
              };
              savePublicProfile(updated);
              updateLeaderboardEntry(session, loadStats(), updated).catch(() => {});
            } else if (!isPremium(session) && hasSub) {
              const updated = {
                ...p,
                manualBadges: p.manualBadges.filter(b => b !== 'sub'),
                enabledBadges: p.enabledBadges.filter(b => b !== 'sub'),
              };
              savePublicProfile(updated);
              updateLeaderboardEntry(session, loadStats(), updated).catch(() => {});
            }
          }

          // Badges envoyés par l'admin
          if (session) {
            const bgrants = loadBadgeGrants();
            const bconsumed = getConsumedBadgeGrants();
            const bpending = bgrants.filter(g =>
              g.name.toLowerCase() === (session.name || '').toLowerCase() &&
              !bconsumed.includes(g.id)
            );
            if (bpending.length > 0) {
              const p = loadPublicProfile();
              let updated = { ...p };
              bpending.forEach(g => {
                markBadgeGrantConsumed(g.id);
                if (g.action === 'give') {
                  if (!updated.manualBadges.includes(g.badgeId))
                    updated.manualBadges = [...updated.manualBadges, g.badgeId];
                  if (!updated.enabledBadges.includes(g.badgeId))
                    updated.enabledBadges = [...updated.enabledBadges, g.badgeId];
                } else {
                  updated.manualBadges = updated.manualBadges.filter(b => b !== g.badgeId);
                  updated.enabledBadges = updated.enabledBadges.filter(b => b !== g.badgeId);
                }
              });
              savePublicProfile(updated);
              updateLeaderboardEntry(session, loadStats(), updated).catch(() => {});
            }
          }

          // Crédits envoyés par l'admin
          if (session) {
            const grants = loadCreditGrants();
            const consumed = getConsumedGrants();
            const pending = grants.filter(g =>
              g.name.toLowerCase() === (session.name || '').toLowerCase() &&
              !consumed.includes(g.id)
            );
            if (pending.length > 0) {
              let total = 0;
              pending.forEach(g => { total += g.amount; markGrantConsumed(g.id); });
              const cred = loadCredits();
              const nb = Math.max(0, cred.balance + total);
              saveCredits({ balance: nb });
              setCredits(nb); creditsRef.current = nb;
              const delay = isPremium(session) && !localStorage.getItem('searcher_premium_bonus_v1') ? 1800 : 1100;
              setTimeout(() => {
                setToast(total > 0 ? `⚡ +${total} crédits reçus par un Admin !` : `⚡ ${total} crédits retirés par un Admin.`);
                setTimeout(() => setToast(null), 3500);
              }, delay);
            }
          }
        }).catch(() => {});
      }, []);

      useEffect(() => {
        if (!discordLoading) return;
        handleDiscordCallback()
          .then(s => { if (s) { saveSession(s); setSession(s); } })
          .catch(() => {})
          .finally(() => setDiscordLoading(false));
      }, []);
      const configRef = useRef(config);
      useEffect(() => { configRef.current = config; }, [config]);
      useEffect(() => {
        if (session && query) {
          updateLeaderboardEntry(session, loadStats(), loadPublicProfile());
        }
      }, [query]);
      const creditsRef = useRef(credits);
      useEffect(() => { creditsRef.current = credits; }, [credits]);
      const sessionRef = useRef(session);
      useEffect(() => { sessionRef.current = session; }, [session]);
      useEffect(() => {
        if (!session) return;
        const today = new Date().toISOString().slice(0,10);
        const stored = JSON.parse(localStorage.getItem(DAILY_BONUS_KEY) || '{}');
        if (stored.lastClaim === today) return;
        const cred = loadCredits();
        const nb = cred.balance + DAILY_BONUS_AMOUNT;
        saveCredits({ balance: nb });
        localStorage.setItem(DAILY_BONUS_KEY, JSON.stringify({ lastClaim: today }));
        setCredits(nb); creditsRef.current = nb;
        setTimeout(() => showToast(`+${DAILY_BONUS_AMOUNT} crédits — Bonus quotidien !`), 900);
      }, [session]);

      const handleSearch = useCallback(async q => {
        const cfg = configRef.current;

        /* Type detection */
        const isIP       = looksLikeIP(q);
        const isTiktok   = !isIP && looksLikeTiktokProfile(q);
        const isImageUrl = !isIP && !isTiktok && looksLikeImageUrl(q);
        const isUsername  = !isIP && !isTiktok && !isImageUrl && looksLikeUsername(q);
        const isSteamID   = !isIP && !isTiktok && !isImageUrl && !isUsername && looksLikeSteamId(q);
        const isDiscordID = !isIP && !isTiktok && !isImageUrl && !isUsername && !isSteamID && looksLikeDiscordId(q);
        const isUUID      = !isIP && !isTiktok && !isImageUrl && !isUsername && !isSteamID && !isDiscordID && looksLikeUUID(q);
        const isEncoded   = !isIP && !isTiktok && !isImageUrl && !isUsername && !isSteamID && !isDiscordID && !isUUID && looksLikeEncoded(q);
        const isDomain    = !isIP && !isTiktok && !isImageUrl && !isUsername && !isSteamID && !isDiscordID && !isUUID && !isEncoded && looksLikeDomain(q);
        const isEmail     = !isIP && !isTiktok && !isImageUrl && !isUsername && !isSteamID && !isDiscordID && !isUUID && !isEncoded && !isDomain && looksLikeEmail(q);
        const isPerson    = !isIP && !isTiktok && !isImageUrl && !isUsername && !isSteamID && !isDiscordID && !isUUID && !isEncoded && !isDomain && !isEmail && !looksLikePhone(q) && looksLikePerson(q);

        /* Premium gate — block before deducting credits */
        if (!isPremium(sessionRef.current) && (isTiktok || isUsername || isPerson || isEncoded || isDomain)) {
          setToast('🔒 Fonctionnalité réservée aux abonnés Premium');
          setTimeout(() => setToast(null), 3500);
          setShowPricing(true);
          return;
        }

        /* Credit check — block and open redeem if 0 */
        const bal = creditsRef.current;
        if (bal <= 0) { setShowRedeem(true); return; }
        const newBal = bal - 1;
        saveCredits({ balance: newBal });
        creditsRef.current = newBal;
        setCredits(newBal);

        setQuery(q);
        setPage('results');
        setLoading(true);
        setError(null);
        setResults([]);
        setPhoneResult(null);
        setIpResult(null);
        setWhoisResult(null);
        setShodanResult(null);
        setPersonResult(null);
        setEmailResult(null);
        setImageResult(null);
        setDecoderResult(null);
        setUsernameResult(null);
        setTiktokResult(null);
        setBreachResult(null);
        setHudsonResult(null);
        setSteamResult(null);

        const all = [], errs = [];
        const hasExtraSources = cfg.googleApiKey || cfg.customApis.length > 0;

        if (!isIP && !isImageUrl && !isUsername && !isEncoded && !isDomain && !isEmail && !isSteamID && !isDiscordID && !isUUID && looksLikePhone(q)) {
          addToHistory(q, 'phone');
          setPhoneResult(validatePhone(q));
          addStat('phone');
          setBreachResult({ loading: true, query: q });
          lookupBreach(q).then(data => setBreachResult(data)).catch(e => setBreachResult({ query: q, error: e.message }));
        }

        if (isPerson) {
          addToHistory(q, 'person');
          setPersonResult(q);
          addStat('person');
          setBreachResult({ loading: true, query: q });
          lookupBreach(q).then(data => setBreachResult(data)).catch(e => setBreachResult({ query: q, error: e.message }));
        }

        if (isDiscordID) {
          addToHistory(q, 'discord'); addStat('discord');
          setBreachResult({ loading: true, query: q });
          lookupBreach(q).then(data => setBreachResult(data)).catch(e => setBreachResult({ query: q, error: e.message }));
          setLoading(false);
          return;
        }

        if (isSteamID) {
          addToHistory(q, 'steam'); addStat('steam');
          setBreachResult({ loading: true, query: q });
          lookupBreach(q).then(data => setBreachResult(data)).catch(e => setBreachResult({ query: q, error: e.message }));
          setSteamResult({ loading: true, query: q });
          lookupSteam(q).then(data => setSteamResult(data)).catch(e => setSteamResult({ query: q, error: e.message }));
          setLoading(false);
          return;
        }

        if (isUUID) {
          addToHistory(q, 'uuid'); addStat('uuid');
          setBreachResult({ loading: true, query: q });
          lookupBreach(q).then(data => setBreachResult(data)).catch(e => setBreachResult({ query: q, error: e.message }));
          setLoading(false);
          return;
        }

        if (isEmail) {
          addToHistory(q, 'email'); addStat('email');
          setEmailResult(q);
          setBreachResult({ loading: true, query: q });
          lookupBreach(q)
            .then(data => setBreachResult(data))
            .catch(e => setBreachResult({ query: q, error: e.message }));
          setHudsonResult({ loading: true, query: q });
          lookupHudson(q)
            .then(data => setHudsonResult(data))
            .catch(e => setHudsonResult({ query: q, error: e.message }));
          setLoading(false);
          return;
        }

        if (isImageUrl) {
          setImageResult(q);
          setLoading(false);
          return;
        }

        if (isTiktok) {
          const ttUser = extractTiktokUsername(q);
          if (ttUser) {
            addToHistory(q, 'tiktok'); addStat('tiktok');
            setTiktokResult(ttUser);
            setLoading(false);
            return;
          }
        }

        if (isUsername) {
          addToHistory(q, 'username'); addStat('username');
          const uname = q.trim().slice(1);
          setUsernameResult(uname);
          setBreachResult({ loading: true, query: uname });
          lookupBreach(uname)
            .then(data => setBreachResult(data))
            .catch(e => setBreachResult({ query: uname, error: e.message }));
          setHudsonResult({ loading: true, query: uname });
          lookupHudson(uname)
            .then(data => setHudsonResult(data))
            .catch(e => setHudsonResult({ query: uname, error: e.message }));
          setSteamResult({ loading: true, query: uname });
          lookupSteam(uname)
            .then(data => setSteamResult(data))
            .catch(e => setSteamResult({ query: uname, error: e.message }));
          setLoading(false);
          return;
        }

        if (isEncoded) {
          setDecoderResult(q);
          setLoading(false);
          return;
        }

        if (isIP) {
          addToHistory(q, 'ip'); addStat('ip');
          setIpResult({ loading: true, ip: q });
          geolocateIP(q)
            .then(data => setIpResult({ ip: q, data }))
            .catch(e => setIpResult({ ip: q, error: e.message }));
          if (isPremium(sessionRef.current)) {
            setShodanResult({ loading: true, ip: q });
            lookupShodan(q)
              .then(data => setShodanResult({ ip: q, data }))
              .catch(e => setShodanResult({ ip: q, error: e.message }));
          }
          setBreachResult({ loading: true, query: q });
          lookupBreach(q)
            .then(data => setBreachResult(data))
            .catch(e => setBreachResult({ query: q, error: e.message }));
          setLoading(false);
          return;
        }

        if (isDomain) {
          addToHistory(q, 'domain'); addStat('domain');
          setWhoisResult({ loading: true, domain: q });
          lookupDomain(q)
            .then(data => setWhoisResult({ domain: q, data }))
            .catch(e => setWhoisResult({ domain: q, error: e.message }));
          setBreachResult({ loading: true, query: q });
          lookupBreach(q)
            .then(data => setBreachResult(data))
            .catch(e => setBreachResult({ query: q, error: e.message }));
          setLoading(false);
          return;
        }

        addToHistory(q, 'wiki'); addStat('wiki');

        try {
          all.push(...await searchWikipedia(q));
          if (hasExtraSources) setResults([...all]);
        } catch { /* silent */ }

        await Promise.allSettled([
          cfg.googleApiKey && cfg.googleCx
            ? searchGoogle(q, cfg.googleApiKey, cfg.googleCx).then(r => all.push(...r)).catch(e => errs.push(`Google: ${e.message}`))
            : null,
          ...cfg.customApis.map(api =>
            searchCustomApi(q, api).then(r => all.push(...r)).catch(e => errs.push(`${api.name}: ${e.message}`))
          ),
        ].filter(Boolean));

        setResults(all);
        setLoading(false);
        if (all.length === 0 && errs.length > 0) setError(errs.join('\n'));
      }, []);

      const handleSaveTheme = useCallback(t => {
        setTheme(t);
        saveTheme(t);
      }, []);

      const handleLogout = useCallback(() => {
        clearSession();
        setSession(null);
        setPage('search');
        setResults([]);
        setPhoneResult(null);
        setIpResult(null);
        setWhoisResult(null);
        setShodanResult(null);
        setPersonResult(null);
        setEmailResult(null);
        setImageResult(null);
        setDecoderResult(null);
        setUsernameResult(null);
      }, []);

      const handleProfileSave = useCallback(updated => {
        setSession(updated);
      }, []);

      if (discordLoading) return (
        <div style={{ position:'fixed', inset:0, display:'flex', alignItems:'center', justifyContent:'center', background:'var(--bg)', fontFamily:'Geist,sans-serif', color:'var(--ink-mute)', fontSize:14, gap:10 }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style={{ animation:'spin 1s linear infinite' }}>
            <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="2" strokeDasharray="32" strokeDashoffset="12" strokeLinecap="round"/>
          </svg>
          Connexion Discord…
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>
      );
      if (!session) return <AuthPage onAuth={s => setSession(s)} />;

      return (
        <>
          {page === 'view-profile' && viewedEntry
            ? <ProfileViewer entry={viewedEntry} onBack={() => setPage('leaderboard')} session={session} />
            : page === 'leaderboard'
              ? <LeaderboardPage session={session} onBack={() => setPage('search')} onViewProfile={e => { setViewedEntry(e); setPage('view-profile'); }} />
              : page === 'dashboard'
                ? <DashboardPage session={session} credits={credits} onBack={() => setPage('search')} onViewPublic={() => setPage('public')} onLeaderboard={() => setPage('leaderboard')} />
                : page === 'public'
                  ? <PublicProfilePage session={session} onBack={() => setPage('dashboard')} />
                  : page === 'patchnote'
                    ? <PatchnotePage onBack={() => setPage('search')} session={session} />
                    : page === 'bulk'
                      ? <BulkEmailPage onBack={() => setPage('search')} />
                      : page === 'search'
                        ? <SearchPage onSearch={handleSearch} onTheme={() => setShowTheme(true)} onPricing={() => setShowPricing(true)} onProfile={() => setPage('dashboard')} onRedeem={() => setShowRedeem(true)} onPatchnote={() => setPage('patchnote')} onLeaderboard={() => setPage('leaderboard')} onMiniGame={() => setShowMiniGame(true)} miniGameAvailable={miniGameAvailable} credits={credits} followSpeed={config.followSpeed} session={session} onLogout={handleLogout} onAdmin={() => setShowAdmin(true)} onBulk={() => setPage('bulk')} />
                        : <ResultsPage key={query} query={query} results={results} phoneResult={phoneResult} ipResult={ipResult} whoisResult={whoisResult} shodanResult={shodanResult} personResult={personResult} emailResult={emailResult} imageResult={imageResult} decoderResult={decoderResult} usernameResult={usernameResult} tiktokResult={tiktokResult} breachResult={breachResult} hudsonResult={hudsonResult} steamResult={steamResult} loading={loading} error={error} config={config}
                                       onSearch={handleSearch} onTheme={() => setShowTheme(true)} onPricing={() => setShowPricing(true)} onProfile={() => setPage('dashboard')} onRedeem={() => setShowRedeem(true)} onPatchnote={() => setPage('patchnote')} onLeaderboard={() => setPage('leaderboard')} onMiniGame={() => setShowMiniGame(true)} miniGameAvailable={miniGameAvailable} credits={credits}
                                       onBack={() => setPage('search')} followSpeed={config.followSpeed} session={session} onLogout={handleLogout} onAdmin={() => setShowAdmin(true)} onBulk={() => setPage('bulk')} />
          }
          <PricingModal onClose={() => setShowPricing(false)} visible={showPricing} />
          <AdminModal visible={showAdmin} onClose={() => setShowAdmin(false)} onPremiumUpdate={list => setPremiumList(list)} />
          <ThemeModal theme={theme} onSave={handleSaveTheme}
            onApply={() => setShowTheme(false)}
            onClose={() => { setShowTheme(false); applyTheme(theme); }}
            visible={showTheme} />
          <RedeemModal credits={credits} onCreditsUpdate={b => { setCredits(b); creditsRef.current = b; }} onClose={() => setShowRedeem(false)} visible={showRedeem} />
          <MiniGameModal visible={showMiniGame} onClose={() => setShowMiniGame(false)} credits={credits} onCreditsUpdate={b => { setCredits(b); creditsRef.current = b; }} showToast={showToast} />
          <Toast msg={toast} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
